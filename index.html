<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SportTrack Pro — Gestione Società Sportiva</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        /* Qui ho mantenuto i tuoi token e il design originale */
        :root {
            --ink: #0D1117; --ink-2: #1C2331; --accent: #38BDF8; --mist: #F0F4F8;
            --safe: #10B981; --warn: #F59E0B; --crit: #EF4444;
        }
        body { margin: 0; font-family: 'DM Sans', sans-serif; background: var(--ink); color: white; overflow-x: hidden; }
        
        /* Schermata Login */
        #login-screen {
            position: fixed; inset: 0; z-index: 9999; background: var(--ink);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--ink-2); padding: 2rem; border-radius: 1.5rem;
            width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1);
        }
        input {
            width: 100%; padding: 0.8rem; margin: 0.5rem 0;
            background: var(--ink-3); border: 1px solid #444; color: white; border-radius: 0.5rem;
        }
        .btn-primary {
            width: 100%; padding: 1rem; background: var(--accent); color: var(--ink);
            border: none; border-radius: 0.5rem; font-weight: bold; cursor: pointer;
        }

        /* Layout App */
        #app { display: none; opacity: 0; transition: opacity 0.5s; }
        #app.visible { display: block; opacity: 1; }
        
        header { padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .content { padding: 2rem; max-width: 1200px; margin: 0 auto; }
        
        /* Grid Dashboard */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .stat-card { background: var(--ink-2); padding: 1.5rem; border-radius: 1rem; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="font-family:'Syne'; margin-bottom:1.5rem;">SportTrack</h1>
            <input type="text" id="login-user" placeholder="Username (es. staff)">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn-primary" id="btn-login">ACCEDI</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div id="brand" style="font-family:'Syne'; font-size:1.2rem;">SPORTTRACK <span id="user-tag" style="font-size:0.7rem; opacity:0.5;"></span></div>
            <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer;">Logout</button>
        </header>

        <nav style="display:flex; gap:1rem; padding:1rem; background:var(--ink-2); overflow-x:auto;">
            <button class="nav-link" onclick="showView('dashboard')">Dashboard</button>
            <button class="nav-link" onclick="showView('athletes')">Atleti</button>
            <button class="nav-link" onclick="showView('sessions')">Allenamenti</button>
        </nav>

        <main class="content" id="main-content">
            </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
