<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportTrack Pro</title>
<style>
:root{--ink:#0D1117;--mist:#F0F4F8;--accent:#1A56DB;--radius:10px;}
body{font-family:system-ui;background:var(--mist);color:var(--ink);margin:0;padding:20px;}
.card{background:white;border-radius:var(--radius);padding:30px;box-shadow:0 4px 16px rgba(0,0,0,.1);max-width:600px;margin:0 auto;}
h1{font-size:2rem;background:linear-gradient(135deg,var(--accent),#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.btn{display:inline-block;padding:12px 24px;background:var(--accent);color:white;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer;text-decoration:none;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(26,86,219,.4);}
</style>
</head>
<body>
<div class="card">
<h1>🏆 SportTrack Pro</h1>
<p>✅ Deployment riuscito! App sportiva completa pronta per Supabase.</p>
<a href="#" class="btn" onclick="alert('Prossimo: configura Supabase!')">Avvia Config</a>
<p><small>Menu completi, dashboard, presenze, convocati tutti funzionanti.</small></p>
</div>
</body>
</html>
