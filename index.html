function buildScorersList(matchId) {
  if (!matchId) return '';
  const list = (S.scorers||[]).filter(s => s.matchId === matchId);
  if (!list.length) return '<div style="font-size:.82rem;color:#64748B">Nessun marcatore registrato</div>';
  return list.map(s => {
    const a = S.athletes.find(x => x.id === s.athleteId);
    const name = a ? `#${a.number||'—'} ${esc(a.lastName)} ${esc(a.firstName)}` : '—';
    return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--mist-2)">
      <span style="font-size:1rem">⚽</span>
      <span style="flex:1;font-size:.88rem;font-weight:600">${name}</span>
      <span class="badge badge-gold" style="min-width:32px;text-align:center">${s.goals} gol</span>
      
    </div>`;
  }).join('');
}

function addScorer(matchId) {
  const athId = document.getElementById('scorer-athlete')?.value;
  const goals = parseInt(document.getElementById('scorer-goals')?.value)||1;
  if (!athId) { toast('Seleziona un atleta','error'); return; }

  // Controlla se esiste già
  const existing = (S.scorers||[]).find(s => s.matchId===matchId && s.athleteId===athId);
  if (existing) {
    existing.goals += goals;
    sbSync('scorers', existing);
  } else {
    const newScorer = { id: uid(), matchId, athleteId: athId, goals, notes: '' };
    if (!S.scorers) S.scorers = [];
    S.scorers.push(newScorer);
    sbSync('scorers', newScorer);
  }
  saveState();
  const el = document.getElementById('scorers-list');
  if (el) el.innerHTML = buildScorersList(matchId);
  document.getElementById('scorer-athlete').value = '';
  document.getElementById('scorer-goals').value = '1';
  toast('⚽ Marcatore aggiunto','success');
}

function removeScorer(scorerId, matchId) {
  S.scorers = (S.scorers||[]).filter(s => s.id !== scorerId);
  sbSync('scorers', scorerId, true); // delete
  saveState();
  const el = document.getElementById('scorers-list');
  if (el) el.innerHTML = buildScorersList(matchId);
}

// ── STATISTICHE GOL E PUNTI ───────────────────────────────────
function getMatchPoints(result) {
  if (result === 'W') return 3;
  if (result === 'D') return 1;
  return 0;
}

function getCategoryMatchStats(catId, teamId, seasonId) {
  // Filtra per stagione se specificata o usa la stagione attiva
  const seasId = (seasonId !== undefined) ? seasonId : S.activeSeason;
  let ms = S.matches.filter(m => m.categoryId === catId);
  if (seasId) ms = filterMatchesBySeason(ms, seasId);
  if (teamId) ms = ms.filter(m => m.teamId === teamId || (!m.teamId));
  const played = ms.filter(m => m.result && m.result !== 'TBD');
  const pts  = played.reduce((s,m) => s + getMatchPoints(m.result), 0);
  const gf   = played.reduce((s,m) => s + (m.scoredGoals||0), 0);
  const gs   = played.reduce((s,m) => s + (m.concededGoals||0), 0);
  const w    = played.filter(m=>m.result==='W').length;
  const d    = played.filter(m=>m.result==='D').length;
  const l    = played.filter(m=>m.result==='L').length;
  return { played: played.length, total: ms.length, w, d, l, pts, gf, gs, gd: gf-gs };
}

// Statistiche partite aggregate per una lista di categorie (usato in dashboard società)
function getMultiCatMatchStats(catIds) {
  const ms = S.matches.filter(m => catIds.includes(m.categoryId));
  const played = ms.filter(m => m.result && m.result !== 'TBD');
  const pts = played.reduce((s,m) => s + getMatchPoints(m.result), 0);
  const gf  = played.reduce((s,m) => s + (m.scoredGoals||0), 0);
  const gs  = played.reduce((s,m) => s + (m.concededGoals||0), 0);
  const w   = played.filter(m=>m.result==='W').length;
  const d   = played.filter(m=>m.result==='D').length;
  const l   = played.filter(m=>m.result==='L').length;
  return { played: played.length, total: ms.length, w, d, l, pts, gf, gs, gd: gf-gs };
}

// ── Helper: card partite ultimo mese con filtri opzionali ─────
function buildRecentMatchesCard(catIds, opts) {
  opts = opts || {};
  var socId    = opts.socId    || null;
  var stateKey = opts.stateKey || '_rcmState';
  var viewId   = opts.viewId   || '';
  var title    = opts.title    || 'Partite ultimo mese';

  if (!window[stateKey]) window[stateKey] = {teamId:'',dateFrom:'',dateTo:''};
  var st = window[stateKey];

  var monthAgo = new Date(); monthAgo.setDate(monthAgo.getDate()-30);
  var monthStr = monthAgo.toISOString().slice(0,10);

  var matches = S.matches.filter(function(m){ return catIds.includes(m.categoryId); });
  matches = matches.filter(function(m){ return m.date >= monthStr; });
  if (socId) {
    var socCats = S.categories.filter(function(c){ return c.societyId===socId; }).map(function(c){return c.id;});
    matches = matches.filter(function(m){ return socCats.includes(m.categoryId); });
  }
  if (st.teamId) matches = matches.filter(function(m){ return m.teamId===st.teamId||m.categoryId===st.teamId; });
  if (st.dateFrom) matches = matches.filter(function(m){ return m.date>=st.dateFrom; });
  if (st.dateTo)   matches = matches.filter(function(m){ return m.date<=st.dateTo; });
  matches = matches.sort(function(a,b){ return b.date.localeCompare(a.date); });

  var played = matches.filter(function(m){ return m.result&&m.result!=='TBD'; });
  var W=played.filter(function(m){return m.result==='W';}).length;
  var D=played.filter(function(m){return m.result==='D';}).length;
  var L=played.filter(function(m){return m.result==='L';}).length;
  var gf=played.reduce(function(s,m){return s+(m.scoredGoals||0);},0);
  var gs=played.reduce(function(s,m){return s+(m.concededGoals||0);},0);
  var pts=W*3+D;

  var filterTeams = S.teams.filter(function(t){
    return catIds.some(function(cid){
      var cat=S.categories.find(function(c){return c.id===cid;});
      return cat&&(cat.teamId===t.id||(cat.teamIds||[]).includes(t.id));
    });
  });

  // Costruisci onchange handler come stringa sicura
  function mkOnChange(field) {
    return "window['" + stateKey + "']." + field + "=this.value;" +
           (viewId ? "viewBuilders['" + viewId + "'](document.getElementById('view-" + viewId + "'));" : "");
  }

  var filterBar = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:flex-end">';
  if (filterTeams.length > 1) {
    var teamSel = '<div class="form-field" style="margin:0;min-width:120px;flex:1"><label style="font-size:.73rem">Squadra</label>'
      + '<select onchange="' + mkOnChange('teamId') + '">'
      + '<option value="">Tutte</option>'
      + filterTeams.map(function(t){
          return '<option value="' + t.id + '"' + (t.id===st.teamId?' selected':'') + '>' + esc(t.name) + '</option>';
        }).join('')
      + '</select></div>';
    filterBar += teamSel;
  }
  filterBar += '<div class="form-field" style="margin:0;min-width:110px"><label style="font-size:.73rem">Data da</label>'
    + '<input type="date" value="' + (st.dateFrom||'') + '" onchange="' + mkOnChange('dateFrom') + '"></div>';
  filterBar += '<div class="form-field" style="margin:0;min-width:110px"><label style="font-size:.73rem">Data a</label>'
    + '<input type="date" value="' + (st.dateTo||'') + '" onchange="' + mkOnChange('dateTo') + '"></div>';
  filterBar += '</div>';

  var statsRow = '';
  if (played.length > 0 && !opts.hideStats) {
    statsRow = '<div class="stats-grid" style="margin-bottom:12px">'
      + '<div class="stat-card blue"><div class="accent-bar"></div><div class="label">Punti</div><div class="value">'+pts+'</div><div class="sub">'+played.length+' partite</div></div>'
      + '<div class="stat-card green"><div class="accent-bar"></div><div class="label">Vittorie</div><div class="value">'+W+'</div></div>'
      + '<div class="stat-card gold"><div class="accent-bar"></div><div class="label">Pareggi</div><div class="value">'+D+'</div></div>'
      + '<div class="stat-card red"><div class="accent-bar"></div><div class="label">Sconfitte</div><div class="value">'+L+'</div></div>'
      + '<div class="stat-card green"><div class="accent-bar"></div><div class="label">Gol Fatti</div><div class="value">'+gf+'</div><div class="sub">diff.'+(gf-gs>=0?'+':'')+(gf-gs)+'</div></div>'
      + '<div class="stat-card red"><div class="accent-bar"></div><div class="label">Gol Subiti</div><div class="value">'+gs+'</div></div>'
      + '</div>';
  }

  var rows = '';
  if (!matches.length) {
    rows = '<div class="text-muted text-sm" style="padding:10px 0">Nessuna partita nel periodo selezionato</div>';
  } else {
    rows = matches.slice(0,15).map(function(m){
      var cat = S.categories.find(function(c){return c.id===m.categoryId;});
      var team = S.teams.find(function(t){return t.id===m.teamId;}) || S.teams.find(function(t){return cat&&t.id===cat.teamId;});
      var rc = m.result==='W'?'var(--green)':m.result==='L'?'var(--red)':m.result==='D'?'var(--gold)':'#94A3B8';
      var sc = m.result&&m.result!=='TBD'?(m.scoredGoals||0)+'—'+(m.concededGoals||0):'da giocare';
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--mist-2)">'
        + '<div style="font-size:.75rem;color:#64748B;min-width:54px">'+fmtDate(m.date)+'</div>'
        + '<div style="flex:1;min-width:0">'
        + '<div class="fw-600" style="font-size:.85rem">'+esc((team&&team.name)||(cat&&cat.name)||'—')+' vs '+esc(m.opponent)+'</div>'
        + '<div class="text-muted text-sm">'+esc((cat&&cat.name)||'—')+' · '+(m.homeAway==='home'?'🏠 Casa':'✈️ Trasferta')+'</div>'
        + '</div>'
        + '<div class="fw-700" style="color:'+rc+';font-size:.88rem;flex-shrink:0">'+sc+'</div>'
        + '</div>';
    }).join('');
  }

  return '<div class="card" style="margin-bottom:20px">'
    + '<div class="card-title" style="justify-content:space-between">'
    + '<div style="display:flex;align-items:center;gap:8px"><div class="icon" style="background:var(--gold-l);color:var(--gold)">⚽</div>'+title+'</div>'
    + '<button class="btn btn-ghost btn-sm" onclick="showView(\'matches-overview\')">Tutte le partite →</button>'
    + '</div>'
    + filterBar + statsRow + rows
    + '</div>';
}

// Shared: in-memory import data
let _importRows = [];

function previewImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    _importRows = rows;

    const defaultSeasId = document.getElementById('imp-season')?.value || S.activeSeason;
    const defaultCatId  = document.getElementById('imp-cat')?.value || '';
    const defaultTeamId = document.getElementById('imp-team')?.value || '';

    let html = `<div style="font-weight:700;margin-bottom:8px">Anteprima: ${rows.length} righe trovate</div>`;
    html += `<div class="table-wrap" style="max-height:260px;overflow-y:auto"><table><thead><tr>
      <th>Cognome</th><th>Nome</th><th>Nascita</th><th>Categoria</th><th>Squadra</th><th>Stagione</th><th>Ruolo</th><th>#</th><th>Stato</th>
    </tr></thead><tbody>`;

    let ok=0, dup=0, missCat=0;
    rows.forEach(r => {
      if (!r.Nome||!r.Cognome) return;
      const catVal  = r.Categoria || defaultCatId;
      const teamVal = r.Squadra   || defaultTeamId;
      const seasVal = r.Stagione  || defaultSeasId;
      // Debug
      if (!window._importLogged) {
        console.log('[Import] S.categories:', S.categories.length, S.categories.map(c=>c.name));
        console.log('[Import] catVal:', catVal, 'defaultCatId:', defaultCatId);
        window._importLogged = true;
      }
      // Cerca per ID oppure per nome (case-insensitive)
      const cat  = S.categories.find(c=>c.id===catVal) ||
                   S.categories.find(c=>c.name.toLowerCase()===String(catVal).toLowerCase().trim());
      const team = S.teams.find(t=>t.id===teamVal) ||
                   S.teams.find(t=>t.name.toLowerCase()===String(teamVal).toLowerCase().trim());
      const seas = S.seasons?.find(s=>s.id===seasVal) ||
                   S.seasons?.find(s=>s.name.toLowerCase()===String(seasVal).toLowerCase().trim());
      const catId  = cat?.id  || catVal;
      const teamId = team?.id || teamVal;
      const seasId = seas?.id || seasVal;
      const isDup   = !!athleteExists(r.Nome,r.Cognome,r.Nascita||'');
      if (isDup) dup++;
      else if (!cat) missCat++;
      else ok++;
      const statusBadge = isDup ? '<span class="badge badge-gold">Duplicato</span>'
        : !cat ? '<span class="badge badge-red">Cat. mancante</span>'
        : '<span class="badge badge-green">✅ OK</span>';
      html += `<tr>
        <td>${esc(r.Cognome||'')}</td><td>${esc(r.Nome||'')}</td>
        <td>${esc(r.Nascita||'')}</td>
        <td>${cat?esc(cat.name):`<span style="color:red">${esc(catId)}</span>`}</td>
        <td>${team?esc(team.name):(teamId?`<span style="color:orange">${esc(teamId)}</span>`:'—')}</td>
        <td>${seas?esc(seas.name):esc(seasId)}</td>
        <td>${esc(r.Ruolo||'')}</td><td>${esc(String(r.Numero||''))}</td>
        <td>${statusBadge}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    html += `<div style="margin-top:10px;display:flex;gap:14px;font-size:.88rem">
      <span class="badge badge-green">✅ ${ok} importabili</span>
      ${dup>0?`<span class="badge badge-gold">⚠️ ${dup} duplicati (saltati)</span>`:''}
      ${missCat>0?`<span class="badge badge-red">❌ ${missCat} categoria mancante (saltati)</span>`:''}
    </div>`;

    document.getElementById('imp-preview').innerHTML = html;
    document.getElementById('imp-actions').style.display = ok > 0 ? 'flex' : 'none';
  };
  reader.readAsArrayBuffer(file);
}

function confirmImportAthletes() {
  if (!_importRows.length) return;
  const defaultSeasId = document.getElementById('imp-season')?.value || S.activeSeason;
  const defaultCatId  = document.getElementById('imp-cat')?.value || '';
  const defaultTeamId = document.getElementById('imp-team')?.value || '';

  let imported=0, skipped=0;
  _importRows.forEach(r => {
    if (!r.Nome||!r.Cognome) return;
    const catVal  = String(r.Categoria||defaultCatId||'');
    const teamVal = String(r.Squadra||defaultTeamId||'');
    const seasVal = String(r.Stagione||defaultSeasId||'');

    // Cerca per ID o per nome (case-insensitive)
    const cat  = S.categories.find(c=>c.id===catVal) ||
                 S.categories.find(c=>c.name.toLowerCase()===catVal.toLowerCase().trim());
    const team = S.teams.find(t=>t.id===teamVal) ||
                 S.teams.find(t=>t.name.toLowerCase()===teamVal.toLowerCase().trim());
    const seas = S.seasons?.find(s=>s.id===seasVal) ||
                 S.seasons?.find(s=>s.name.toLowerCase()===seasVal.toLowerCase().trim());

    const catId  = cat?.id  || catVal;
    const teamId = team?.id || teamVal;
    const seasId = seas?.id || seasVal;

    if (!cat || athleteExists(r.Nome,r.Cognome,r.Nascita||'')) { skipped++; return; }

    const athId = uid();
    const newAth = {
      id: athId,
      firstName: String(r.Nome||''),
      lastName:  String(r.Cognome||''),
      dob:       String(r.Nascita||''),
      nickname:  String(r.Nickname||''),
      teamId:    teamId,
      categoryId:catId,
      number:    parseInt(r.Numero)||null,
      role:      String(r.Ruolo||''),
      notes:     String(r.Note||''),
      parentIds: [],
    };
    S.athletes.push(newAth);
    sbSync('athletes', newAth);

    if (!S.athleteSeasons) S.athleteSeasons=[];
    const newAs = {
      id: uid(), athleteId: athId,
      categoryId: catId, teamId: teamId, seasonId: seasId,
      role: String(r.Ruolo||''), shirtNumber: parseInt(r.Numero)||null,
      joinDate: new Date().toISOString().slice(0,10), notes:'',
    };
    S.athleteSeasons.push(newAs);
    sbSync('athlete_seasons', newAs);
    imported++;
  });

  saveState();
  _importRows = [];
  window._importLogged = false;
  closeModal();
  toast('✅ Importati ' + imported + ' atleti' + (skipped?', '+skipped+' saltati':''), 'success');
  showView('admin-athletes');
}

    const line = (r.shirtNumber||"") + " - " + ath.firstName + " " + ath.lastName;

    doc.text(line,20,y);

    y+=8;

  });

  doc.save("rosa_squadra.pdf");

}

function updateAthleteTeams() {
  const catSelect = document.getElementById('atleta-categoria');
  const teamSelect = document.getElementById('atleta-squadra');

  if (!catSelect || !teamSelect) return;

  const selectedCatId = catSelect.value;
  const currentSeasonId = S.activeSeason;

  teamSelect.innerHTML = '<option value="">Seleziona Squadra...</option>';

  if (!selectedCatId) return;

  // Filtra le associazioni dalla nuova tabella team_category_season
  const validTeamIds = (S.teamAssociations || [])
    .filter(rel => rel.categoryId === selectedCatId && rel.seasonId === currentSeasonId)
    .map(rel => rel.teamId);

  const filteredTeams = S.teams.filter(t => validTeamIds.includes(t.id));

  if (filteredTeams.length === 0) {
    teamSelect.innerHTML = '<option value="">Nessuna squadra in questa categoria</option>';
  } else {
    filteredTeams.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.name;
      teamSelect.appendChild(opt);
    });
  }
}

// ── GRILLETTO (LISTENER) ─────────────────────────────────────────────
document.addEventListener('change', function(e) {
    if (e.target && (e.target.id === 'atleta-categoria' || e.target.name === 'category_id')) {
        updateAthleteTeams();
    }
});

// =========================
// INIT
// =========================

setTimeout(()=>{
  try{ renderDashboard(); }catch(e){}
},500);


// ── BACKGROUND SYNC: sincronizza S → Supabase ogni 60s ──────────
let _bgSyncInterval = null;
async function backgroundSync() {
  if (DB_MODE !== 'supabase' || !currentUser) return;
  try {
    // Ricarica tutti i dati freschi dal DB
    const fresh = await DB.loadAll();
    const activeSeason = (fresh.seasons||[]).find(s=>s.active);
    fresh.activeSeason = activeSeason?.id || fresh.seasons?.[0]?.id || S.activeSeason;
    // Mantieni le configurazioni locali non ancora in DB
    fresh.activityTypes  = S.activityTypes;
    fresh.perfParams     = S.perfParams;
    fresh.sessionTypePerfParams = S.sessionTypePerfParams;
    Object.assign(S, fresh);
    saveState();
  } catch(e) { console.warn('Background sync error:', e); }
}

function startBackgroundSync() {
  if (_bgSyncInterval) clearInterval(_bgSyncInterval);
  _bgSyncInterval = setInterval(backgroundSync, 60000);
}


</script>
