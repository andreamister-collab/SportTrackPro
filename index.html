<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportTrack Pro</title>
<style>
:root{--ink:#0D1117;--mist:#F0F4F8;--accent:#1A56DB;--radius:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,serif;background:var(--mist);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login{background:var(--white);border-radius:var(--radius);padding:40px;box-shadow:0 20px 40px rgba(0,0,0,.1);max-width:420px;width:100%;}
h1{font-size:2.2rem;background:linear-gradient(135deg,var(--accent),#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;margin-bottom:8px;}
p{color:#666;font-size:1rem;margin-bottom:24px;line-height:1.5;}
input{width:100%;padding:14px;margin:12px 0;border:2px solid #E2E8F0;border-radius:8px;font-size:16px;transition:all .2s;box-sizing:border-box;}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,219,.1);}
.btn{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn:hover{background:#1648C1;transform:translateY(-1px);box-shadow:0 8px 25px rgba(26,86,219,.3);}
.btn:disabled{background:#ccc;cursor:not-allowed;transform:none;}
#status{margin-top:16px;padding:12px;border-radius:8px;font-weight:500;}
.status-success{background:#D1FAE5;color:#065F46;border:1px solid #10B981;}
.status-error{background:#FEE2E2;color:#991B1B;border:1px solid #EF4444;}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),#3B82F6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:white;}
</style>
</head>
<body>
<div class="login">
  <div class="logo">
    <div class="logo-icon">🏆</div>
    <div>
      <h1>SportTrack Pro</h1>
      <p>Gestione società sportive</p>
    </div>
  </div>
  
  <input id="username" placeholder="Username (admin)" autocomplete="username">
  <input id="password" type="password" placeholder="Password (admin123)" autocomplete="current-password">
  
  <button class="btn" onclick="login()">Accedi</button>
  
  <div id="status"></div>
</div>

<script type="module">
  // Supabase - SOSTITUISCI CON I TUOI VALORI!
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  window.supabase = createClient(
    'https://saoghfehqrjgobcpiebz.supabase.co',  // ← CAMBIA QUESTO
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhb2doZmVocXJqZ29iY3BpZWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzgwMTcsImV4cCI6MjA4OTE1NDAxN30.3i6bHXbdmKppLt8r2n4YCD5rgeFnm6veeFPmReDmOMY'  // ← CAMBIA QUESTO
  )

  // ✅ FUNZIONE LOGIN DEFINITA GLOBALMENTE
  window.login = async function() {
    const username = document.getElementById('username').value.trim()
    const password = document.getElementById('password').value
    const status = document.getElementById('status')
    const btn = document.querySelector('.btn')
    
    if (!username || !password) {
      status.innerHTML = '❌ Inserisci username e password'
      status.className = 'status-error'
      return
    }
    
    btn.disabled = true
    btn.textContent = 'Connessione...'
    status.innerHTML = '🔄 Connessione a Supabase...'
    status.className = ''
    
    try {
      const { data, error } = await window.supabase.auth.signInWithPassword({
        email: username + '@sporttrackpro.it',
        password: password
      })
      
      if (error) {
        status.innerHTML = '❌ ' + error.message
        status.className = 'status-error'
      } else {
        status.innerHTML = '✅ Login riuscito! Caricamento dashboard...'
        status.className = 'status-success'
        
        // Carica dati e vai dashboard
        await loadDashboard()
      }
    } catch (err) {
      status.innerHTML = '❌ Errore di rete: ' + err.message
      status.className = 'status-error'
    } finally {
      btn.disabled = false
      btn.textContent = 'Accedi'
    }
  }

  async function loadDashboard() {
    const { data } = await window.supabase.from('sports').select('*')
    document.querySelector('.login').innerHTML += `
      <div style="margin-top:24px;padding:20px;background:#D1FAE5;border-radius:8px;">
        <h2>✅ SportTrack Pro Attivo!</h2>
        <p>Sports caricati: ${data?.length || 0}</p>
        <p><strong>Prossimo:</strong> Integrazione completa con tutte le view</p>
      </div>
    `
  }

  // Auto-focus
  document.getElementById('username').focus()
</script>
</body>
</html>
