/* ════════════════════════════════════════════════════════════
   MOBILE PORTRAIT — ottimizzazione completa
   ════════════════════════════════════════════════════════════ */

/* topbar-filter inline nel top-bar: si nasconde su schermi piccoli,
   i filtri appaiono sotto il topbar come riga collassabile */
@media (max-width: 480px) {
  #topbar-filter { display: none !important; }
  #topbar-filter.show-mobile { display: flex !important; }

  /* Top-bar più compatta */
  #top-bar { padding: 0 10px; min-height: 48px; flex-wrap: wrap; }
  .topbar-title { font-size: .9rem; }

  /* Contenuto scorrevole — padding-bottom gestito da body per bottom-nav */
  #content-area { padding: 12px 10px 16px; }

  /* Stats grid: 2 colonne compatte */
  .stats-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 8px !important;
    margin-bottom: 14px !important;
  }
  .stat-card { padding: 12px 10px 12px 18px !important; }
  .stat-card .value { font-size: 1.6rem !important; }
  .stat-card .label { font-size: .68rem !important; }
  .stat-card .sub { font-size: .7rem !important; }

  /* Cards */
  .card { padding: 14px !important; border-radius: 12px !important; }
  .card-title { font-size: .85rem !important; margin-bottom: 10px !important; }

  /* Tabelle: scroll orizzontale */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; }
  table { font-size: .78rem !important; }
  thead th { padding: 8px 10px !important; font-size: .65rem !important; }
  tbody td { padding: 8px 10px !important; }

  /* Bottoni touch-friendly */
  .btn { min-height: 44px !important; font-size: .85rem !important; }
  .btn-sm { min-height: 38px !important; font-size: .78rem !important; }

  /* Page header compatto */
  .page-header { margin-bottom: 14px !important; }
  .page-header h2 { font-size: 1.1rem !important; }
  .page-header p { font-size: .8rem !important; }

  /* Grid 1 colonna */
  .grid-2, .grid-3, .grid-auto { grid-template-columns: 1fr !important; gap: 10px !important; }

  /* Tabs scrollabili orizzontalmente */
  .tabs { overflow-x: auto; flex-wrap: nowrap !important; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
  .tab-btn { white-space: nowrap; flex-shrink: 0; padding: 6px 12px !important; font-size: .8rem !important; }

  /* Athlete rows compatte */
  .athlete-row { padding: 10px !important; }
  .athlete-row .name { font-size: .88rem !important; }
  .athlete-row .meta { font-size: .72rem !important; }

  /* Match cards */
  .match-header { padding: 12px 14px !important; }
  .match-score { font-size: 1.4rem !important; }
  .match-body { padding: 10px 14px !important; font-size: .82rem !important; }

  /* Presenze: celle più grandi per il touch */
  .att-cell { width: 42px !important; height: 42px !important; font-size: .95rem !important; }

  /* Filter bar inline */
  .filter-bar { gap: 8px !important; }
  .filter-bar input, .filter-bar select {
    min-width: 0 !important; flex: 1 1 120px !important;
    padding: 9px 10px !important; font-size: .85rem !important;
  }

  /* Modali bottom-sheet */
  .modal-overlay { align-items: flex-end !important; padding: 0 !important; }
  .modal {
    border-radius: 20px 20px 0 0 !important;
    max-height: 92vh !important;
    overflow-y: auto !important;
  }
  .modal::before {
    content: ''; display: block;
    width: 36px; height: 4px;
    background: #2D3748; border-radius: 2px;
    margin: 0 auto 14px;
  }

  /* Form fields */
  .form-row { flex-direction: column !important; gap: 10px !important; }
  .form-field input, .form-field select, .form-field textarea {
    padding: 11px 12px !important; font-size: .95rem !important; min-height: 44px !important;
  }
  .form-actions { flex-direction: column !important; gap: 8px !important; }
  .form-actions .btn { width: 100% !important; justify-content: center !important; }

  /* Header row: stack verticale */
  .header-row { flex-direction: column !important; align-items: stretch !important; gap: 10px !important; }
  .header-row > div:last-child { display: flex !important; flex-wrap: wrap !important; gap: 6px !important; }
  .header-row .btn { flex: 1 1 calc(50% - 3px) !important; min-height: 42px !important; text-align: center !important; justify-content: center !important; }

  /* Tab-bar azioni categoria */
  [style*="display:flex;align-items:center;gap:6px"] {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap !important;
  }

  /* Nascondi colonne non essenziali nelle tabelle */
  .hide-mobile { display: none !important; }
}

/* Tablet portrait (481-768px) */
@media (min-width: 481px) and (max-width: 768px) {
  #content-area { padding: 16px 14px 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .grid-2 { grid-template-columns: 1fr !important; }
  .tabs { overflow-x: auto; flex-wrap: nowrap !important; }
}

/* ── RESET ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-text-size-adjust: 100%; }
body { font-family: var(--font-body); background: #F1F5F9; color: #0F172A; min-height: 100vh; overscroll-behavior-y: none; }
button { cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
input, select, textarea { -webkit-tap-highlight-color: transparent; }
a { text-decoration: none; color: inherit; }
input, select, textarea { font-family: inherit; }
ul { list-style: none; }
h1,h2,h3,h4,h5 { font-family: var(--font-head); }

/* ── SCROLLBAR ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 99px; }

/* ── LOGIN SCREEN ───────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  min-height: 100dvh;
  display: block;          /* NON flex — layout normale scorrevole */
  background: linear-gradient(135deg, #1E40AF 0%, #1E293B 100%);
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
  padding: env(safe-area-inset-top, 0) 0 0 0;
}
#login-screen::before {
  content: '';
  position: fixed; inset: 0;   /* fixed così non scorre con la pagina */
  background: radial-gradient(ellipse 80% 60% at 60% 40%, rgba(26,86,219,.3) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
#login-screen .noise {
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: .5; pointer-events: none; z-index: 0;
}
/* Wrapper che centra la card su desktop, scorre su mobile */
#login-screen .login-wrap {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px max(32px, env(safe-area-inset-bottom));
}
.login-card {
  background: #FFFFFF;
  border: 1px solid #E2E8F0;
  border-radius: 20px;
  padding: 40px 36px;
  width: min(420px, 100%);
  box-shadow: 0 24px 60px rgba(0,0,0,.6);
  position: relative;
  z-index: 1;
  animation: loginIn .5s cubic-bezier(.22,1,.36,1) both;
  flex-shrink: 0;
}
@keyframes loginIn { from { opacity:0; transform:translateY(24px) scale(.97); } }
.login-logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 36px;
}
.login-logo .logo-icon {
  width: 46px; height: 46px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #3B82F6);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: white; box-shadow: 0 4px 12px rgba(26,86,219,.4);
}
.login-logo h1 { font-size: 1.5rem; color: #0F172A; letter-spacing: -.02em; }
.login-logo span { font-family: var(--font-body); font-weight: 400; color: #475569; font-size: .85rem; }
.login-card h2 { font-size: 1.35rem; margin-bottom: 6px; color: #0F172A; }
.login-card p { color: #64748B; font-size: .9rem; margin-bottom: 28px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: .82rem; font-weight: 600; color: #64748B; margin-bottom: 6px; letter-spacing: .03em; text-transform: uppercase; }
.form-group input, .form-group select {
  width: 100%; padding: 11px 14px; border: 1.5px solid #CBD5E0;
  border-radius: var(--radius); font-size: .95rem; color: #0F172A;
  background: #F8FAFC; transition: border-color .2s, box-shadow .2s;
  outline: none;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--accent); background: #FFFFFF;
  box-shadow: 0 0 0 3px rgba(79,134,247,.18);
}
.btn-primary {
  width: 100%; padding: 12px; background: var(--accent); color: white;
  border: none; border-radius: var(--radius); font-size: .95rem; font-weight: 600;
  font-family: var(--font-head); letter-spacing: .02em;
  transition: background .2s, transform .1s, box-shadow .2s;
  box-shadow: 0 4px 12px rgba(26,86,219,.35);
}
.btn-primary:hover { background: var(--accent-h); box-shadow: 0 6px 20px rgba(26,86,219,.45); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.login-hint { font-size: .8rem; color: #64748B; text-align: center; margin-top: 20px; line-height: 1.6; }
.login-hint strong { color: #0F172A; }


/* Login su mobile portrait */
@media (max-width: 480px) {
  #login-screen .login-wrap {
    align-items: flex-start;   /* non centrare verticalmente: scorre dall'alto */
    padding: 24px 16px max(24px, env(safe-area-inset-bottom));
    min-height: auto;
  }
  .login-card {
    padding: 28px 20px;
    border-radius: 16px;
    width: 100%;
  }
  .login-logo { margin-bottom: 24px; }
  .login-logo h1 { font-size: 1.2rem; }
  .login-card h2 { font-size: 1.1rem; }
  .login-card p { font-size: .85rem; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group input {
    padding: 13px 14px;
    /* iOS non fa zoom se font >= 16px */
    font-size: 16px;
    min-height: 48px;
  }
  .btn-primary {
    min-height: 48px;
    font-size: 1rem;
    margin-top: 4px;
  }
  .login-hint { font-size: .78rem; margin-top: 16px; }
}

/* ── MAIN LAYOUT ────────────────────────────────────────────── */
/* #app cresce con il contenuto — lo scroll avviene su body */
#app { display: none; min-height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

/* Main content cresce con il contenuto */
#main-content, .main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  /* NON mettere overflow qui: romperebbe position:sticky dei figli */
}

/* ── TOP NAVBAR ────────────────────────────────────────────── */
#topnav {
  background: #FFFFFF;
  border-bottom: 1px solid #E2E8F0;
  color: white;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.5);
  flex-shrink: 0;
}
.topnav-inner {
  display: flex; align-items: center;
  height: 56px; padding: 0 20px; gap: 0;
  overflow: visible;
}
.topnav-logo {
  display: flex; align-items: center; gap: 10px;
  margin-right: 24px; flex-shrink: 0; text-decoration: none;
}
.topnav-logo .logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #3B82F6);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.topnav-logo span { font-family: var(--font-head); font-size: 1rem; font-weight: 800; letter-spacing: -.01em; color: #0F172A; }
.topnav-logo span em { font-style: normal; color: #1A56DB; }

/* ── Dropdown menu items ── */
.topnav-menu { display: flex; align-items: stretch; flex: 1; gap: 2px; flex-wrap: nowrap; overflow: visible; }
.topnav-item { position: relative; }
.topnav-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 0 14px; height: 56px;
  background: none; border: none; color: #475569;
  font-family: var(--font-body); font-size: .875rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: color .15s, background .15s;
  border-bottom: 3px solid transparent;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.topnav-btn:hover { color: #1A56DB; background: #EBF5FF; }
.topnav-btn.active { color: #1A56DB; border-bottom-color: var(--accent); }
.topnav-btn .nav-arrow { font-size: .6rem; opacity: .7; transition: transform .2s; margin-left: 2px; }
.topnav-item:hover .nav-arrow { transform: rotate(180deg); }

/* ── Dropdown panel ── */
.topnav-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0;
  background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  min-width: 220px; padding: 6px;
  opacity: 0; visibility: hidden; pointer-events: none;
  transform: translateY(-8px);
  transition: opacity .18s, transform .18s, visibility .18s;
  z-index: 200;
}
.topnav-item.open .topnav-dropdown {
  opacity: 1; visibility: visible; pointer-events: auto;
  transform: translateY(0);
}
.topnav-item.open .topnav-btn { color: #1A56DB; background: #EBF5FF; }
.topnav-item.open .nav-arrow { transform: rotate(180deg); }
.dropdown-section-title {
  font-size: .68rem; font-weight: 700; color: #64748B;
  text-transform: uppercase; letter-spacing: .08em;
  padding: 8px 12px 4px; margin-top: 4px;
}
.dropdown-section-title:first-child { margin-top: 0; }
.dropdown-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; border-radius: 8px;
  background: none; border: none; width: 100%; text-align: left;
  font-family: var(--font-body); font-size: .875rem; font-weight: 500;
  color: #0F172A; cursor: pointer;
  transition: background .12s, color .12s;
  -webkit-tap-highlight-color: transparent;
}
.dropdown-item:hover, .dropdown-item:active { background: #F1F5F9; color: #1A56DB; }
.dropdown-item.active { background: #EBF5FF; color: var(--accent); font-weight: 600; }
.dropdown-item .d-icon { width: 20px; text-align: center; font-size: .95rem; flex-shrink: 0; }
.dropdown-divider { height: 1px; background: #F1F5F9; margin: 4px 8px; }
.dropdown-danger { color: var(--red) !important; }
.dropdown-danger:hover { background: var(--red-l) !important; }

/* ── Right side (season + user) ── */
.topnav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.season-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px; border-radius: 99px;
  background: #EBF5FF; border: 1px solid #BFDBFE;
}
.season-pill label { font-size: .75rem; color: #64748B; font-weight: 600; white-space: nowrap; cursor: default; }
.season-pill select {
  background: none; border: none; color: #1A56DB;
  font-family: var(--font-body); font-size: .82rem; font-weight: 700;
  cursor: pointer; outline: none; padding: 0;
}
.season-pill select option { color: #0F172A; background: white; }

/* ── User chip ── */
.topnav-user { position: relative; }
.topnav-user-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px; border-radius: 99px;
  background: #EBF5FF; border: 1px solid #BFDBFE;
  cursor: pointer; transition: background .15s;
}
.topnav-user-btn:hover { background: #DBEAFE; }
.user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #3B82F6);
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 700; color: white; flex-shrink: 0;
}
.topnav-user-btn .uname { font-size: .82rem; font-weight: 600; color: #1E293B; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.12);
  min-width: 200px; padding: 6px;
  opacity: 0; visibility: hidden; pointer-events: none;
  transform: translateY(-8px);
  transition: opacity .18s, transform .18s, visibility .18s;
  z-index: 200;
}
.topnav-user.open .user-dropdown {
  opacity: 1; visibility: visible; pointer-events: auto;
  transform: translateY(0);
}
.user-dropdown-header {
  padding: 10px 12px 8px; border-bottom: 1px solid #E2E8F0; margin-bottom: 4px;
}
.user-dropdown-header .uname-full { font-weight: 700; font-size: .9rem; color: #0F172A; }
.user-dropdown-header .urole { font-size: .75rem; color: #475569; margin-top: 2px; }

/* ── Bottom navigation bar (mobile only) ── */
#bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
  background: #FFFFFF;
  border-top: 1px solid #E2E8F0;
  box-shadow: 0 -4px 20px rgba(0,0,0,.08);
  padding: 6px 4px max(6px, env(safe-area-inset-bottom));
  display: none;
  grid-template-columns: repeat(5, 1fr);
  align-items: stretch;
}
.bn-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 6px 4px; border: none; background: none;
  cursor: pointer; border-radius: 10px; transition: background .15s;
  min-height: 52px;
}
.bn-item:hover, .bn-item:active { background: #F8FAFC; }
.bn-item.active { background: #EBF5FF; }
.bn-item.active .bn-icon { filter: none; }
.bn-item.active .bn-label { color: var(--accent); font-weight: 700; }
.bn-icon { font-size: 1.3rem; line-height: 1; }
.bn-label { font-size: .64rem; font-weight: 600; color: #64748B; white-space: nowrap; font-family: var(--font-body); }

@media (max-width: 900px) {
  #bottom-nav { display: grid; }
  /* Push content above bottom nav — padding sul body poiché lo scroll è su body */
  body { padding-bottom: max(80px, calc(68px + env(safe-area-inset-bottom))); }
  /* Adjust mobile menu to not cover bottom nav */
  #mobile-menu { inset: 56px 0 calc(68px + env(safe-area-inset-bottom)) 0; }
}

/* ── Mobile hamburger ── */
#sidebar-toggle {
  display: none;
  background: none; border: none; color: #1A56DB;
  font-size: 1.3rem; cursor: pointer; padding: 6px 8px;
  border-radius: 8px; transition: background .15s;
}
#sidebar-toggle:hover { background: rgba(255,255,255,.1); }

/* ── Mobile full-screen menu ── */
#mobile-menu {
  display: none;
  position: fixed; inset: 56px 0 0 0; z-index: 99;
  background: #1E293B; overflow-y: auto;
  padding: 12px 12px max(12px, env(safe-area-inset-bottom));
  -webkit-overflow-scrolling: touch;
}
#mobile-menu.open { display: block; }
.mobile-nav-section { margin-bottom: 16px; }
.mobile-nav-title {
  font-size: .68rem; font-weight: 700; color: rgba(255,255,255,.35);
  text-transform: uppercase; letter-spacing: .1em;
  padding: 6px 10px 4px;
}
.mobile-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px;
  background: none; border: none; color: rgba(255,255,255,.9);
  font-family: var(--font-body); font-size: .9rem; font-weight: 500;
  cursor: pointer; width: 100%; text-align: left;
  transition: background .12s, color .12s;
}
.mobile-nav-item:hover { background: rgba(255,255,255,.06); color: white; }

@media (max-width: 900px) {
  .topnav-menu { display: none; }
  #sidebar-toggle { display: block; }
  .topnav-logo { margin-right: auto; }
  .season-pill label { display: none; }
  #top-bar { top: 56px; }
}
@media (max-width: 480px) {
  #top-bar { top: 52px; }
}

#top-bar {
  height: var(--header-h);
  background: #FFFFFF;
  border-bottom: 1px solid #E2E8F0;
  display: flex;
  align-items: center;
  padding: 0 28px;
  /* sticky rispetto alla finestra, sotto la topnav */
  position: sticky;
  top: 56px;
  z-index: 50;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
  flex-shrink: 0;
}
.topbar-title { font-size: 1.1rem; font-weight: 700; color: #0F172A; font-family: var(--font-head); letter-spacing: -.01em; }
.topbar-breadcrumb { font-size: .8rem; color: #64748B; margin-left: 10px; }
.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }

/* content-area: NON deve avere overflow-y:auto.
   Lo scroll avviene sul body/html, così sticky funziona correttamente. */
#content-area {
  flex: 1;
  padding: 28px;
  background: #F1F5F9;
  overflow-x: hidden;
  /* padding-top compensato dal top-bar sticky tramite il flow flex normale */
}

/* ── VIEW TRANSITIONS ───────────────────────────────────────── */
.view { display: none; animation: viewIn .3s cubic-bezier(.22,1,.36,1) both; }
.view.active { display: block; overflow-x: hidden; min-width: 0; overflow-y: visible; }
@keyframes viewIn { from { opacity:0; transform:translateY(10px); } }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── PAGE HEADER ────────────────────────────────────────────── */
.page-header { margin-bottom: 28px; scroll-margin-top: calc(var(--header-h) + 8px); }
/* Assicura che il primo elemento di ogni view non venga coperto dal top-bar sticky */
.view.active > *:first-child { scroll-margin-top: calc(var(--header-h) + 8px); }
.page-header h2 { font-size: 1.65rem; color: #0F172A; font-weight: 800; letter-spacing: -.03em; }
.page-header p { color: #64748B; font-size: .9rem; margin-top: 4px; }
.page-header .header-row { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; }

/* ── CARDS ──────────────────────────────────────────────────── */
.card {
  background: #FFFFFF; border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm); border: 1px solid #E2E8F0;
  padding: 22px; overflow: hidden;
}
.card-title { font-size: .95rem; font-weight: 700; color: #0F172A; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-title .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }

/* ── STAT CARDS ─────────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card {
  background: #FFFFFF; border-radius: var(--radius-lg);
  padding: 20px; border: 1px solid #E2E8F0; box-shadow: var(--shadow-sm);
  position: relative; overflow: hidden; transition: box-shadow .2s, transform .2s;
}
.stat-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.stat-card .label { font-size: .78rem; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
.stat-card .value { font-size: 2rem; font-weight: 800; font-family: var(--font-head); line-height: 1; margin-bottom: 4px; }
.stat-card .sub { font-size: .78rem; color: #64748B; }
.stat-card .accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
.stat-card.blue .accent-bar { background: var(--accent); }
.stat-card.blue .value { color: var(--accent); }
.stat-card.gold .accent-bar { background: var(--gold); }
.stat-card.gold .value { color: var(--gold); }
.stat-card.green .accent-bar { background: var(--green); }
.stat-card.green .value { color: var(--green); }
.stat-card.red .accent-bar { background: var(--red); }
.stat-card.red .value { color: var(--red); }
.stat-card.purple .accent-bar { background: var(--purple); }
.stat-card.purple .value { color: var(--purple); }
.stat-card.teal .accent-bar { background: var(--teal); }
.stat-card.teal .value { color: var(--teal); }

/* ── GRID LAYOUTS ───────────────────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
/* ── RESPONSIVE / MOBILE ─────────────────────────────────────── */

@media (max-width: 900px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .convocati-grid { grid-template-columns: 1fr; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 500px; }
  .header-row { flex-direction: column; align-items: flex-start; gap: 10px; }
  .header-row > div:last-child { width: 100%; }
  .header-row .btn { flex: 1; justify-content: center; }
  .card { margin-bottom: 12px; }
  .filter-bar {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 14px 20px; background: #FFFFFF;
  border-bottom: 1px solid #E2E8F0; margin-bottom: 20px;
  border-radius: var(--radius-lg);
}
  .filter-bar input, .filter-bar select { min-width: 0; flex: 1 1 140px; }
  #top-bar { flex-wrap: wrap; gap: 6px; min-height: 52px; padding: 0 14px; }
  .modal { max-width: 100vw !important; width: 100vw; margin: 0; border-radius: 0; min-height: 100vh; }
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal-xl { max-width: 100vw !important; }
  .modal-lg { max-width: 100vw !important; }
  .att-cell { width: 36px; height: 36px; font-size: .9rem; }
  .match-header { padding: 14px 16px; }

/* ── SCROLLBAR — top + bottom via CSS ───────────────────────── */
/* Mirror scrollbar trick: shows scrollbar at top AND bottom for wide tables */
.table-wrap-x {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  /* Custom scrollbar styling */
  scrollbar-width: thin;
  scrollbar-color: var(--mist-3) transparent;
}
.table-wrap-x::-webkit-scrollbar { height: 6px; }
.table-wrap-x::-webkit-scrollbar-track { background: #F8FAFC; border-radius: 4px; }
.table-wrap-x::-webkit-scrollbar-thumb { background: var(--mist-3); border-radius: 4px; }
.table-wrap-x::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

/* Double-scroll wrapper: places scrollbar at top via transform trick */
.table-scroll-top {
  overflow-x: auto;
  overflow-y: hidden;
  transform: rotateX(180deg);
  scrollbar-width: thin;
}
.table-scroll-top > * {
  transform: rotateX(180deg);
}

/* All table-wraps get smooth scrolling and visible scrollbar */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--mist-3) transparent;
  padding-bottom: 4px; /* space for scrollbar */
}
.table-wrap::-webkit-scrollbar { height: 5px; }
.table-wrap::-webkit-scrollbar-track { background: #F8FAFC; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--mist-3); border-radius: 4px; }

/* ── CONTENT SIZING ─────────────────────────────────────────── */
/* Ensure views never exceed viewport */


/* Cards: prevent overflow on narrow screens */
.card { min-width: 0; overflow: hidden; }
.stat-card { min-width: 0; }
.stat-card .value { font-size: clamp(1.4rem, 3vw, 2.2rem); }
.stat-card .label { font-size: clamp(.7rem, 1.5vw, .8rem); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat-card[onclick] { transition: box-shadow .18s, transform .18s, filter .15s; }
.stat-card[onclick]:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px) scale(1.02); filter: brightness(1.03); }
.stat-card[onclick]:active { transform: translateY(0) scale(.99); }

/* ── PASSWORD STRENGTH ───────────────────────────────────────── */
#pw-strength-bar-wrap { animation: fadeIn .2s ease both; }


/* Page header: always wrap gracefully */
.page-header h2 { font-size: clamp(1.1rem, 3vw, 1.65rem); }

/* Tables: always scrollable horizontally */
.table-wrap table { min-width: min-content; }

/* ── TABLES ─────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .88rem;  min-width: 0;}
thead th {
  padding: 10px 14px; text-align: left; font-size: .75rem; font-weight: 700;
  color: #64748B; text-transform: uppercase; letter-spacing: .06em;
  background: #F8FAFC; border-bottom: 2px solid var(--mist-2); white-space: nowrap;
}
tbody tr { border-bottom: 1px solid #E2E8F0; transition: background .12s; }
tbody tr:hover { background: #F8FAFC; }
tbody td { padding: 11px 14px; vertical-align: middle; }
tbody tr:last-child { border-bottom: none; }

/* ── BUTTONS ────────────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: .85rem; font-weight: 600; border: none; cursor: pointer; transition: all .2s; white-space: nowrap; }
.btn-sm { padding: 6px 12px; font-size: .8rem; }
.btn-lg { padding: 12px 22px; font-size: .95rem; }
.btn-accent { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(26,86,219,.3); }
.btn-accent:hover { background: var(--accent-h); box-shadow: 0 4px 14px rgba(26,86,219,.4); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: #64748B; border: 1.5px solid #CBD5E0; }
.btn-ghost:hover { background: #F8FAFC; color: #0F172A; border-color: var(--mist-3); }
.btn-danger { background: var(--red); color: white; }
.btn-danger:hover { background: #B91C1C; }
.btn-success { background: var(--green); color: white; }
.btn-success:hover { background: #047857; }
.btn-gold { background: var(--gold); color: white; }
.btn-gold:hover { background: #B45309; }

/* ── BADGES ─────────────────────────────────────────────────── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 99px; font-size: .75rem; font-weight: 700; }
.badge-blue { background: var(--accent-l); color: var(--accent); }
.badge-gold { background: var(--gold-l); color: var(--gold); }
.badge-green { background: var(--green-l); color: var(--green); }
.badge-red { background: var(--red-l); color: var(--red); }
.badge-purple { background: var(--purple-l); color: var(--purple); }
.badge-teal { background: var(--teal-l); color: var(--teal); }
.badge-gray { background: #F1F5F9; color: #475569; }

/* ── ACTIVITY TYPE CHIPS ────────────────────────────────────── */
.act-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: .78rem; font-weight: 700; }
.act-A { background: rgba(26,86,219,.1); color: var(--sport-a); }
.act-P { background: rgba(217,119,6,.1); color: var(--sport-p); }
.act-I { background: rgba(5,150,105,.1); color: var(--sport-i); }
.act-PS { background: rgba(124,58,237,.1); color: var(--sport-ps); }

/* ── FORMS ───────────────────────────────────────────────────── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row.trio { grid-template-columns: 1fr 1fr 1fr; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-field label { font-size: .78rem; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: .04em; }
.form-field input, .form-field select, .form-field textarea {
  padding: 9px 12px; border: 1.5px solid #CBD5E0; border-radius: 8px;
  font-size: .9rem; color: #0F172A; background: #F8FAFC;
  transition: border-color .2s, box-shadow .2s; outline: none;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--accent); background: white; box-shadow: 0 0 0 3px rgba(26,86,219,.1);
}
.form-field textarea { resize: vertical; min-height: 80px; }
.form-actions { display: flex; gap: 10px; padding-top: 8px; }
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 20px; backdrop-filter: blur(3px);
  animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity: 0; } }
.modal {
  background: white; border-radius: 18px; padding: 30px;
  width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); animation: modalIn .25s cubic-bezier(.22,1,.36,1) both;
  -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
}
.modal-lg { max-width: 760px; }
.modal-xl { max-width: 960px; }
@keyframes modalIn { from { opacity:0; transform:scale(.94) translateY(12px); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.modal-header h3 { font-size: 1.2rem; color: #0F172A; }
.modal-close { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: #64748B; padding: 4px; border-radius: 6px; }
.modal-close:hover { background: #F8FAFC; color: var(--red); }

/* ── PROGRESS BAR ───────────────────────────────────────────── */
.progress-bar { height: 6px; background: #F1F5F9; border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.22,1,.36,1); }
.progress-fill.green { background: var(--green); }
.progress-fill.gold { background: var(--gold); }
.progress-fill.red { background: var(--red); }
.progress-fill.blue { background: var(--accent); }

/* ── ATTENDANCE MATRIX ─────────────────────────────────────── */
.att-matrix { font-size: .8rem; }
.att-matrix table { border-collapse: separate; border-spacing: 2px; }
.att-matrix th { font-size: .68rem; padding: 4px 6px; background: #F8FAFC; border-radius: 4px; }
.att-cell {
  width: 32px; height: 32px; border-radius: 6px; display: inline-flex;
  align-items: center; justify-content: center; font-size: .75rem; font-weight: 700;
  cursor: pointer; transition: transform .1s; user-select: none; border: none;
}
.att-cell:hover { transform: scale(1.15); }
.att-P { background: var(--green-l); color: var(--green); }
.att-A { background: var(--red-l); color: var(--red); }
.att-G { background: var(--gold-l); color: var(--gold); }
.att-empty { background: #F1F5F9; color: #64748B; }
.att-C  { background: var(--accent-l); color: var(--accent); }
.att-NC { background: #F1F5F9;   color: #64748B; }

/* ── PERFORMANCE STARS ─────────────────────────────────────── */
.stars { display: flex; gap: 2px; }
.star { font-size: 1rem; cursor: pointer; color: var(--mist-3); transition: color .1s; }
.star.on { color: var(--gold); }
.star:hover { transform: scale(1.2); }

/* ── PERF RADAR (CSS-only mini chart) ─────────────────────── */
.perf-bars { display: flex; flex-direction: column; gap: 8px; }
.perf-bar-row { display: flex; align-items: center; gap: 10px; }
.perf-bar-label { font-size: .78rem; color: #64748B; width: 100px; flex-shrink: 0; }
.perf-bar-track { flex: 1; height: 8px; background: #F1F5F9; border-radius: 99px; overflow: hidden; }
.perf-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width .6s cubic-bezier(.22,1,.36,1); }
.perf-bar-val { font-size: .78rem; font-weight: 700; color: #0F172A; width: 28px; text-align: right; font-family: var(--font-mono); }

/* ── TABS ────────────────────────────────────────────────────── */
.tabs { display: flex; gap: 4px; background: #E2E8F0; border-radius: 10px; padding: 4px; margin-bottom: 20px; }
.tab-btn {
  flex: 1; padding: 8px 14px; border: none; border-radius: 7px; cursor: pointer;
  font-size: .85rem; font-weight: 600; color: #64748B; background: transparent;
  transition: all .2s; font-family: inherit;
}
.tab-btn.active { background: white; color: #0F172A; box-shadow: var(--shadow-sm); }

/* ── ENTITY CARDS ────────────────────────────────────────────── */
.entity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.entity-card {
  background: white; border-radius: var(--radius-lg); border: 1px solid #E2E8F0;

}

/* ── SESSION ENTRY ───────────────────────────────────────────── */
.session-header {

.legend-item { display: flex; align-items: center; gap: 6px; font-size: .8rem; }

/* ── DASHBOARD WIDGETS ──────────────────────────────────────── */
.widget-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
@media (max-width: 1000px) { .widget-row { grid-template-columns: 1fr; } }

/* ── SEARCH / FILTER BAR ────────────────────────────────────── */
.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
.filter-bar input { flex: 1; min-width: 200px; padding: 9px 14px; border: 1.5px solid #CBD5E0; border-radius: 8px; font-size: .9rem; background: #F8FAFC; color: #0F172A; outline: none; }
.filter-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,219,.1); }
.filter-bar select { padding: 9px 12px; border: 1.5px solid #CBD5E0; border-radius: 8px; font-size: .88rem; background: #F8FAFC; color: #0F172A; outline: none; cursor: pointer; }

.empty-state { text-align: center; padding: 56px 20px; color: #64748B; }
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: .5; }

.empty-state p { font-size: .88rem; max-width: 320px; margin: 0 auto 20px; }

/* ── TOAST ──────────────────────────────────────────────────── */
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--ink); color: white; padding: 12px 18px; border-radius: 10px;
  font-size: .88rem; font-weight: 500; box-shadow: var(--shadow-lg);
  display: flex; align-items: center; gap: 8px; min-width: 260px; max-width: 380px;
  animation: toastIn .3s cubic-bezier(.22,1,.36,1) both;
}
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }
.toast.warning { background: var(--gold); }

/* ── CHART PLACEHOLDER ──────────────────────────────────────── */
.mini-chart { position: relative; }
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; padding: 0 4px; }
.bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar-fill { width: 100%; border-radius: 4px 4px 0 0; transition: height .5s cubic-bezier(.22,1,.36,1); min-height: 4px; }
.bar-label { font-size: .65rem; color: #64748B; text-align: center; }

/* ── PARTITE & CONVOCATI ─────────────────────────────────────── */
.match-card {
  border-radius: var(--radius-lg); overflow: hidden;
  box-shadow: var(--shadow); margin-bottom: 16px;
  transition: transform .2s, box-shadow .2s;
}
.match-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.match-header {
  padding: 18px 22px; color: white; position: relative;
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.match-header::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,.3) 0%, transparent 100%);
  pointer-events: none;
}
.match-header > * { position: relative; z-index: 1; }
.match-score { font-size: 2.2rem; font-weight: 900; font-family: var(--font-head); letter-spacing: -.03em; }
.match-result-W { border-left: 5px solid #22c55e; }
.match-result-D { border-left: 5px solid #eab308; }
.match-result-L { border-left: 5px solid #ef4444; }

  async login(username, password) {
    const email = username.includes('@') ? username : username + '@sporttrackpro.it';

    if (error) throw new Error(error.message);

    // Carica profilo — prova prima con RPC (bypassa RLS), poi diretto, poi fallback
    let profile = null;

    // Tentativo 1: RPC get_my_profile (SECURITY DEFINER, bypassa RLS)
    try {
      const { data: rpcData, error: rpcErr } = await sb.rpc('get_my_profile');
      if (!rpcErr && rpcData) { profile = rpcData; }
    } catch(e) {}

    // Tentativo 2: lettura diretta (funziona se RLS è disabilitato o policy ok)
    if (!profile) {
      const { data: direct } = await sb
        .from('users').select('*').eq('id', data.user.id).maybeSingle();
      if (direct) profile = direct;
    }

    // Tentativo 3: fallback dai metadati auth
    if (!profile) {
      profile = {
        id: data.user.id,
        email: data.user.email,
        name: data.user.user_metadata?.name || data.user.email.split('@')[0],

        role: data.user.user_metadata?.role || 'admin',
        society_id: data.user.user_metadata?.society_id || null,
      };
    }

    return profile;
  },

// ══════════════════════════════════════════════════════════════════
//  sbSync — helper centralizzato sync diretto su Supabase
//  Chiamato ESPLICITAMENTE da ogni funzione CRUD dopo aver modificato S
//  sbSync('athletes', obj)        → upsert
//  sbSync('athletes', id, true)   → delete
//  sbSync('athletes', [o1,o2])    → upsert multiplo
// ══════════════════════════════════════════════════════════════════
async function sbSync(table, objOrId, isDelete = false) {
  if (DB_MODE !== 'supabase' || !currentUser) return;
  // Verifica sessione attiva
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    console.warn('[sbSync] Nessuna sessione attiva — skip sync');
    toast('⚠️ Sessione scaduta, rieffettua il login', 'warning');
    return;
  }
  try {
    if (isDelete) {
      const id = typeof objOrId === 'string' ? objOrId : objOrId?.id;
      if (!id) return;
      const { error } = await sb.from(table).delete().eq('id', id);
      if (error) throw error;
      console.log(`[sbSync] DELETE ${table} id=${id} ✅`);
      return;
    }
    const rows = Array.isArray(objOrId) ? objOrId : [objOrId];
    // Assicura che society_id sia valorizzato per tabelle che lo richiedono
    // NOTA: sessions, attendances, performances, convocati NON hanno society_id nel DB
    const TABLES_WITH_SOCIETY = ['categories','athletes','seasons','teams'];
    const fallbackSocId = currentUser.societyId || S.societies?.[0]?.id || null;
    const enriched = rows.map(obj => {
      if (TABLES_WITH_SOCIETY.includes(table) && !obj.societyId && !obj.society_id) {
        return { ...obj, societyId: fallbackSocId };
      }
      return obj;
    });
    const mapped = enriched.map(obj => toSnakeCase(table, obj));
    if (mapped.length === 0) return;
    console.log(`[sbSync] UPSERT ${table}`, mapped);
    // Upsert robusto: prova upsert, se 409/23505 fa update esplicito
    const { error } = await sb.from(table).upsert(mapped, {
      onConflict: 'id',
      ignoreDuplicates: false
    });
    if (error) {
      // 409 o 23505 = record già esistente → prova UPDATE esplicito
      if (error.code === '23505' || error.status === 409 || (error.message||'').includes('409')) {
        console.warn(`[sbSync] Upsert conflict su ${table}, provo UPDATE esplicito...`);
        let updateOk = true;
        for (const row of mapped) {
          const { id, ...fields } = row;
          if (!id) continue;
          const { error: updErr } = await sb.from(table).update(fields).eq('id', id);
          if (updErr) {
            console.error(`[sbSync] UPDATE fallito su ${table} id=${id}:`, updErr.message);
            updateOk = false;
          }
        }
        if (updateOk) {
          console.log(`[sbSync] UPDATE ${table} OK ✅`);
          const lbl = document.getElementById('db-status-label');
          if (lbl) { lbl.textContent = 'Salvato ✓'; setTimeout(() => { lbl.textContent = 'Supabase'; }, 2000); }
          return;
        }
      }
      console.error(`[sbSync] ERRORE ${table}:`, error);
      let msg = error.message;
      if (error.code === '42501') msg = `Permesso negato su "${table}" — controlla RLS policies`;
      if (error.code === 'PGRST301') msg = `JWT scaduto — rieffettua il login`;
      toast(`❌ DB ${table}: ${msg}`, 'error');
      return;
    }
    console.log(`[sbSync] UPSERT ${table} OK ✅`);
    // Aggiorna indicatore sync nella topbar
    const lbl = document.getElementById('db-status-label');
    if (lbl) { lbl.textContent = 'Salvato ✓'; setTimeout(() => { lbl.textContent = 'Supabase'; }, 2000); }
  } catch(e) {
    console.error(`[sbSync] exception su ${table}:`, e);
    toast(`❌ Errore sync ${table}: ${e.message}`, 'error');
  }
}

async function sbSyncDeleteWhere(table, col, val) {
  if (DB_MODE !== 'supabase' || !currentUser) return;
  try {
    const { error } = await sb.from(table).delete().eq(col, val);
    if (error) console.error(`[sbSyncDeleteWhere] ${table}.${col}=${val}:`, error.message);
  } catch(e) { console.error(e); }
}

//  RPC HELPERS — chiamate a funzioni PostgreSQL SECURITY DEFINER
// ══════════════════════════════════════════════════════════════════
// ── GESTIONE UTENTI — solo anon key, nessuna service role ────

async function rpcCreateUser(params) {
  // Usa RPC create_app_user (SECURITY DEFINER) — crea Auth + profilo in un solo step
  const { data, error } = await sb.rpc('create_app_user', {
    p_email:      params.email,
    p_password:   params.password,
    p_name:       params.name,
    p_username:   params.username,
    p_role:       params.role,
    p_profession: params.profession || '',
    p_phone:      params.phone || '',
    p_society_id: params.society_id || null,
  });
  if (error) throw new Error(error.message);
  return data; // { id, email, username, name, role }
}

async function rpcResetPassword(userId, newPassword) {
  // Solo l'utente stesso può cambiare la propria password via Supabase Auth
  // Per reset admin → usa Supabase Dashboard → Authentication → Users
  throw new Error('Per resettare la password di altri utenti usa Supabase Dashboard → Authentication → Users → azione "..." → Reset password');
}

async function rpcDeleteUser(userId) {
  // Elimina solo il profilo da public.users
  // L'utente Auth va eliminato da Supabase Dashboard → Authentication → Users
  const { error } = await sb.from('users').delete().eq('id', userId);
  if (error) throw new Error(error.message);
  return true;
}

// ── Config sync (activityTypes, perfParams, sessionTypePerfParams) ─
// Salva le configurazioni locali in Supabase come JSON in tabella 'config'
// La tabella va creata con: CREATE TABLE config (key text primary key, value jsonb);
async function sbSyncConfig(key, value) {
  if (DB_MODE !== 'supabase' || !currentUser) return;
  try {
    const { error } = await sb.from('config').upsert({ key, value: JSON.stringify(value) }, { onConflict: 'key' });
    if (error) console.warn('[sbSyncConfig]', key, error.message);
  } catch(e) { console.warn('[sbSyncConfig]', e); }
}
async function loadConfigFromDB() {
  if (DB_MODE !== 'supabase') return;
  try {
    const { data } = await sb.from('config').select('*');
    if (!data) return;
    data.forEach(row => {
      try {
        const val = JSON.parse(row.value);
        if (row.key === 'activityTypes')         S.activityTypes = val;
        if (row.key === 'perfParams')             S.perfParams = val;
        if (row.key === 'sessionTypePerfParams')  S.sessionTypePerfParams = val;
      } catch(e) {}
    });
  } catch(e) {}
}


// ── PATCH: saveState usa Supabase invece di localStorage ─────────
async function saveStateDB() {
  if (DB_MODE !== 'supabase') { saveState(); return; }
}

// Override saveState per modalità ibrida
// (le funzioni specifiche chiamano sbSync direttamente)

// ── PATCH: loadState usa Supabase ────────────────────────────────
// Guard: evita chiamate parallele multiple (bug che causava 3x log consecutivi)
let _loadStateInProgress = false;
async function loadStateFromDB() {
  if (_loadStateInProgress) return; // già in corso — esce senza fare nulla
  try {
    const data = await DB.loadAll();
    // Pulisci localStorage e sovrascrivi S completamente con dati freschi dal DB
    localStorage.removeItem(STORE_KEY);
    const activeSeason = (data.seasons||[]).find(s=>s.active);
    data.activeSeason = activeSeason?.id || data.seasons?.[0]?.id || null;
    // Sovrascrivi completamente S (non Object.assign che mantiene vecchi valori)
    S.sports         = data.sports         || [];
    S.societies      = data.societies      || [];
    S.teams          = data.teams          || [];
    S.seasons        = data.seasons        || [];
    S.users          = data.users          || [];
    S.categories     = data.categories     || [];
    S.athletes       = data.athletes       || [];
    S.athleteSeasons = data.athleteSeasons || [];
    S.sessions       = data.sessions       || [];
    S.attendances    = data.attendances    || [];
    S.performances   = data.performances   || [];
    S.convocati      = data.convocati      || [];
    S.scorers        = data.scorers        || [];

    // Filtra matches per society_id dell'utente corrente
    // Se l'admin non ha societyId → vede tutte; altrimenti filtra per la sua società
    const userSocId = currentUser?.societyId || null;
    const accCatIds = new Set((data.categories || [])
      .filter(c => !userSocId || c.societyId === userSocId)
      .map(c => c.id));
    S.matches = (data.matches || []).filter(m =>
      !userSocId || m.societyId === userSocId || accCatIds.has(m.categoryId)
    );
    S.activeSeason   = data.activeSeason;
    S.staffHistory   = data.staffHistory   || [];
    // Carica configurazioni locali da tabella config
    await loadConfigFromDB();
    // Snapshot per il dirty-tracking
    _prevState = JSON.parse(JSON.stringify(S));

  } catch(e) {
    console.error('Errore caricamento DB:', e);
    toast('Errore caricamento dati: ' + e.message, 'error');
  } finally {
    _loadStateInProgress = false;
  }
}
</script>

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    // In modalità Supabase: se non c'è cache locale usa stato minimo (non defaultState)
    // I dati reali verranno caricati da loadStateFromDB dopo il login
    if (!raw) {

        seasons:[], athleteSeasons:[], staffHistory:[],
        activityTypes:null, perfParams:null, sessionTypePerfParams:null,

      };
      return;
    }
    S = JSON.parse(raw);
    // Ensure new fields exist for users loading old data
    if (!S.matches)        S.matches = [];
    if (!S.convocati)      S.convocati = [];
    if (!S.athleteRoles)   S.athleteRoles = {};
    if (!S.seasons)        S.seasons = [{ id:'seas1', name:'2024/2025', startYear:2024, endYear:2025, active:false },{ id:'seas2', name:'2025/2026', startYear:2025, endYear:2026, active:true }];

    if (!S.staffHistory)   S.staffHistory = [];
    if (!S.athleteSeasons) S.athleteSeasons = [];
    S.athletes.forEach(a => {
      if (a.nickname === undefined) a.nickname = '';
      if (a.teamId === undefined)   a.teamId = S.categories.find(c=>c.id===a.categoryId)?.teamId || '';
    });
    S.categories.forEach(c => {
      if (!c.managerIds)      c.managerIds = [];
      if (!c.coachIds)        c.coachIds = [];
      if (!c.professionalIds) c.professionalIds = [];
      if (!c.teamIds)         c.teamIds = c.teamId ? [c.teamId] : [];
    });
    (S.athleteSeasons||[]).forEach(as => {
      if (!as.teamId) as.teamId = S.athletes.find(a=>a.id===as.athleteId)?.teamId || '';
    });
    if (S.activityTypes === undefined) S.activityTypes = null;
    if (S.perfParams    === undefined) S.perfParams    = null;
  if (!S.userCategorySeasons) S.userCategorySeasons = [];
    if (S.sessionTypePerfParams === undefined) S.sessionTypePerfParams = null;
  } catch { S = defaultState(); }
}
  // Migrazione: allinea linkedSessionId ↔ sessionId per tutti i match
  if (S.matches) S.matches.forEach(function(m) {
    if (m.sessionId && !m.linkedSessionId) m.linkedSessionId = m.sessionId;
    if (m.linkedSessionId && !m.sessionId) m.sessionId = m.linkedSessionId;
  });
let _prevState = null;
function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(S));
  if (DB_MODE !== 'supabase' || !currentUser) return;
  // Detect which arrays changed and mark dirty
  const tables = [
    ['athletes','athletes'], ['sessions','sessions'],
    ['attendances','attendances'], ['matches','matches'],
    ['convocati','convocati'], ['categories','categories'],
    ['teams','teams'], ['users','users'], ['seasons','seasons'],
    ['athleteSeasons','athlete_seasons'], ['performances','performances'],
  ];
  for (const [key, table] of tables) {
    const curr = S[key] || [];
    const prev = (_prevState?.[key]) || [];
    // Find new/changed records
    for (const obj of curr) {
      const prevObj = prev.find(p => p.id === obj.id);
      if (!prevObj || JSON.stringify(prevObj) !== JSON.stringify(obj)) {
        markDirty(table, obj);
      }
    }
    // Find deleted records
    for (const obj of prev) {
      if (!curr.find(c => c.id === obj.id)) {
        markDeleted(table, obj.id);
      }
    }
  }
  _prevState = JSON.parse(JSON.stringify(S));
}

function uid() {
  // Genera UUID v4 compatibile con Supabase (tipo uuid)
  if (typeof crypto !== 'undefined' && crypto.randomUUID) {
    return crypto.randomUUID();
  }
  // Fallback manuale UUID v4
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}
function esc(str) { const d = document.createElement('div'); d.textContent = str||''; return d.innerHTML; }

function fmtDate(d) { if(!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('it-IT'); }
function pct(n, total) { if(!total || total <= 0) return 0; return Math.min(100, Math.round((n/total)*100)); }
function avg(arr) { if(!arr.length) return 0; return arr.reduce((a,b)=>a+b,0)/arr.length; }

function getActivityTypes() {

function getPerfParams() {
  if (S?.perfParams && Array.isArray(S.perfParams) && S.perfParams.length > 0) {
    return S.perfParams;
  }
  return PERF_PARAMS_DEFAULT;
}

function getPerfLabel(key) {
  if (S?.perfParams && Array.isArray(S.perfParams)) {
    const found = S.perfParams.find(p => (typeof p === 'object' ? p.key : p) === key);
    if (found && typeof found === 'object') return found.label;
  }
  return PERF_LABELS_DEFAULT[key] || key;
}

// Normalize perfParam entry — can be string or {key, label}
function normPerfParam(p) {
  if (typeof p === 'object' && p.key) return p;
  return { key: p, label: PERF_LABELS_DEFAULT[p] || p };
}

// Get the perf params enabled for a specific session type
// Default: all params for type 'A' (Allenamento), none for others
function getPerfParamsForType(typeKey) {
  const allParams = getPerfParams();
  if (S.sessionTypePerfParams) {
    const configured = S.sessionTypePerfParams[typeKey];
    if (Array.isArray(configured)) {
      // Return only params that are in the configured list AND exist in allParams
      return allParams.filter(rawP => {
        const key = typeof rawP === 'object' ? rawP.key : rawP;
        return configured.includes(key);
      });
    }
    // Explicitly set to [] means no perf for this type
    if (configured !== undefined && configured !== null) return [];
  }
  // Default: all params for Allenamento (A), none for others
  if (typeKey === 'A') return allParams;
  return [];
}

// Save perf config for a session type
function setSessionTypePerfParams(typeKey, paramKeys) {
  if (!S.sessionTypePerfParams) S.sessionTypePerfParams = {};
  S.sessionTypePerfParams[typeKey] = paramKeys;

// Returns athletes in a category, with optional teamId filter
function getCategoryAthletes(catId, teamId) {
  // Prima: cerca in athlete_seasons per stagione attiva
  const seasId = S.activeSeason;
  if (seasId) {
    const enrolled = (S.athleteSeasons||[]).filter(as => as.categoryId===catId && as.seasonId===seasId);
    if (enrolled.length > 0) {
      let list = enrolled.map(as => {
        const ath = S.athletes.find(a => a.id===as.athleteId);
        if (!ath) return null;
        return enrichAthleteForSeason(ath, seasId);
      }).filter(Boolean);
      if (teamId) list = list.filter(a => (a.teamId||'') === teamId);
      return list;
    }
  }
  // Fallback: legge categoryId dal campo legacy
  let list = S.athletes.filter(a => a.categoryId === catId);
  if (teamId) list = list.filter(a => a.teamId === teamId);
  return list;
}

// Returns all teams linked to a category (teamIds array, fallback to single teamId)
function getCategoryTeams(catId) {
  const cat = S.categories.find(c=>c.id===catId);
  if (!cat) return [];
  const ids = (cat.teamIds && cat.teamIds.length) ? cat.teamIds : (cat.teamId ? [cat.teamId] : []);
  return ids.map(id => S.teams.find(t=>t.id===id)).filter(Boolean);
}
function getCategorySessions(catId) {
  return S.sessions.filter(s => s.categoryId === catId).sort((a,b)=>a.date.localeCompare(b.date));
}
function getAthleteAvgPerf(athleteId) {
  const atts = getAthleteAttendances(athleteId).filter(a => a.status === 'P');
  const dynParams = getPerfParams().map(normPerfParam);
  const empty = Object.fromEntries(dynParams.map(p=>[p.key,0]));
  empty.overall = 0;
  if (!atts.length) return empty;
  const res = {};
  dynParams.forEach(({key}) => {
    const vals = atts.map(a => a.perf?.[key]||0).filter(v=>v>0);
    res[key] = vals.length ? avg(vals) : 0;
  });
  res.overall = dynParams.length > 0 ? avg(dynParams.map(({key}) => res[key]||0)) : 0;
  return res;
}
function getAthletePresenceRate(athleteId, categoryId) {
  const sessions = getCategorySessions(categoryId || S.athletes.find(a=>a.id===athleteId)?.categoryId);
  if (!sessions.length) return 0;
  const atts = S.attendances.filter(a => a.athleteId === athleteId && sessions.some(s => s.id === a.sessionId));
  const present = atts.filter(a => a.status === 'P').length;
  // Guard: never exceed 100%
  return Math.min(100, pct(present, sessions.length));
}

/** Ritorna {start, end} ISO per la stagione (es. 2025-07-01 / 2026-06-30) */
function getSeasonDates(season) {
  if (!season) return { start: '1900-01-01', end: '2100-12-31' };
  // Priorità ai campi espliciti start_date/end_date (dopo migrazione DB)
  if (season.startDate) return { start: season.startDate, end: season.endDate || '2100-12-31' };
  const sy = season.startYear || season.start_year || 2000;
  const ey = season.endYear   || season.end_year   || (sy + 1);
  // Standard calcistico: 1 agosto anno_inizio → 31 luglio anno_fine
  return { start: `${sy}-08-01`, end: `${ey}-07-31` };
}

/** Filtra array di sessioni (hanno campo .date) per stagione */
function filterSessionsBySeason(sessions, seasonId) {
  if (!seasonId) return sessions;
  const seas = S.seasons.find(s => s.id === seasonId);
  if (!seas) return sessions;
  const { start, end } = getSeasonDates(seas);
  return sessions.filter(s => s.date >= start && s.date <= end);
}

/** Filtra array di partite per stagione */
function filterMatchesBySeason(matches, seasonId) {
  if (!seasonId) return matches;
  const seas = S.seasons.find(s => s.id === seasonId);
  if (!seas) return matches;
  const { start, end } = getSeasonDates(seas);
  return matches.filter(m => m.date >= start && m.date <= end);
}

/**
 * Ritorna i dati stagionali di un atleta per la stagione indicata.
 * Fallback ai campi legacy se non ci sono athlete_seasons.
 */
function getAthleteSeasonData(athleteId, seasonId) {
  const sid = seasonId || S.activeSeason;
  const as  = (S.athleteSeasons||[]).find(x => x.athleteId===athleteId && (!sid || x.seasonId===sid));
  const ath = S.athletes.find(a => a.id===athleteId);
  if (!as) {
    // Fallback ai campi diretti sull'atleta (dati pre-migrazione)
    return {
      categoryId:  ath?.categoryId  || null,
      teamId:      ath?.teamId      || null,
      role:        ath?.role        || '',
      shirtNumber: ath?.number      || null,
      seasonId:    sid,
    };
  }
  return {
    categoryId:  as.categoryId,
    teamId:      as.teamId,
    role:        as.role || ath?.role || '',
    shirtNumber: as.shirtNumber || ath?.number || null,
    seasonId:    as.seasonId,
  };
}

/**
 * Ritorna la categoria di un atleta per la stagione attiva.
 */
function getAthleteCategoryId(athleteId, seasonId) {
  return getAthleteSeasonData(athleteId, seasonId).categoryId;
}

/**
 * Ritorna la squadra di un atleta per la stagione attiva.
 */
function getAthleteTeamId(athleteId, seasonId) {

}

/**
 * Ritorna il ruolo di un atleta per la stagione attiva.
 */
function getAthleteRole(athleteId, seasonId) {

}

/**
 * Ritorna il numero di maglia di un atleta per la stagione attiva.
 */
function getAthleteShirtNumber(athleteId, seasonId) {

}

/**
 * Ritorna il ruolo principale di un utente nella stagione indicata.
 * Usa UCS come fonte primaria, fallback al campo legacy users.role.

function getUserRole(userId, seasonId) {

/**
 * Ritorna la società di un utente nella stagione indicata.
 * Usa UCS come fonte primaria, fallback a users.societyId.
 */
function getUserSocietyId(userId, seasonId) {
  const sid = seasonId || S.activeSeason;
  const ucs = (S.userCategorySeasons||[]).find(u => u.userId===userId && (!sid || u.seasonId===sid));

/**
 * Ritorna la società di una categoria nella stagione indicata.
 * Usa UCS (unico legame stagionale cat↔soc), fallback a categories.societyId.
 */
function getCategorySocietyId(catId, seasonId) {
  const sid = seasonId || S.activeSeason;
  // La società della categoria si ricava dagli UCS della stagione
  const ucs = (S.userCategorySeasons||[]).find(u => u.categoryId===catId && (!sid || u.seasonId===sid));
  if (ucs?.societyId) return ucs.societyId;
  // Fallback legacy
  return S.categories.find(c => c.id===catId)?.societyId || null;
}

/**
 * Ritorna la società di una squadra nella stagione indicata.
 * Usa athlete_seasons o UCS, fallback a teams.societyId.
 */
function getTeamSocietyId(teamId, seasonId) {
  const sid = seasonId || S.activeSeason;
  const as = (S.athleteSeasons||[]).find(x => x.teamId===teamId && (!sid || x.seasonId===sid));
  if (as) return getCategorySocietyId(as.categoryId, sid);
  return S.teams.find(t => t.id===teamId)?.societyId || null;
}

/**
 * Ritorna le categorie di una società nella stagione indicata.
 */
function getSocietyCategoryIds(societyId, seasonId) {
  const sid = seasonId || S.activeSeason;
  // Fonte: UCS (associazioni stagionali utente-categoria)
  const fromUCS = [...new Set(
    (S.userCategorySeasons||[])
      .filter(u => u.societyId===societyId && (!sid || u.seasonId===sid))
      .map(u => u.categoryId)
  )];
  // Fonte: athlete_seasons (associazioni stagionali atleta-categoria)
  const fromAS = [...new Set(
    (S.athleteSeasons||[])
      .filter(as => (!sid || as.seasonId===sid))
      .map(as => as.categoryId)
      .filter(catId => {
        const cat = S.categories.find(c=>c.id===catId);
        return cat?.societyId === societyId;
      })
  )];
  // Fonte: legacy categories.societyId
  const fromLegacy = S.categories.filter(c=>c.societyId===societyId).map(c=>c.id);
  return [...new Set([...fromUCS, ...fromAS, ...fromLegacy])];
}

/**
 * Arricchisce un atleta con i dati stagionali per la stagione indicata.
 * Ritorna l'atleta con categoryId, teamId, role, number aggiornati.
 */
function enrichAthleteForSeason(ath, seasonId) {
  const sd = getAthleteSeasonData(ath.id, seasonId);
  return {
    ...ath,
    categoryId:  sd.categoryId  || ath.categoryId,
    teamId:      sd.teamId      || ath.teamId,
    role:        sd.role        || ath.role,
    number:      sd.shirtNumber || ath.number,
  };
}

/**
 * Arricchisce un utente con i dati stagionali (ruolo, società) per la stagione.
 */
function enrichUserForSeason(u, seasonId) {
  return {
    ...u,
    role:      getUserRole(u.id, seasonId),
    societyId: getUserSocietyId(u.id, seasonId),
  };
}

function getCategoryStats(catId, seasonId) {
  const seasId = seasonId || S.activeSeason;
  // getCategoryAthletesForSeason gestisce già il fallback correttamente
  let athletes = getCategoryAthletesForSeason(catId, seasId);
  // NON fare fallback qui: se 0 atleti per stagione, mostra 0
  const sessions = seasId
    ? getCategorySessionsForSeason(catId, seasId)
    : getCategorySessions(catId);
  const allAtts = S.attendances.filter(a => sessions.some(s => s.id === a.sessionId));
  const present = allAtts.filter(a => a.status === 'P').length;
  const total = athletes.length * sessions.length;
  const byType = {};
  Object.keys(ACTIVITY_TYPES).forEach(t => {
    const sessOfType = sessions.filter(s => s.type === t);
    byType[t] = sessOfType.length;
  });
  return { athletes: athletes.length, sessions: sessions.length, presenceRate: total > 0 ? pct(present, total) : 0, byType, present, total };
}

// Ritorna le iscrizioni stagionali di un atleta (ordinate per stagione desc)
function getAthleteSeasons(athleteId) {
  return (S.athleteSeasons||[]).filter(as => as.athleteId === athleteId)
    .sort((a,b) => {
      const sa = S.seasons.find(s=>s.id===a.seasonId);
      const sb2 = S.seasons.find(s=>s.id===b.seasonId);
      return (sb2?.startYear||0) - (sa?.startYear||0);
    });
}

// Ritorna l'iscrizione stagionale attiva per un atleta (stagione corrente)
function getAthleteActiveSeason(athleteId) {
  const active = getActiveSeason();
  if (!active) return null;
  return (S.athleteSeasons||[]).find(as => as.athleteId===athleteId && as.seasonId===active.id) || null;
}

// Salva/aggiorna un'iscrizione stagionale atleta
async function saveAthleteSeasonEntry(entry) {
  if (!S.athleteSeasons) S.athleteSeasons = [];
  const existing = S.athleteSeasons.find(as => as.id === entry.id);
  if (existing) {
    Object.assign(existing, entry);
  } else {
    S.athleteSeasons.push(entry);
  }
  saveState();
  // Assicura che l'atleta sia nel DB prima dell'insert FK
  const athExists = S.athletes.find(a=>a.id===entry.athleteId);
  if (athExists) await sbSync('athletes', athExists);
  await sbSync('athlete_seasons', entry);
  toast('Iscrizione stagionale salvata ✅', 'success');
}

// Elimina un'iscrizione stagionale atleta
async function deleteAthleteSeasonEntry(id) {
  S.athleteSeasons = (S.athleteSeasons||[]).filter(as => as.id !== id);
  saveState();
  await sbSync('athlete_seasons', id, true);
}

// Ritorna le UCS di un utente (user_category_seasons)
function getUserSeasons(userId) {
  return (S.userCategorySeasons||[]).filter(ucs => ucs.userId === userId)
    .sort((a,b) => {
      const sa = S.seasons.find(s=>s.id===a.seasonId);
      const sb2 = S.seasons.find(s=>s.id===b.seasonId);
      return (sb2?.startYear||0) - (sa?.startYear||0);
    });
}

// Ritorna categorie accessibili per un utente in una stagione specifica
function getUserCatIdsForSeason(userId, seasonId) {
  const ucs = (S.userCategorySeasons||[]).filter(u => u.userId===userId && (!seasonId||u.seasonId===seasonId));
  if (ucs.length) return ucs.map(u=>u.categoryId);
  // Fallback ai vecchi campi category.managerIds ecc.
  return S.categories.filter(c =>
    (c.managerIds||[]).includes(userId) ||
    (c.directorIds||[]).includes(userId) ||
    (c.coachIds||[]).includes(userId) ||
    (c.professionalIds||[]).includes(userId)
  ).map(c=>c.id);
}

// Salva/aggiorna una UCS
async function saveUCS(entry) {

  const existing = S.userCategorySeasons.find(u => u.id === entry.id);
  if (existing) {
    Object.assign(existing, entry);
  } else {
    S.userCategorySeasons.push(entry);
  }
  saveState();
  await sbSync('user_category_seasons', entry);
}

// Elimina una UCS
async function deleteUCS(id) {

}

function getAccessibleCategoryIds() {
  if (!currentUser) return [];
  const uid = currentUser.id;
  const r   = getUserRole(uid) || currentUser.role;

  if (r === 'admin') return S.categories.map(c => c.id);

  if (r === 'segretario' || r === 'presidente') {
    const mySocId = getUserSocietyId(uid);
    if (!mySocId) return S.categories.map(c => c.id);
    return getSocietyCategoryIds(mySocId);
  }

  if (r === 'genitore') {
    const myAthletes = S.athletes.filter(a => (a.parentIds||[]).includes(uid));
    const catIds = myAthletes.map(a => a.categoryId).filter(Boolean);
    // Aggiungi anche da athlete_seasons
    (S.athleteSeasons||[]).filter(as => myAthletes.some(a=>a.id===as.athleteId))
      .forEach(as => { if (as.categoryId && !catIds.includes(as.categoryId)) catIds.push(as.categoryId); });
    return [...new Set(catIds)];
  }

  // Staff roles (responsabile, dirigente, allenatore, professionista)
  // 1. UCS multi-stagione
  const ucsIds = (S.userCategorySeasons||[]).filter(u=>u.userId===uid).map(u=>u.categoryId);
  // 2. Fallback legacy (campi diretti sulla categoria)
  const legacyIds = S.categories.filter(c => {
    if (r === 'responsabile')   return (c.managerIds||[]).includes(uid);
    if (r === 'dirigente')      return (c.directorIds||[]).includes(uid);
    if (r === 'allenatore')     return (c.coachIds||[]).includes(uid);
    if (r === 'professionista') return (c.professionalIds||[]).includes(uid);
    return false;
  }).map(c => c.id);

  return [...new Set([...ucsIds, ...legacyIds])];
}

function canAccessCategory(catId) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  const r = getUserRole(currentUser.id) || currentUser.role;
  if (r === 'segretario' || r === 'presidente') {
    const mySocId = getUserSocietyId(currentUser.id);
    if (!mySocId) return true; // nessuna società → vede tutto
    return getCategorySocietyId(catId) === mySocId;
  }
  // Staff: controlla UCS per qualsiasi stagione
  const uid = currentUser.id;
  const ucsMatch = (S.userCategorySeasons||[]).some(u => u.userId===uid && u.categoryId===catId);
  if (ucsMatch) return true;
  // Fallback legacy
  const cat = S.categories.find(c=>c.id===catId);
  if (!cat) return false;
  return (cat.managerIds||[]).includes(uid) ||
         (cat.directorIds||[]).includes(uid) ||
         (cat.coachIds||[]).includes(uid) ||
         (cat.professionalIds||[]).includes(uid);
}

// What can a role DO in a category?
// Ritorna gli atleti associati al genitore loggato
function getMyChildren() {
  if (!currentUser || currentUser.role !== 'genitore') return [];
  return S.athletes.filter(a => (a.parentIds||[]).includes(currentUser.id));
}

function canEdit(catId) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  // Segretario: pieno accesso operativo (gestisce atleti, sessioni, associazioni)
  if (currentUser.role === 'segretario') return canAccessCategory(catId);
  // Presidente: sola lettura (agisce solo in assenza del segretario)
  if (currentUser.role === 'presidente') return false;
  if (currentUser.role === 'responsabile') return false;
  const cat = S.categories.find(c=>c.id===catId);
  if (!cat) return false;
  const r = currentUser.role;
  return ['dirigente','allenatore'].includes(r) && canAccessCategory(catId);
}

function canEditSessions(catId) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  if (currentUser.role === 'segretario') return canAccessCategory(catId);
  if (['presidente','responsabile'].includes(currentUser.role)) return false;
  return ['dirigente','allenatore'].includes(currentUser.role) && canAccessCategory(catId);
}

function isReadOnly(catId) {
  if (!currentUser) return true;
  if (currentUser.role === 'admin') return false;
  if (['professionista','presidente'].includes(currentUser.role)) return canAccessCategory(catId);
  return false;
}

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  if (!u || !p) { toast('Inserisci username e password', 'error'); return; }

  const btn = document.querySelector('#login-screen .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Connessione...'; }

  // Costruisci email dall'username
  // Prima cerca l'email reale in public.users tramite username
  let email = u.includes('@') ? u : u + '@sporttrackpro.it';

  try {
    // Step 0: cerca email reale da public.users tramite username
    if (!u.includes('@')) {
      const { data: userRow } = await sb
        .from('users').select('email').eq('username', u).maybeSingle();
      if (userRow?.email) {
        email = userRow.email;
        console.log('[Login] Email trovata da profilo:', email);
      }
    }

    // Step 1: autenticazione Supabase
    console.log('[Login] Tentativo auth:', email);
    const { data: authData, error: authErr } = await sb.auth.signInWithPassword({ email, password: p });

    if (authErr) {
      console.error('[Login] Auth error:', authErr);
      // Fallback localStorage
      const localUser = (S.users||[]).find(x => x.username === u && x.password === p);
      if (localUser) {
        DB_MODE = 'local';
        currentUser = localUser;
        _afterLogin(false); // locale: nessun DB, _afterLogin gestisce da sola
        toast('Connesso in modalità locale', 'warning');
        return;
      }
      let msg = authErr.message || 'Errore autenticazione';
      if (msg.includes('Invalid login')) msg = 'Username o password errati';
      else if (msg.includes('Email not confirmed')) msg = 'Conferma la tua email prima di accedere';
      toast('❌ ' + msg, 'error');
      return;
    }

    console.log('[Login] Auth ok, uid:', authData.user.id);

    // Step 2: carica profilo da public.users
    let profile = null;
    const { data: profileData, error: profileErr } = await sb
      .from('users').select('*').eq('id', authData.user.id).maybeSingle();

    if (profileErr) {
      console.warn('[Login] Profile error:', profileErr.message);
    } else if (profileData) {
      // Normalizza raw Supabase row (snake_case) con fallback robusti
      profile = {
        id:         profileData.id,
        name:       profileData.name       || profileData.username || u,
        username:   profileData.username   || u,
        email:      profileData.email      || authData.user.email,
        role:       profileData.role       || authData.user.user_metadata?.role || 'admin',
        society_id: profileData.society_id || null,
        societyId:  profileData.society_id || null,
        profession: profileData.profession || '',
        phone:      profileData.phone      || '',
      };
      console.log('[Login] Profile loaded:', profile.username, profile.role);
    }

    // Fallback: costruisci profilo dai metadati auth
    if (!profile) {
      console.warn('[Login] Profilo non in public.users, uso metadati auth');
      profile = {
        id:         authData.user.id,
        email:      authData.user.email,
        name:       authData.user.user_metadata?.name || u,
        username:   u,
        role:       authData.user.user_metadata?.role || 'admin',
        society_id: null,
        societyId:  null,
      };
    }

    currentUser = { ...profile, societyId: profile.society_id || profile.societyId };

    // Step 3: carica dati dal DB
    try {
      await loadStateFromDB();
    } catch(dbErr) {
      console.warn('[Login] DB load error (uso localStorage):', dbErr);
    }

    _afterLogin(true); // DB già caricato con await sopra

  } catch(e) {
    console.error('[Login] Unexpected error:', e);
    toast('❌ Errore imprevisto: ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Accedi →'; }
  }
}

function _afterLogin(dbAlreadyLoaded = false) {
  // Svuota localStorage e resetta S per forzare caricamento fresco da DB
  localStorage.removeItem(STORE_KEY);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  updateSidebarUser();
  rebuildSeasonSelector();
  document.getElementById('bottom-nav').style.display = '';
  startBackgroundSync();
  if (DB_MODE === 'supabase') {
    const dbEl = document.getElementById('db-status');
    if (dbEl) dbEl.style.display = 'flex';
  }

  // Funzione che naviga alla home corretta in base al ruolo
  function _goHome() {
    buildSidebarNav();
    rebuildSeasonSelector();
    // Pulisce l'hash residuo dall'URL per evitare che il browser ripristini
    // una vista sbagliata al prossimo reload (es. #category-home per un admin)
    const homeView =
      currentUser.role === 'admin'       ? 'admin-overview'      :
      currentUser.role === 'genitore'    ? 'parent-view'         :
      currentUser.role === 'presidente'  ? 'president-view'      :
      currentUser.role === 'responsabile'? 'responsabile-overview':
      (() => {
        const accIds = getAccessibleCategoryIds();
        if (accIds.length > 0) selectedCategoryId = accIds[0];
        return 'category-home';
      })();
    showView(homeView);
  }

  if (DB_MODE === 'supabase' && !dbAlreadyLoaded) {
    // Carica DB prima di costruire navbar e mostrare view
    loadStateFromDB().then(_goHome).catch(err => {
      console.warn('DB load failed in _afterLogin, using cache:', err);
      _goHome();
    });
  } else {
    // DB già caricato (chiamato da doLogin o auto-restore) — vai direttamente
    _goHome();
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});

// ── FIX MOBILE LOGIN: gestione tastiera virtuale ──────────────
// Su iOS/Android quando si apre la tastiera, scrolla la card in vista
(function() {
  function scrollLoginIntoView() {
    const screen = document.getElementById('login-screen');
    if (!screen || screen.style.display === 'none') return;
    const card = screen.querySelector('.login-card');
    if (card) {
      // Piccolo ritardo per attendere il resize del viewport
      setTimeout(() => {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 150);
    }
  }
  // Attiva quando un input del login riceve focus
  document.addEventListener('focusin', e => {
    if (e.target.closest('#login-screen')) scrollLoginIntoView();
  });
  // Visualizes resize: quando la tastiera si chiude/apre
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      const screen = document.getElementById('login-screen');
      if (!screen || screen.style.display === 'none') return;
      // Se la viewport si è rimpicciolita (tastiera aperta), scrolla al bottone
      const activeEl = document.activeElement;
      if (activeEl && activeEl.closest('#login-screen')) {
        setTimeout(() => activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
      }
    });
  }
})();

function buildSidebarNav() { buildTopNav(); }
function buildTopNav() {

  const mobileMenu = document.getElementById('mobile-menu');
  if (!menu) return;
  const r = currentUser.role;
  const accIds = getAccessibleCategoryIds();
  const rdef = ROLES[r] || ROLES.dirigente;

  // Helper: desktop dropdown item
  const dItem = (icon, label, onclick, danger=false) =>
    `<button class="dropdown-item${danger?' dropdown-danger':''}" onclick="closeAllDropdowns();${onclick}">
       <span class="d-icon">${icon}</span> ${label}
     </button>`;

  // Helper: desktop dropdown group with section title
  const dGroup = (title, itemsHtml) =>
    `<div class="topnav-item">
       <button class="topnav-btn" onclick="toggleDropdown(this.parentElement,event)">${title} <span class="nav-arrow">▾</span></button>
       <div class="topnav-dropdown">${itemsHtml}</div>
     </div>`;

  // Helper: mobile nav item
  const mItem = (icon, label, onclick) =>
    `<button class="mobile-nav-item" onclick="${onclick};closeMobileMenu()">${icon} ${label}</button>`;

  // Helper: mobile section
  const mSection = (title, itemsHtml) =>
    `<div class="mobile-nav-section">
       <div class="mobile-nav-title">${title}</div>
       ${itemsHtml}
     </div>`;

  // Build team dropdown items
  const buildTeamDropdownItems = (accIds) => {
    const cats = accIds ? S.categories.filter(c=>accIds.includes(c.id)) : S.categories;
    return cats.map(cat => {
      const catTeams = getCategoryTeams(cat.id);
      if (catTeams.length <= 1) {
        const t = catTeams[0];
        const label = t ? esc(t.name) : esc(cat.name);
        const sub = t ? `<span style="font-size:.72rem;color:#64748B;margin-left:4px">${esc(cat.name)}</span>` : '';
        return `<button class="dropdown-item" onclick="selectTeamView('${cat.id}','${t?t.id:''}');closeMobileMenu()">
          <span class="d-icon">👕</span> ${label} ${sub}
        </button>`;
      }
      // Multi-team category
      const teamBtns = catTeams.map(t =>
        `<button class="dropdown-item" style="padding-left:28px" onclick="selectTeamView('${cat.id}','${t.id}');closeMobileMenu()">
           <span class="d-icon" style="font-size:.8rem">👕</span> ${esc(t.name)}

      ).join('');
      return `<div class="dropdown-section-title">🏷️ ${esc(cat.name)}</div>

    const cats = accIds ? S.categories.filter(c=>accIds.includes(c.id)) : S.categories;
    return cats.map(cat => {
      const catTeams = getCategoryTeams(cat.id);
      if (catTeams.length <= 1) {
