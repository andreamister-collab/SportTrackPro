        return mItem('👕', label, `selectTeamView('${cat.id}','${t?t.id:''}')`);
      }
      const teamBtns = catTeams.map(t => mItem('👕', esc(t.name), `selectTeamView('${cat.id}','${t.id}')`)).join('');
      return `<div style="padding:4px 12px 2px;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase">🏷️ ${esc(cat.name)}</div>${teamBtns}`;

        dItem('🔧','Impostazioni',`showAdminConfig('settings')`) +

        '<div class="dropdown-divider"></div>' +
        dItem('🗑️','Reset Demo',`if(confirm('Reset tutti i dati?'))resetState()`, true)
      ) +

    mobileHTML =
      mSection('Panoramica',

function buildTeamNavItems(accIds) {
  const cats = accIds ? S.categories.filter(c=>accIds.includes(c.id)) : S.categories;
  return cats.map(cat => {
    const catTeams = getCategoryTeams(cat.id);
    if (catTeams.length === 0) {
      // Category has no teams defined — show as single item
      return `<button class="nav-item sub ${selectedCategoryId===cat.id && !window._dashTeam?'active':''}"
          onclick="selectTeamView('${cat.id}','')">
          <span class="nav-icon">🏷️</span> ${esc(cat.name)}
        </button>`;
    }
    if (catTeams.length === 1) {
      // Single team — show as flat item with team name
      const t = catTeams[0];
      return `<button class="nav-item sub ${selectedCategoryId===cat.id && (window._dashTeam===t.id||!window._dashTeam)?'active':''}"
          onclick="selectTeamView('${cat.id}','${t.id}')">
          <span class="nav-icon">👕</span> ${esc(t.name)}
          <span style="color:var(--ink-4);font-size:.7rem;margin-left:4px">${esc(cat.name)}</span>
        </button>`;
    }
    // Multi-team: show category header + each team indented
    const teamBtns = catTeams.map(t =>
      `<button class="nav-item sub ${selectedCategoryId===cat.id && window._dashTeam===t.id?'active':''}"
          onclick="selectTeamView('${cat.id}','${t.id}')"
          style="padding-left:28px">
          <span class="nav-icon" style="font-size:.8rem">👕</span> ${esc(t.name)}
        </button>`
    ).join('');
    // "All teams" pill for this category

// ── MUTATION TRACKER per Supabase sync ───────────────────────────
// Chiama dopo aver modificato un'entità: markDirty('athletes', obj)
const _dirtyQueue = new Map(); // table → Set of objects to upsert
const _deleteQueue = new Map(); // table → Set of ids to delete

function markDirty(table, obj) {
  if (DB_MODE !== 'supabase') return;
  if (!_dirtyQueue.has(table)) _dirtyQueue.set(table, new Map());
  _dirtyQueue.get(table).set(obj.id, obj);
  scheduleSyncFlush();
}
function markDeleted(table, id) {
  if (DB_MODE !== 'supabase') return;
  if (!_deleteQueue.has(table)) _deleteQueue.set(table, new Set());
  _deleteQueue.get(table).add(id);
  // Remove from dirty if was there
  _dirtyQueue.get(table)?.delete(id);
  scheduleSyncFlush();
}

let _flushTimer = null;
function scheduleSyncFlush() {
  if (_flushTimer) clearTimeout(_flushTimer);
  _flushTimer = setTimeout(flushToSupabase, 800); // debounce 800ms
}

// Converte oggetto camelCase → snake_case per la tabella specifica
// Tables with fixed column lists (no society_id)
const TABLE_COLUMNS = {
  sports:    ['id','name','icon'],
  societies: ['id','name','sport_id','city','email'],
};

// Colonne reali per ogni tabella (da schema Supabase verificato)
const TABLE_REAL_COLUMNS = {
  // ══════════════════════════════════════════════════════════
  // MODELLO SEPARATO: anagrafica permanente vs associazioni stagionali
  // Le entità contengono solo dati anagrafici stabili.
  // Tutte le associazioni (categoria, squadra, ruolo, società)
  // sono gestite per stagione in athlete_seasons e user_category_seasons.
  // ══════════════════════════════════════════════════════════

  // ANAGRAFICHE (dati permanenti, indipendenti dalla stagione)
  sports:     ['id','name','icon'],
  societies:  ['id','name','sport_id','city','email'],
  teams:      ['id','name','sport_id'],
  seasons:    ['id','name','start_year','end_year','active','start_date','end_date'],
  users:      ['id','name','username','email','profession','phone'],
  categories: ['id','name','sport_id'],
  athletes:   ['id','first_name','last_name','dob','nickname','notes','parent_ids'],

  // ASSOCIAZIONI STAGIONALI (chi fa cosa, in quale stagione e dove)
  // athlete_seasons: collega atleta ↔ categoria ↔ squadra ↔ stagione
  athlete_seasons:       ['id','athlete_id','category_id','season_id','team_id','role','shirt_number','join_date','notes'],
  // user_category_seasons: collega utente ↔ categoria ↔ stagione ↔ ruolo ↔ società
  user_category_seasons: ['id','user_id','category_id','season_id','role','society_id'],

  // ATTIVITÀ (sempre legate a categoria + data, quindi implicitamente alla stagione)
  sessions:     ['id','category_id','date','type','notes','match_id','created_by'],
  attendances:  ['id','session_id','athlete_id','status'],
  performances: ['id','session_id','athlete_id','params','notes'],
  matches:      ['id','category_id','team_id','date','time','meet_time','meet_place','opponent','home_away','result','scored','conceded','notes','bg_color','created_by'],
  convocati:    ['id','match_id','athlete_id','status','notes'],
  scorers:      ['id','match_id','athlete_id','goals','notes'],
  config:       ['key','value'],
};

function toSnakeCase(table, obj) {
  // Conversione automatica camelCase → snake_case per tutti i campi
  function camelToSnake(str) {
    return str.replace(/[A-Z]/g, l => '_' + l.toLowerCase());
  }

  // Mappings espliciti per casi speciali
  const explicitMaps = {
    scoredGoals:      'scored',
    concededGoals:    'conceded',
    professionalIds:  'prof_ids',
  };

  // Campi da escludere sempre
  const exclude = new Set(['password','role_label','gradient','password_hash','teamId_old']);

  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    if (exclude.has(k)) continue;
    const sk = explicitMaps[k] || camelToSnake(k);
    out[sk] = v;
  }

  // Converti stringhe vuote in null per colonne time/date
  const timeFields = new Set(['time','meet_time','join_date','dob']);
  for (const k of Object.keys(out)) {
    if (timeFields.has(k) && out[k] === '') out[k] = null;
  }

  // Filtra solo le colonne realmente presenti nel DB
  const realCols = TABLE_REAL_COLUMNS[table];
  if (realCols) {
    const filtered = {};
    for (const col of realCols) {
      if (col in out) filtered[col] = out[col];
    }
    return filtered;
  }
  return out;
}

const DB_REFRESH_VIEWS = new Set([

function showView(viewId, pushHistory=true) {
  // Genitore può vedere solo parent-view
  if (currentUser?.role === 'genitore' && viewId !== 'parent-view') {
    viewId = 'parent-view';
  }
  // Presidente può vedere solo alcune viste
  const presidentAllowed = [
    'president-view','admin-config','cat-dashboard',
    'admin-society','admin-reports',
    'athletes','matches','matches-overview','sessions','attendances',
    'convocati','cat-reports','user-detail','add-user'
  ];
  // Segretario: stessi permessi del presidente + gestione atleti e sessioni
  const segretarioAllowed = [
    'president-view','admin-config','cat-dashboard','category-home',
    'admin-society','admin-reports',
    'athletes','admin-athletes','matches','matches-overview','sessions','attendances',
    'convocati','cat-reports','user-detail','add-user','athlete-profile','session-entry'
  ];
  // Responsabile: solo lettura, può navigare le sue squadre
  const respAllowed = [
    'responsabile-overview','cat-dashboard','category-home',
    'athletes','matches','matches-overview','sessions','attendances',
    'convocati','cat-reports','session-entry','athlete-profile','user-detail'
  ];
  if (currentUser?.role === 'responsabile' && !respAllowed.includes(viewId)) {
    viewId = 'responsabile-overview';
  }
  if (currentUser?.role === 'segretario' && !segretarioAllowed.includes(viewId)) {
    viewId = 'president-view';
  }
  if (currentUser?.role === 'presidente' && !presidentAllowed.includes(viewId)) {
    viewId = 'president-view';
  }
  // Responsabile: se prova admin-overview va a responsabile-overview
  if (currentUser?.role === 'responsabile' && viewId === 'admin-overview') {
    viewId = 'responsabile-overview';
  }
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + viewId);
  if (!el) return;
  closeAllDropdowns();
  closeMobileMenu();
  const prevView = currentView;
  currentView = viewId;
  el.classList.add('active');
  highlightNavItem();
  updateBottomNav();

  // Scroll al top della finestra ad ogni cambio vista
  window.scrollTo({ top: 0, behavior: 'instant' });
  const ca = document.getElementById('content-area');
  if (ca) ca.scrollTop = 0;

  // Mostra spinner
  el.innerHTML = `<div style="text-align:center;padding:60px;color:#64748B">
    <div style="font-size:2rem;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block">⟳</div>
    <div>Caricamento dati aggiornati...</div>
  </div>`;

  const fn = viewBuilders[viewId];
  if (!fn) { el.innerHTML = ''; return; }

  // Se siamo in modalità Supabase e la view usa dati condivisi → ricarica prima
  if (DB_MODE === 'supabase' && DB_REFRESH_VIEWS.has(viewId) && currentUser) {
    loadStateFromDB().then(() => {
      el.innerHTML = '';
      fn(el);
    }).catch(err => {
      console.warn('DB refresh failed, using cache:', err);
      el.innerHTML = '';
      fn(el);
    });
  } else {
    setTimeout(() => { el.innerHTML = ''; fn(el); }, 30);
  }

  // Push browser history
  if (pushHistory && prevView !== viewId) {
    const state = { viewId, selectedCategoryId, _sessEditId: window._sessEditId, _athProfileId: window._athProfileId, _convocatiMatchId: window._convocatiMatchId };
    history.pushState(state, '', '#' + viewId);
  }
}

// ── STAR RATING ────────────────────────────────────────────────
function starWidget(paramName, value, onChange) {
  let v = value || 0;
  const id = 'star_' + paramName + '_' + Date.now();
  const html = `<div class="stars" id="${id}">${[1,2,3,4,5].map(i=>`<span class="star ${i<=v?'on':''}" data-v="${i}">★</span>`).join('')}</div>`;
  setTimeout(() => {
    const el = document.getElementById(id);
    if (!el) return;
    el.querySelectorAll('.star').forEach(s => {
      s.addEventListener('click', () => {
        v = parseInt(s.dataset.v);
        el.querySelectorAll('.star').forEach((st,i) => st.classList.toggle('on', i<v));
        onChange(v);
      });
      s.addEventListener('mouseenter', () => {
        const hv = parseInt(s.dataset.v);
        el.querySelectorAll('.star').forEach((st,i) => st.classList.toggle('on', i<hv));
      });
      s.addEventListener('mouseleave', () => {
        el.querySelectorAll('.star').forEach((st,i) => st.classList.toggle('on', i<v));
      });
    });
  }, 50);
  return html;
}

// ── CHART HELPERS ──────────────────────────────────────────────
function barChart(data, colors) {
  // data: [{label, value, max}]
  const maxVal = Math.max(...data.map(d=>d.value||0), 1);
  return `<div class="bar-chart">${data.map((d,i)=>{
    const h = Math.round((d.value/maxVal)*80);
    const c = colors?.[i] || '#1A56DB';
    return `<div class="bar-item">
      <div class="bar-fill" style="height:${h}px;background:${c}"></div>
      <div class="bar-label">${d.label}</div>
    </div>`;
  }).join('')}</div>`;
}
function perfBar(label, value, max=5) {
  const pct = Math.round((value/max)*100);
  const col = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--gold)' : 'var(--red)';
  return `<div class="perf-bar-row">
    <div class="perf-bar-label">${label}</div>
    <div class="perf-bar-track"><div class="perf-bar-fill" style="width:${pct}%;background:${col}"></div></div>
    <div class="perf-bar-val">${value?value.toFixed(1):'—'}</div>
  </div>`;
}
function ratingBadge(pct) {
  if (pct >= 85) return '<span class="badge badge-green">🏆 Eccellente</span>';
  if (pct >= 70) return '<span class="badge badge-blue">✅ Buono</span>';
  if (pct >= 55) return '<span class="badge badge-gold">⚠️ Sufficiente</span>';
  return '<span class="badge badge-red">❌ Insufficiente</span>';
}
function actBadge(type) {
  const a = getActivityTypesMap()[type];
  if (!a) return `<span class="act-chip" style="background:var(--mist-2);color:#64748B">${type}</span>`;
  return `<span class="act-chip ${a.cls||''}">${a.emoji||''} ${a.label}</span>`;
}
function avatarColor(name) {
  const colors = ['#1A56DB','#059669','#D97706','#DC2626','#7C3AED','#0891B2','#DB2777'];
  let h = 0;
  for (const c of (name||'')) h = c.charCodeAt(0) + ((h<<5)-h);
  return colors[Math.abs(h) % colors.length];
}
function athleteAvatar(athlete, size=36) {
  const name = (athlete.firstName||'') + ' ' + (athlete.lastName||'');
  const color = avatarColor(name);
  return `<div class="athlete-avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size*.3)}px;background:${color}">${initials(name)}</div>`;
}

function renderAdminTable() {
  const wrap = document.getElementById('admin-cat-table-wrap');
  if (!wrap) return;

  const filterSoc  = document.getElementById('at-soc')?.value  || '';
  const filterTeam = document.getElementById('at-team')?.value || '';
  // Priorità: filtro UI → stagione globale S.activeSeason
  const atSeasEl   = document.getElementById('at-seas');
  const filterSeas = (atSeasEl?.value) || S.activeSeason || '';
  // Sincronizza il select UI con la stagione globale
  if (atSeasEl && S.activeSeason && !atSeasEl.value) atSeasEl.value = S.activeSeason;

  let cats = S.categories.slice();
  if (filterSoc)  cats = cats.filter(c => c.societyId === filterSoc);
  if (filterTeam) cats = cats.filter(c => {
    const teams = getCategoryTeams(c.id);
    return teams.some(t => t.id === filterTeam);
  });

  // Calcola stats per ogni categoria, filtrando per stagione se richiesto
  const rows = cats.map(cat => {
    const team  = S.teams.find(t => t.id === cat.teamId);
    const soc   = S.societies.find(s => s.id === cat.societyId);
    // Atleti dalla tabella athlete_seasons se c'è filtro stagione, altrimenti tutti
    let athletes, sessions;
    if (filterSeas) {
      athletes = (S.athleteSeasons||[]).filter(as => as.categoryId===cat.id && as.seasonId===filterSeas);
      const seas = S.seasons.find(s=>s.id===filterSeas);
      if (seas) {
        const { start, end } = getSeasonDates(seas);
        sessions = S.sessions.filter(s => s.categoryId===cat.id && s.date>=start && s.date<=end);
      } else {
        sessions = S.sessions.filter(s => s.categoryId===cat.id);
      }
    } else {
      athletes = S.athletes.filter(a => a.categoryId===cat.id);
      sessions = S.sessions.filter(s => s.categoryId===cat.id);
    }

    const nResp = (cat.managerIds||[]).length;
    const nDir  = (cat.directorIds||[]).length;
    const nAll  = (cat.coachIds||[]).length;
    const nProf = (cat.professionalIds||[]).length;

    return { cat, team, soc, nAthletes: athletes.length, nSessions: sessions.length, nResp, nDir, nAll, nProf };
  });

  // Totali
  const totAthletes  = rows.reduce((s,r) => s+r.nAthletes, 0);
  const totSessions  = rows.reduce((s,r) => s+r.nSessions, 0);
  const totResp  = rows.reduce((s,r) => s+r.nResp, 0);
  const totDir   = rows.reduce((s,r) => s+r.nDir, 0);
  const totAll   = rows.reduce((s,r) => s+r.nAll, 0);
  const totProf  = rows.reduce((s,r) => s+r.nProf, 0);

  if (!rows.length) {
    wrap.innerHTML = '<div class="empty-state" style="padding:40px"><div class="icon">🏷️</div><p>Nessuna categoria trovata con i filtri selezionati</p></div>';
    return;
  }

  wrap.innerHTML = '<div class="table-wrap"><table>'
    + '<thead><tr>'
    + '<th>Categoria</th><th>Squadra</th><th>Società</th>'
    + '<th style="text-align:center">Atleti</th>'
    + '<th style="text-align:center">Sessioni</th>'
    + '<th style="text-align:center">Resp.</th>'
    + '<th style="text-align:center">Allenatori</th>'
    + '<th style="text-align:center">Dirigenti</th>'
    + '<th style="text-align:center">Prof.</th>'
    + '<th>Azioni</th>'
    + '</tr></thead>'
    + '<tbody>'
    + rows.map(({cat,team,soc,nAthletes,nSessions,nResp,nDir,nAll,nProf}) =>
        '<tr>'
        + '<td class="fw-700">'+esc(cat.name)+'</td>'
        + '<td>'+esc(team?.name||'—')+'</td>'
        + '<td>'+esc(soc?.name||'—')+'</td>'
        + '<td style="text-align:center" class="fw-600">'+nAthletes+'</td>'
        + '<td style="text-align:center">'+nSessions+'</td>'
        + '<td style="text-align:center">'+nResp+'</td>'
        + '<td style="text-align:center">'+nAll+'</td>'
        + '<td style="text-align:center">'+nDir+'</td>'
        + '<td style="text-align:center">'+nProf+'</td>'
        + '<td style="display:flex;gap:6px">'
        + '<button class="btn btn-ghost btn-sm" onclick="selectCategoryView(\'' + cat.id + '\')">Gestisci</button>'
        + '<button class="btn btn-ghost btn-sm" onclick="showCatDashboard(\'' + cat.id + '\')">Dashboard</button>'
        + '</td>'
        + '</tr>'
      ).join('')
    + '</tbody>'
    + '<tfoot><tr style="border-top:2px solid var(--mist-2);font-weight:700;background:var(--mist)">'
    + '<td colspan="3" class="fw-700" style="color:var(--accent)">Totale ('+rows.length+' categorie)</td>'
    + '<td style="text-align:center;color:var(--accent)">'+totAthletes+'</td>'
    + '<td style="text-align:center;color:var(--accent)">'+totSessions+'</td>'
    + '<td style="text-align:center;color:var(--purple)">'+totResp+'</td>'
    + '<td style="text-align:center;color:var(--gold)">'+totAll+'</td>'
    + '<td style="text-align:center;color:var(--green)">'+totDir+'</td>'
    + '<td style="text-align:center;color:var(--teal)">'+totProf+'</td>'
    + '<td></td>'
    + '</tr></tfoot>'
    + '</table></div>';
}

      ${myMatches.length ? `
      <div class="stat-card blue"><div class="accent-bar"></div><div class="label">Punti totali</div><div class="value">${totPts}</div><div class="sub">${totW}V ${totD}P ${totL}S</div></div>
      <div class="stat-card green"><div class="accent-bar"></div><div class="label">Gol Fatti</div><div class="value">${totGf}</div><div class="sub">diff. ${totGf-totGs>=0?'+':''}${totGf-totGs}</div></div>
      <div class="stat-card red"><div class="accent-bar"></div><div class="label">Gol Subiti</div><div class="value">${totGs}</div></div>
      <div class="stat-card gold"><div class="accent-bar"></div><div class="label">Partite</div><div class="value">${myMatches.length}</div><div class="sub">${totW} vittorie</div></div>
      ` : ''}
    </div>

    <!-- Schede per ogni squadra -->
    <div class="grid-2" style="margin-bottom:20px">
      ${catCards.map(({cat,st,ms,team,soc}) => `
      <div class="card" style="cursor:pointer" onclick="selectedCategoryId='${cat.id}';showView('category-home')">
        <div class="card-title" style="justify-content:space-between">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="icon" style="background:var(--accent-l);color:var(--accent)">👕</div>
            <div>
              <div class="fw-700">${esc(cat.name)}</div>
              <div style="font-size:.75rem;color:#64748B">${esc(soc?.name||'—')} · ${esc(team?.name||'—')}</div>

        <div class="stats-grid" style="margin-bottom:0">
          <div class="stat-card blue"><div class="accent-bar"></div><div class="label">Atleti</div><div class="value">${st.athletes}</div></div>
          <div class="stat-card green"><div class="accent-bar"></div><div class="label">Presenze</div><div class="value">${st.presenceRate}%</div></div>
          <div class="stat-card gold"><div class="accent-bar"></div><div class="label">Sessioni</div><div class="value">${st.sessions}</div></div>
          ${ms.played ? `<div class="stat-card blue"><div class="accent-bar"></div><div class="label">Punti</div><div class="value">${ms.pts}</div><div class="sub">${ms.w}V ${ms.d}P ${ms.l}S</div></div>` : ''}

          ${ms.played ? `<div class="stat-card red"><div class="accent-bar"></div><div class="label">Gol S.</div><div class="value">${ms.gs}</div></div>` : ''}
        </div>
      </div>`).join('')}

    <!-- Partite ultimo mese di tutte le sue squadre -->
    ${buildRecentMatchesCard(myCatIds, {stateKey:'_respMatchState',viewId:'responsabile-overview',title:'Partite ultimo mese — tutte le squadre'})}

  const activeSeasId = S.activeSeason || getActiveSeason()?.id || '';
  const seasOpts = seasons.map(s=>'<option value="'+s.id+'"'+(s.id===activeSeasId?' selected':'')+'>'+esc(s.name)+(s.active?' ★':'')+'</option>').join('');
  const catOpts  = cats.map(c=>'<option value="'+c.id+'">'+esc(c.name)+'</option>').join('');
  const roleOpts = ['segretario','presidente','responsabile','dirigente','allenatore','professionista']
    .map(r=>'<option value="'+r+'"'+(r===role?' selected':'')+'>'+ROLES[r].icon+' '+ROLES[r].label+'</option>').join('');

  openModal('<div class="modal-header"><h3>Aggiungi Assegnazione Stagionale</h3><div style="font-size:.85rem;color:#64748B">'+esc(u.name)+'</div></div>'

    + '<div class="form-field"><label>Categoria</label><select id="ucs-add-cat"><option value="">— Seleziona —</option>'+catOpts+'</select></div>'
    + '<div class="form-actions">'
    + '<button class="btn btn-accent" onclick="saveUCSFromModal(&quot;"+userId+"&quot;)">💾 Salva</button>'
    + '<button class="btn btn-ghost" onclick="closeModal()">Annulla</button>'
    + '</div>');
}

function openEditUCS(ucsId, userId, role) {
  const ue  = (S.userCategorySeasons||[]).find(x=>x.id===ucsId);
  if (!ue) return;
  const seasons = S.seasons.slice().sort((a,b)=>b.startYear-a.startYear);
  const cats    = S.categories;
  const seasOpts = seasons.map(s=>'<option value="'+s.id+'"'+(s.id===ue.seasonId?' selected':'')+'>'+esc(s.name)+(s.active?' ★':'')+'</option>').join('');
  const catOpts  = cats.map(c=>'<option value="'+c.id+'"'+(c.id===ue.categoryId?' selected':'')+'>'+esc(c.name)+'</option>').join('');
  const roleOpts = ['responsabile','dirigente','allenatore','professionista']
    .map(r=>'<option value="'+r+'"'+(r===ue.role?' selected':'')+'>'+ROLES[r].icon+' '+ROLES[r].label+'</option>').join('');

  openModal('<div class="modal-header"><h3>Modifica Assegnazione</h3></div>'
    + '<div class="form-row">'
    + '<div class="form-field"><label>Stagione</label><select id="ucs-edit-seas">'+seasOpts+'</select></div>'
    + '<div class="form-field"><label>Ruolo</label><select id="ucs-edit-role">'+roleOpts+'</select></div>'
    + '</div>'
    + '<div class="form-field"><label>Categoria</label><select id="ucs-edit-cat">'+catOpts+'</select></div>'
    + '<div class="form-actions">'
    + '<button class="btn btn-accent" onclick="updateUCSFromModal(&quot;"+ucsId+"&quot;,&quot;"+userId+"&quot;)">💾 Aggiorna</button>'
    + '<button class="btn btn-ghost" onclick="closeModal()">Annulla</button>'
    + '</div>');
}

function saveUCSFromModal(userId) {
  const seasonId = document.getElementById('ucs-add-seas')?.value;
  const catId    = document.getElementById('ucs-add-cat')?.value;
  const role     = document.getElementById('ucs-add-role')?.value;
  if (!seasonId || !catId) { toast('Seleziona stagione e categoria','error'); return; }
  const dup = (S.userCategorySeasons||[]).find(u=>u.userId===userId && u.seasonId===seasonId && u.categoryId===catId);
  if (dup) { toast('Assegnazione già presente','warning'); return; }
  const cat = S.categories.find(c=>c.id===catId);
  const entry = { id: uid(), userId, seasonId, categoryId: catId, role, societyId: cat?.societyId||null };
  if (!S.userCategorySeasons) S.userCategorySeasons = [];
  S.userCategorySeasons.push(entry);
  saveState(); sbSync('user_category_seasons', entry);
  closeModal(); toast('Assegnazione aggiunta ✅','success');

function buildNewUserSeasonPanel(role, userId, seasId) {
  const isStaff = ['responsabile','dirigente','allenatore','professionista'].includes(role);
  if (!isStaff) return '<div style="font-size:.82rem;color:#64748B">Questo ruolo non richiede assegnazione a categorie.</div>';

  // UCS esistenti per questa stagione
  const existing = userId
    ? (S.userCategorySeasons||[]).filter(u=>u.userId===userId && u.seasonId===seasId)
    : [];

  const seas = S.seasons.find(s=>s.id===seasId);
  const catOpts  = S.categories.map(c=>'<option value="'+c.id+'">'+esc(c.name)+'</option>').join('');
  const roleOpts = ['segretario','presidente','responsabile','dirigente','allenatore','professionista']
    .map(r=>'<option value="'+r+'"'+(r===role?' selected':'')+'>'+ROLES[r].icon+' '+ROLES[r].label+'</option>').join('');

  let html = '<div style="font-size:.78rem;font-weight:700;color:#64748B;margin-bottom:8px">Categorie assegnate in '+esc(seas?.name||'—')+'</div>';

  if (existing.length) {
    html += '<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:12px">';
    existing.forEach(ue => {
      const cat = S.categories.find(c=>c.id===ue.categoryId);
      const rl  = {responsabile:'badge-purple',dirigente:'badge-green',allenatore:'badge-gold',professionista:'badge-teal'}[ue.role]||'badge-gray';
      html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--mist-2);border-radius:8px">'
        + '<span class="badge '+rl+'">'+( ROLES[ue.role]?.label||ue.role)+'</span>'
        + '<span style="font-size:.85rem;font-weight:600;flex:1">'+(cat?.name||'—')+'</span>'
        + '<button class="btn btn-danger btn-sm" onclick="removeUCSEntry(\'' + ue.id + '\',\'' + userId + '\',\'' + role + '\');refreshAddUserSeasonPanel(document.getElementById(\'au-role\').value,\'' + userId + '\')">✕</button>'
        + '</div>';
    });
    html += '</div>';
  }

  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;padding:10px;background:var(--accent-l);border-radius:8px;border:1px dashed var(--accent)">'
    + '<div class="form-field" style="margin:0;min-width:110px;flex:2"><label style="font-size:.72rem">Categoria</label><select id="au-new-cat"><option value="">— Seleziona —</option>'+catOpts+'</select></div>'
    + '<div class="form-field" style="margin:0;min-width:110px"><label style="font-size:.72rem">Ruolo</label><select id="au-new-role">'+roleOpts+'</select></div>'
    + '<button class="btn btn-accent btn-sm" onclick="addUCSFromPage(&quot;'+userId+'&quot;,&quot;'+seasId+'&quot;)" style="align-self:flex-end">+ Aggiungi</button>'
    + '</div>';

  return html;
}

  const panel = document.getElementById('au-season-panel');

function addUCSFromPage(userId, seasId) {
  const catId  = document.getElementById('au-new-cat')?.value;
  const role   = document.getElementById('au-new-role')?.value;
  if (!catId) { toast('Seleziona una categoria','error'); return; }
  if (!userId) { toast('Salva prima i dati anagrafici dell\'utente','warning'); return; }
  const dup = (S.userCategorySeasons||[]).find(u=>u.userId===userId && u.seasonId===seasId && u.categoryId===catId);
  if (dup) { toast('Assegnazione già presente','warning'); return; }
  const cat   = S.categories.find(c=>c.id===catId);
  const entry = { id: uid(), userId, seasonId: seasId, categoryId: catId, role, societyId: cat?.societyId||null };
  if (!S.userCategorySeasons) S.userCategorySeasons = [];
  S.userCategorySeasons.push(entry);
  saveState(); sbSync('user_category_seasons', entry);
  toast('Categoria aggiunta ✅','success');
  const curRole = document.getElementById('au-role')?.value || role;
  refreshAddUserSeasonPanel(curRole, userId);
}

async function saveUserFromPage(id) {
  const name  = document.getElementById('au-name')?.value.trim();
  const prof  = document.getElementById('au-prof')?.value.trim();
  const email = document.getElementById('au-email')?.value.trim();
  const phone = document.getElementById('au-phone')?.value.trim();
  const uname = document.getElementById('au-uname')?.value.trim();
  const pass  = document.getElementById('au-pass')?.value;
  const pass2 = document.getElementById('au-pass-confirm')?.value;
  const role  = document.getElementById('au-role')?.value;
  const socId = document.getElementById('au-soc')?.value;

  if (!name) { toast('Nome obbligatorio','error'); return; }
  if (!id && !pass) { toast('Password obbligatoria per nuovo utente','error'); return; }
  if (!id && pass !== pass2) { toast('Le password non coincidono','error'); return; }

  if (id) {
    // Aggiorna anagrafica (senza role/societyId — gestiti da UCS)
    const u = S.users.find(x=>x.id===id);
    if (!u) return;
    Object.assign(u, { name, profession:prof, email, phone,
      // Mantieni legacy per compatibilità
      role, societyId:socId||null });
    saveState(); await sbSync('users', u);
    // Aggiorna UCS della stagione attiva se c'è una categoria selezionata
    const activeSeasId2 = S.activeSeason;
    if (activeSeasId2 && role && !['admin','segretario','presidente','genitore'].includes(role)) {
      // Crea/aggiorna UCS per stagione attiva con la società
      const existUCS = (S.userCategorySeasons||[]).filter(
        ue => ue.userId===id && ue.seasonId===activeSeasId2
      );
      existUCS.forEach(ue => {
        if (socId && !ue.societyId) {
          ue.societyId = socId;
          sbSync('user_category_seasons', ue);
        }
      });
    }
    if (pass) { try { await DB.adminSetPassword(id, pass); } catch(e) { toast('⚠️ Password non aggiornata','warning'); } }
    toast('Utente aggiornato ✅','success');
    showView('user-detail');
  } else {
    // Nuovo utente
    if (!uname) { toast('Username obbligatorio','error'); return; }
    const fullEmail = uname + '@sporttrackpro.it';
    const newId = uid();
    try {
      await DB.createUser(newId, fullEmail, pass, name, role, uname, prof, phone, socId||null);
      toast('Utente creato ✅','success');
      showAdminConfig('users');
    } catch(e) {
      toast('Errore creazione: ' + e.message, 'error');
    }
  }
}

function buildAdminConfigTab(tab) {
  window._pendingConfigTab = tab; // mantieni tab corrente per il select stagione
  // activate tab — array completo di tutti i tab
  const allTabs = ['sport','society','team','category','users','activities','seasons','roles','settings'];
  document.querySelectorAll('#config-tabs .tab-btn').forEach((b,i) => {
    b.classList.toggle('active', allTabs[i] === tab);
  });
  const c = document.getElementById('config-content');
  if (!c) return;
  switch(tab) {
    case 'sport': c.innerHTML = buildSportConfig(); break;
    case 'society': c.innerHTML = buildSocietyConfig(); break;
    case 'team': c.innerHTML = buildTeamConfig(); break;
    case 'category': c.innerHTML = buildCategoryConfig(); break;
    case 'users': c.innerHTML = buildUsersConfig(); break;
    case 'settings': c.innerHTML = buildSettingsConfig(); break;
    case 'activities': c.innerHTML = buildActivitiesConfig(); break;
    case 'seasons': c.innerHTML = buildSeasonsConfig(); break;
    case 'roles': c.innerHTML = buildRolesConfig(); break;
  }
}

function buildSocietyConfig() {
  const seasId = window._configSeasonId || '';
  const seas   = S.seasons.find(s=>s.id===seasId);
  // Società attive nella stagione selezionata: quelle che hanno almeno una categoria con quella stagione
  // oppure tutte se non c'è filtro
  const activeSocIds = seasId
    ? [...new Set([
        ...(S.userCategorySeasons||[]).filter(u=>u.seasonId===seasId).map(u=>S.categories.find(c=>c.id===u.categoryId)?.societyId).filter(Boolean),
        ...(S.athleteSeasons||[]).filter(as=>as.seasonId===seasId).map(as=>S.categories.find(c=>c.id===as.categoryId)?.societyId).filter(Boolean),
        // Include sempre le società con categorie (retrocompatibilità)
        ...S.categories.map(c=>c.societyId).filter(Boolean)
      ])]
    : S.societies.map(s=>s.id);
  const visibleSocs = S.societies.filter(s=>activeSocIds.includes(s.id));

  return '<div class="card">'
    + '<div class="card-title" style="justify-content:space-between">'
    + '<div style="display:flex;align-items:center;gap:8px"><div class="icon" style="background:var(--teal-l);color:var(--teal)">🏛️</div>Società'

    + '<tbody>' + visibleSocs.map(s => {
        const socCats = S.categories.filter(c=>c.societyId===s.id);
        const socTeams = S.teams.filter(t=>t.societyId===s.id);
        const socAthletes = seasId
          ? (S.athleteSeasons||[]).filter(as=>as.seasonId===seasId && socCats.some(c=>c.id===as.categoryId))

    toast('Società aggiunta','success');
  }
  const saved = id ? S.societies.find(x=>x.id===id) : S.societies[S.societies.length-1];
  saveState(); sbSync('societies', saved); closeModal(); buildAdminConfigTab('society');

// Copia struttura società da una stagione all'altra
function copySocietySeason() {
  const fromSocId = document.getElementById('copy-soc-from')?.value;
  const fromSeasId = document.getElementById('copy-seas-from')?.value;
  const toSeasId = document.getElementById('copy-seas-to')?.value;
  if (!fromSocId || !fromSeasId || !toSeasId) { toast('Seleziona società, stagione origine e destinazione','error'); return; }
  if (fromSeasId === toSeasId) { toast('Le stagioni devono essere diverse','error'); return; }
  const fromSoc = S.societies.find(s=>s.id===fromSocId);
  const toSeas = S.seasons.find(s=>s.id===toSeasId);
  if (!fromSoc || !toSeas) { toast('Dati non trovati','error'); return; }
  // Copia categorie della società dalla stagione di origine
  const fromCats = S.categories.filter(c=>c.societyId===fromSocId);
  let copied = 0;
  fromCats.forEach(cat => {
    const exists = S.categories.some(c=>c.societyId===fromSocId && c.name===cat.name && c.seasonId===toSeasId);
    if (!exists) {
      const newCat = { ...cat, id: uid(), seasonId: toSeasId };
      S.categories.push(newCat);
      sbSync('categories', newCat);
      copied++;
    }
  });
  saveState();
  closeModal();
  toast(`✅ Copiate ${copied} categorie da ${fromSoc.name} → ${toSeas.name}`, 'success');
  buildAdminConfigTab('society');
}
function deleteSociety(id) {
  if (!confirm('Eliminare questa società e tutti i dati collegati?')) return;
  S.societies = S.societies.filter(x=>x.id!==id);
  saveState(); sbSync('societies', id, true); buildAdminConfigTab('society'); toast('Società eliminata');
}

function toggleStaffCB(cb, elemId) {
  const label = document.getElementById(elemId+'-opt-'+cb.value);
  if (!label) return;
  if (cb.checked) {
    label.style.borderColor = 'var(--accent)';
    label.style.background = 'var(--accent-l)';
    const sp = label.querySelector('span');
    if (sp) { sp.style.color='var(--accent)'; sp.style.fontWeight='600'; }
  } else {
    label.style.borderColor = '#E2E8F0';
    label.style.background = 'var(--white)';
    const sp = label.querySelector('span');
    if (sp) { sp.style.color=''; sp.style.fontWeight=''; }
  }
}

function saveCategory(id) {
  const name     = document.getElementById('cat-name').value.trim();
  const sportId  = document.getElementById('cat-sport').value;
  const societyId= document.getElementById('cat-soc').value;
  const teamMultiEl = document.getElementById('cat-team-multi');
  const teamIds  = teamMultiEl ? Array.from(teamMultiEl.selectedOptions).map(o=>o.value) : [];
  const teamId   = teamIds[0] || '';
  const pick = elId => {
    const wrap = document.getElementById(elId+'-wrap');
    if (wrap) return Array.from(wrap.querySelectorAll('input[type=checkbox]:checked')).map(cb=>cb.value);
    const el = document.getElementById(elId);
    return el ? Array.from(el.selectedOptions||[]).map(o=>o.value) : [];
  };
  const directorIds     = pick('cat-dirs');
  const managerIds      = pick('cat-managers');
  const coachIds        = pick('cat-coaches');
  const professionalIds = pick('cat-profs');
  if (!name) { toast('Nome obbligatorio','error'); return; }
  // seasonId rimosso: le categorie sono globali, la stagione non è più un campo della categoria
  const data = {name,sportId,societyId,teamId,teamIds,directorIds,managerIds,coachIds,professionalIds,seasonId};
  if (id) {
    Object.assign(S.categories.find(x=>x.id===id), data);
    toast('Categoria aggiornata','success');
  } else {
    S.categories.push({ id: uid(), ...data });
    toast('Categoria aggiunta','success');
  }
  const savedCat = id ? S.categories.find(x=>x.id===id) : S.categories[S.categories.length-1];
  saveState(); sbSync('categories', savedCat); closeModal(); buildAdminConfigTab('category'); buildSidebarNav();
}
function deleteCategory(id) {
  if (!confirm('Eliminare questa categoria e tutti i dati collegati?')) return;
  S.categories = S.categories.filter(x=>x.id!==id);
  S.athletes = S.athletes.filter(x=>x.categoryId!==id);
  const delSessIds = S.sessions.filter(x=>x.categoryId===id).map(s=>s.id);
  S.sessions = S.sessions.filter(x=>x.categoryId!==id);
  S.attendances = S.attendances.filter(x=>!delSessIds.includes(x.sessionId));
  if (selectedCategoryId === id) selectedCategoryId = null;
  saveState();
  sbSync('categories', id, true);
  delSessIds.forEach(sid => sbSyncDeleteWhere('attendances','session_id',sid));
  sbSyncDeleteWhere('athletes','category_id',id);
  sbSyncDeleteWhere('sessions','category_id',id);
  buildAdminConfigTab('category'); buildSidebarNav(); toast('Categoria eliminata');
}

// Helper: get current category IDs assigned to user u with given role
function getUserCatIds(userId, role) {
  if (role === 'genitore') {
    return S.athletes.filter(a=>(a.parentIds||[]).includes(userId)).map(a=>a.id);
  }
  if (role === 'presidente') {
    const u = S.users.find(x=>x.id===userId);
    return u?.societyId ? [u.societyId] : [];
  }
  const key = {
    responsabile: 'managerIds', dirigente: 'directorIds',
    allenatore: 'coachIds', professionista: 'professionalIds'
  }[role];
  if (!key) return [];
  return S.categories.filter(c=>(c[key]||[]).includes(userId)).map(c=>c.id);
}

// Helper: update category arrays when user role/assignments change
function syncUserCatAssignments(userId, role, newCatIds) {
  const key = {
    responsabile: 'managerIds', dirigente: 'directorIds',
    allenatore: 'coachIds', professionista: 'professionalIds'
  }[role];

  // Genitore: l'associazione è sugli atleti (parentIds), non sulle categorie
  if (role === 'presidente') {
    // Per presidente: newCatIds[0] è il societyId selezionato
    const user = S.users.find(u => u.id === userId);
    if (user) {
      user.societyId = newCatIds[0] || null;
      sbSync('users', user);
    }
    return;
  }

  if (role === 'genitore') {
    // Raccogli tutti gli atleti che cambiano stato (aggiunti + rimossi)
    const toUpdate = new Set();

    // Rimuovi il genitore da tutti gli atleti
    S.athletes.forEach(a => {
      const had = (a.parentIds||[]).includes(userId);
      a.parentIds = (a.parentIds||[]).filter(i => i !== userId);
      if (had) toUpdate.add(a.id);
    });

    // Aggiungi il genitore agli atleti selezionati
    newCatIds.forEach(aid => {
      const ath = S.athletes.find(a => a.id === aid);
      if (ath) {
        if (!ath.parentIds) ath.parentIds = [];
        if (!ath.parentIds.includes(userId)) ath.parentIds.push(userId);
        toUpdate.add(ath.id);
      }
    });

    // Sincronizza solo gli atleti modificati
    toUpdate.forEach(aid => {
      const ath = S.athletes.find(a => a.id === aid);
      if (ath) {
        console.log('[genitore] sync atleta', ath.firstName, 'parentIds:', ath.parentIds);
        sbSync('athletes', ath);
      }
    });
    return;
  }

  if (!key) return;
  // Rimuovi utente da TUTTE le categorie per questo ruolo
  S.categories.forEach(c => { c[key] = (c[key]||[]).filter(i=>i!==userId); });
  // Aggiungi utente alle categorie selezionate
  newCatIds.forEach(cid => {
    const cat = S.categories.find(c=>c.id===cid);
    if (cat) {
      if (!cat[key]) cat[key]=[];
      if (!cat[key].includes(userId)) cat[key].push(userId);
    }
  });
  // Sincronizza TUTTE le categorie modificate su Supabase
  const affectedCats = S.categories.filter(c =>
    newCatIds.includes(c.id) || (c[key]||[]).length >= 0
  );
  affectedCats.forEach(cat => sbSync('categories', cat));
}

// ── PASSWORD STRENGTH ENGINE ──────────────────────────────────
function pwStrength(pw) {
  if (!pw) return { score: 0, label: '', color: '', checks: {} };
  const checks = {
    length:   pw.length >= 10,
    upper:    /[A-Z]/.test(pw),
    lower:    /[a-z]/.test(pw),
    digit:    /[0-9]/.test(pw),
    symbol:   /[^A-Za-z0-9]/.test(pw),
    noRepeat: !/(.)(\1{2,})/.test(pw),
    length14: pw.length >= 14,
  };
  const score = Object.values(checks).filter(Boolean).length;
  const map = [
    { min:0, label:'',           color:'#CBD5E0', bar:0   },
    { min:1, label:'Molto debole', color:'#DC2626', bar:14  },
    { min:2, label:'Debole',       color:'#EF4444', bar:28  },
    { min:3, label:'Discreta',     color:'#F59E0B', bar:45  },
    { min:4, label:'Sufficiente',  color:'#F59E0B', bar:60  },
    { min:5, label:'Buona',        color:'#10B981', bar:78  },
    { min:6, label:'Forte',        color:'#059669', bar:90  },
    { min:7, label:'Molto forte',  color:'#047857', bar:100 },
  ];
  const level = [...map].reverse().find(m => score >= m.min) || map[0];
  return { score, label: level.label, color: level.color, bar: level.bar, checks };
}

        <div id="pw-strength-bar" style="height:100%;width:0%;border-radius:99px;transition:width .3s,background .3s"></div>
      </div>

function _updatePwStrengthUI(pw, inputId) {
  const wrap = document.getElementById('pw-strength-bar-wrap');
  const bar  = document.getElementById('pw-strength-bar');
  const lbl  = document.getElementById('pw-strength-label');
  const chk  = document.getElementById('pw-strength-checks');
  if (!wrap) return;
  if (!pw) { wrap.style.display='none'; return; }
  wrap.style.display = 'block';
  const s = pwStrength(pw);
  bar.style.width      = s.bar + '%';
  bar.style.background = s.color;
  lbl.textContent      = s.label;
  lbl.style.color      = s.color;
  const parts = [];
  if (!s.checks.length)   parts.push('≥10 car.');
  if (!s.checks.upper)    parts.push('MAIUSC.');
  if (!s.checks.lower)    parts.push('minusc.');
  if (!s.checks.digit)    parts.push('numero');
  if (!s.checks.symbol)   parts.push('simbolo');
  if (!s.checks.noRepeat) parts.push('no ripetizioni');
  chk.textContent = parts.length ? 'Manca: ' + parts.join(', ') : '✅ Tutti i requisiti soddisfatti';
}

function _updatePwConfirmUI(pw, conf) {
  const el = document.getElementById('pw-confirm-msg');
  if (!el || !conf) { if(el) el.style.display='none'; return; }
  el.style.display = 'block';
  if (pw === conf) {
    el.innerHTML = '<span style="color:var(--green)">✅ Le password coincidono</span>';
  } else {
    el.innerHTML = '<span style="color:var(--red)">❌ Le password non coincidono</span>';
  }
}

function pwIsStrong(pw) {
  const s = pwStrength(pw);
  // Richiede score ≥ 5: lunghezza, maiusc, minusc, numero, simbolo
  return s.checks.length && s.checks.upper && s.checks.lower && s.checks.digit && s.checks.symbol;
}

function pwErrorMsg(pw) {
  const s = pwStrength(pw);
  const missing = [];
  if (!s.checks.length)  missing.push('almeno 10 caratteri');
  if (!s.checks.upper)   missing.push('una lettera maiuscola');
  if (!s.checks.lower)   missing.push('una lettera minuscola');
  if (!s.checks.digit)   missing.push('un numero');
  if (!s.checks.symbol)  missing.push('un carattere speciale (!@#$%...)');
  return missing.length ? 'Password troppo debole. Aggiungi: ' + missing.join(', ') + '.' : '';
}

// ── GENERATORE PASSWORD SICURA ────────────────────────────────
function generateSecurePassword() {
  const upper   = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const lower   = 'abcdefghjkmnpqrstuvwxyz';
  const digits  = '23456789';
  const symbols = '!@#$%&*?+';
  const all     = upper + lower + digits + symbols;
  const arr     = crypto.getRandomValues(new Uint32Array(14));
  let pw = '';
  // Garantisce almeno uno di ogni classe
  pw += upper [arr[0]  % upper.length];
  pw += lower [arr[1]  % lower.length];
  pw += digits[arr[2]  % digits.length];
  pw += symbols[arr[3] % symbols.length];
  for (let i = 4; i < 14; i++) pw += all[arr[i] % all.length];
  // Shuffle
  return pw.split('').sort(() => Math.random() - 0.5).join('');
}

function fillGeneratedPassword(inputId) {
  const pw  = generateSecurePassword();
  const inp = document.getElementById(inputId);
  if (!inp) return;
  inp.value = pw;
  inp.type  = 'text';
  setTimeout(() => { if(inp) inp.type = 'password'; }, 3000);
  _updatePwStrengthUI(pw, inputId);
  const conf = document.getElementById(inputId === 'usr-pass' ? 'usr-pass-confirm' : 'pw-confirm');
  if (conf && conf.value) _updatePwConfirmUI(pw, conf.value);
  // Copy to clipboard
  navigator.clipboard?.writeText(pw).then(()=>toast('Password generata e copiata negli appunti 📋','success'))
    .catch(()=>toast('Password generata — copiala prima che scompaia','warning'));
}


// ── Sezione UCS (user_category_seasons) nel modal utente ────────
function buildUCSList(userId, role) {
  if (!userId) return '<div style="font-size:.8rem;color:#64748B">Salva prima l\'utente per assegnare stagioni.</div>';

  const isStaff = ['responsabile','dirigente','allenatore','professionista'].includes(role);
  if (!isStaff) return '<div style="font-size:.8rem;color:#64748B">Le assegnazioni stagionali sono disponibili per Responsabili, Dirigenti, Allenatori e Professionisti.</div>';

  const entries  = getUserSeasons(userId);
  const seasons  = S.seasons.slice().sort((a,b)=>b.startYear-a.startYear);
  const cats     = S.categories;

  let html = '<div style="display:flex;flex-direction:column;gap:6px" id="ucs-entries">';

  entries.forEach(ucs => {
    const seas = S.seasons.find(s=>s.id===ucs.seasonId);
    const cat  = S.categories.find(c=>c.id===ucs.categoryId);
    const soc  = S.societies.find(s=>s.id===cat?.societyId);
    const roleLabel = ucs.role || role;
    html += '<div style="display:flex;gap:8px;align-items:center;background:var(--mist);border:1px solid var(--mist-2);border-radius:8px;padding:8px 12px;flex-wrap:wrap">'
      + '<span class="badge badge-blue">'+(seas?.name||'—')+'</span>'
      + '<span style="font-size:.85rem;font-weight:600">'+(cat?.name||'—')+'</span>'
      + (soc?'<span style="font-size:.78rem;color:#64748B">'+esc(soc.name)+'</span>':'')
      + '<span class="badge badge-'+getRoleBadge(roleLabel)+'">'+esc(ROLES[roleLabel]?.label||roleLabel)+'</span>'
      + '<button class="btn btn-ghost btn-sm" style="margin-left:auto;color:var(--red);font-size:.75rem" onclick="removeUCSEntry(\'' + ucs.id + '\',\'' + userId + '\',\'' + role + '\')">✕</button>'
      + '</div>';
  });
  html += '</div>';

  // Form aggiungi
  const seasOpts = seasons.map(s=>
    '<option value="'+s.id+'"'+(s.active?' selected':'')+'>'+esc(s.name)+(s.active?' ★':'')+'</option>'
  ).join('');
  const catOpts = cats.map(cat=>
    '<option value="'+cat.id+'">'+esc(cat.name)+'</option>'
  ).join('');
  const roleOpts = ['responsabile','dirigente','allenatore','professionista'].map(r=>
    '<option value="'+r+'"'+(r===role?' selected':'')+'>'+(ROLES[r]?.icon||'')+' '+(ROLES[r]?.label||r)+'</option>'
  ).join('');

  html += '<div style="margin-top:8px;padding:10px;background:var(--accent-l);border-radius:8px;border:1px dashed var(--accent)">'
    + '<div style="font-size:.75rem;font-weight:700;color:var(--accent);margin-bottom:6px">+ Aggiungi assegnazione stagionale</div>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">'
    + '<div class="form-field" style="margin:0;min-width:110px;flex:1"><label style="font-size:.72rem">Stagione</label><select id="ucs-new-season">'+seasOpts+'</select></div>'
    + '<div class="form-field" style="margin:0;min-width:120px;flex:2"><label style="font-size:.72rem">Categoria</label><select id="ucs-new-cat"><option value="">— Seleziona —</option>'+catOpts+'</select></div>'
    + '<div class="form-field" style="margin:0;min-width:110px"><label style="font-size:.72rem">Ruolo</label><select id="ucs-new-role">'+roleOpts+'</select></div>'
    + '<button class="btn btn-accent btn-sm" onclick="addUCSEntry(\'' + userId + '\')" style="align-self:flex-end">Aggiungi</button>'
    + '</div></div>';

  return html;
}

function getRoleBadge(role) {
  return {responsabile:'purple',dirigente:'green',allenatore:'gold',professionista:'teal'}[role]||'gray';
}

function addUCSEntry(userId) {
  const seasonId = document.getElementById('ucs-new-season')?.value;
  const catId    = document.getElementById('ucs-new-cat')?.value;
  const role     = document.getElementById('ucs-new-role')?.value || 'allenatore';
  if (!seasonId || !catId) { toast('Seleziona stagione e categoria','error'); return; }
  const dup = (S.userCategorySeasons||[]).find(u => u.userId===userId && u.seasonId===seasonId && u.categoryId===catId);
  if (dup) { toast('Assegnazione già presente','warning'); return; }

  const cat = S.categories.find(c=>c.id===catId);
  const entry = {
    id: uid(), userId, seasonId, categoryId: catId,
    role, societyId: cat?.societyId || null
  };
  if (!S.userCategorySeasons) S.userCategorySeasons = [];
  S.userCategorySeasons.push(entry);
  saveState();
  sbSync('user_category_seasons', entry);
  toast('Assegnazione aggiunta ✅','success');
  const panel = document.getElementById('ucs-panel');
  if (panel) panel.innerHTML = buildUCSList(userId, role);
}

function removeUCSEntry(ucsId, userId, role) {
  if (!confirm('Rimuovere questa assegnazione?')) return;
  S.userCategorySeasons = (S.userCategorySeasons||[]).filter(u=>u.id!==ucsId);
  saveState();
  sbSync('user_category_seasons', ucsId, true);
  toast('Assegnazione rimossa','success');
  const panel = document.getElementById('ucs-panel');
  if (panel) panel.innerHTML = buildUCSList(userId, role);
}

function togglePwVisibility(inputId, iconId) {
  const inp  = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if (!inp) return;
  inp.type  = inp.type === 'password' ? 'text' : 'password';
  if (icon) icon.textContent = inp.type === 'password' ? '👁' : '🙈';
}

  const ucsPanel = document.getElementById('ucs-panel');
  if (ucsPanel) ucsPanel.innerHTML = buildUCSList(userId||null, role);

function saveUser(id) {
  const name       = document.getElementById('usr-name').value.trim();
  const username   = document.getElementById('usr-uname').value.trim();
  const password   = document.getElementById('usr-pass').value;
  const pwConfirm  = document.getElementById('usr-pass-confirm')?.value || '';
  const role       = document.getElementById('usr-role').value;
  const profession = document.getElementById('usr-prof').value.trim();
  const phone      = document.getElementById('usr-phone').value.trim();
  const email      = document.getElementById('usr-email').value.trim();
  const catSelect  = document.getElementById('usr-cats');
  const catIds     = catSelect ? Array.from(catSelect.selectedOptions).map(o=>o.value) : [];

  if (!name || !username) { toast('Nome e username obbligatori','error'); return; }

  // ── Validazione password ─────────────────────────────────────
  if (password) {
    const pwErr = pwErrorMsg(password);
    if (pwErr) { toast(pwErr, 'error'); return; }
    if (password !== pwConfirm) { toast('Le password non coincidono','error'); return; }
  } else if (!id) {
    toast('La password è obbligatoria per i nuovi utenti','error');
    return;
  }

  if (!id && S.users.some(u=>u.username===username)) {
    toast('Username già esistente','error'); return;
  }

  let userId = id;
  if (id) {
    // ── MODIFICA UTENTE ESISTENTE ──
    const u = S.users.find(x=>x.id===id);
    const oldRole = u.role;
    if (oldRole !== role) {
      const oldKey = {responsabile:'managerIds',dirigente:'directorIds',allenatore:'coachIds',professionista:'professionalIds'}[oldRole];
      if (oldKey) S.categories.forEach(c=>{ c[oldKey]=(c[oldKey]||[]).filter(i=>i!==id); });
    }
    Object.assign(u, {name, username, role, profession, phone, email});

    // Aggiorna profilo su Supabase
    sbSync('users', u);

    // Nota: il reset password di altri utenti richiede service_role (Supabase Dashboard)
    if (password && DB_MODE === 'supabase') {
      toast('⚠️ Profilo aggiornato. Per cambiare la password usa Supabase Dashboard → Authentication → Users', 'warning');
    }

    // Ricorda quali categorie erano associate prima
    const prevCatIds = getUserCatIds(userId, role);
    syncUserCatAssignments(userId, role, catIds);
    // Sincronizza SOLO le categorie che sono cambiate (aggiunte o rimosse)
    if (role !== 'genitore') {
      const changedCatIds = new Set([...prevCatIds, ...catIds]);
      changedCatIds.forEach(cid => {
        const cat = S.categories.find(c => c.id === cid);
        if (cat) sbSync('categories', cat);
      });
    }
    saveState(); closeModal(); buildAdminConfigTab('users'); buildSidebarNav();
    toast('Utente aggiornato ✅','success');

  } else {
    // ── NUOVO UTENTE — usa signUp diretto (anon key) ──
    const authEmail = email || (username.includes('@') ? username : username + '@sporttrackpro.it');

    if (DB_MODE === 'supabase') {
      const btn = document.querySelector('.modal .btn-accent');
      if (btn) { btn.disabled = true; btn.textContent = 'Creazione in corso…'; }

      rpcCreateUser({
        email:      authEmail,
        password:   password,
        name:       name,
        username:   username,
        role:       role,
        profession: profession || '',
        phone:      phone || '',
        society_id: currentUser.societyId || null,
      }).then(result => {
        userId = result.id;

        // Aggiorna stato locale
        S.users.push({
          id: userId, username, role, name,
          profession, phone, email: authEmail,
          societyId: currentUser.societyId || null
        });
        syncUserCatAssignments(userId, role, catIds);
        // Sincronizza categorie/atleti modificati dopo creazione
        if (role !== 'genitore') {
          catIds.forEach(cid => {
            const cat = S.categories.find(c => c.id === cid);
            if (cat) sbSync('categories', cat);
          });
        }
        saveState();
        closeModal(); buildAdminConfigTab('users'); buildSidebarNav();
        toast('✅ Utente "' + name + '" creato — può accedere con: ' + authEmail, 'success');

      }).catch(err => {
        if (btn) { btn.disabled = false; btn.textContent = '💾 Salva Utente'; }
        toast('❌ Errore: ' + err.message, 'error');
      });

      return;

    } else {
      // Modalità locale (fallback)
      userId = uid();
      S.users.push({ id: userId, username, password, role, name, profession, phone, email: authEmail });
      syncUserCatAssignments(userId, role, catIds);
      saveState(); closeModal(); buildAdminConfigTab('users'); buildSidebarNav();
      toast('Utente aggiunto (modalità locale)','success');
    }
  }
}

function deleteUser(id) {
  const u = S.users.find(x=>x.id===id);
  if (!u) return;
  if (u.role === 'admin') { toast('Non puoi eliminare questo utente','error'); return; }
  const seasId2 = S.activeSeason || getActiveSeason()?.id || '';
  const seas2   = S.seasons.find(s=>s.id===seasId2);
  const ucsCount2 = (S.userCategorySeasons||[]).filter(ue=>ue.userId===id).length;
  const ucsSeasCount2 = (S.userCategorySeasons||[]).filter(ue=>ue.userId===id && ue.seasonId===seasId2).length;

  openModal(
    '<div class="modal-header"><h3 style="color:var(--red)">🗑️ Elimina Utente</h3></div>'
    + '<div style="margin-bottom:16px"><div class="fw-700" style="font-size:1rem;margin-bottom:8px">'+esc(u.name)+'</div></div>'
    + '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">'
    + '<div style="border:2px solid var(--gold);border-radius:10px;padding:14px;cursor:pointer;background:#FFFBEB" onclick="confirmDeleteUserSeason(&quot;'+id+'&quot;,&quot;'+seasId2+'&quot;)">'
    + '<div class="fw-700" style="color:var(--gold);margin-bottom:4px">⚽ Solo la stagione '+esc(seas2?.name||'corrente')+'</div>'
    + '<div style="font-size:.82rem;color:#475569">Rimuove le '+ucsSeasCount2+' assegnazioni di questa stagione. L\'utente rimane nel sistema.</div>'
    + '</div>'
    + '<div style="border:2px solid var(--red);border-radius:10px;padding:14px;cursor:pointer;background:#FFF5F5" onclick="confirmDeleteUserAll(&quot;'+id+'&quot;)">'
    + '<div class="fw-700" style="color:var(--red);margin-bottom:4px">🗑️ Elimina tutto ('+ucsCount2+' stagioni)</div>'
    + '<div style="font-size:.82rem;color:#475569">Elimina completamente l\'utente e tutti i suoi dati. Non reversibile.</div>'
    + '</div>'
    + '</div>'
    + '<button class="btn btn-ghost w-full" onclick="closeModal()">Annulla</button>'
  );
  return; // La funzione continua nei confirm* separati

  S.users = S.users.filter(x=>x.id!==id);
  S.categories.forEach(c => {
    c.directorIds    = (c.directorIds||[]).filter(i=>i!==id);
    c.managerIds     = (c.managerIds||[]).filter(i=>i!==id);
    c.coachIds       = (c.coachIds||[]).filter(i=>i!==id);
    c.professionalIds= (c.professionalIds||[]).filter(i=>i!==id);
  });
  saveState();
  buildAdminConfigTab('users'); buildSidebarNav();

  if (DB_MODE === 'supabase') {
    rpcDeleteUser(id)
      .then(() => toast('✅ Profilo "' + u.name + '" eliminato. Rimuovi anche l\'accesso da Supabase Dashboard → Authentication → Users', 'success'))
      .catch(err => toast('⚠️ Errore eliminazione profilo: ' + err.message, 'warning'));
  } else {
    toast('Utente eliminato', 'success');
  }
}
function buildStaffViewConfig() {
  // For non-admin: show read-only staff list per accessible category
  const accIds = getAccessibleCategoryIds();
  const cats = S.categories.filter(c => accIds.includes(c.id));
  if (!cats.length) return '<div class="empty-state"><div class="icon">👥</div><h3>Nessuna categoria</h3></div>';

  const roleRow = (u, role) => {
    if (!u) return '';
    const rd = ROLES[role]||{label:role,icon:'👤',gradient:'#999'};
    const cls = {responsabile:'badge-purple',dirigente:'badge-green',allenatore:'badge-gold',professionista:'badge-teal'}[role]||'badge-gray';
    return `<div class="athlete-row" style="cursor:default;margin-bottom:4px">
      <div class="user-avatar" style="background:${rd.gradient};width:34px;height:34px;font-size:.7rem">${initials(u.name)}</div>
      <div class="athlete-info">
        <div class="name">${esc(u.name)}</div>
        <div class="meta">${esc(u.profession||rd.label)} · ${esc(u.email||'')}</div>
      </div>
      <span class="badge ${cls}">${rd.icon} ${rd.label}</span>
    </div>`;
  };

  return cats.map(cat => {
    const team = S.teams.find(t=>t.id===cat.teamId);
    const soc  = S.societies.find(s=>s.id===cat.societyId);
    const allStaff = [
      ...(cat.managerIds||[]).map(id=>({u:S.users.find(x=>x.id===id),role:'responsabile'})),
      ...(cat.directorIds||[]).map(id=>({u:S.users.find(x=>x.id===id),role:'dirigente'})),
      ...(cat.coachIds||[]).map(id=>({u:S.users.find(x=>x.id===id),role:'allenatore'})),
      ...(cat.professionalIds||[]).map(id=>({u:S.users.find(x=>x.id===id),role:'professionista'})),
    ].filter(x=>x.u);
    return `<div class="card" style="margin-bottom:16px">
      <div class="card-title">
        <div class="icon" style="background:var(--accent-l);color:var(--accent)">🏷️</div>
        ${esc(cat.name)}
        <span class="badge badge-gray text-sm" style="margin-left:8px">${esc(soc?.name||'')} · ${esc(team?.name||'')}</span>
      </div>
      ${allStaff.map(({u,role})=>roleRow(u,role)).join('')}
      ${allStaff.length===0?'<div class="text-muted text-sm">Nessuno staff assegnato</div>':''}
    </div>`;
  }).join('');
}

  const actRows = Object.entries(actTypes).map(([k,v]) =>

// ── Activity Types CRUD ────────────────────────────────────
function saveActivityTypes() {
  const current = getActivityTypesMap();
  const updated = {};
  Object.keys(current).forEach(k => {
    const emoji  = document.getElementById('act-emoji-'+k)?.value.trim() || current[k].emoji;
    const label  = document.getElementById('act-label-'+k)?.value.trim() || current[k].label;
    const color  = document.getElementById('act-color-'+k)?.value || current[k].color;
    updated[k] = { label, emoji, color, cls: 'act-'+k };
  });
  S.activityTypes = updated;
  saveState(); sbSyncConfig('activityTypes', updated);
  buildAdminConfigTab('activities');
  toast('Tipi di attività salvati ✅', 'success');
}

function addActivityType() {
  const key   = document.getElementById('new-act-key').value.trim().toUpperCase().replace(/\s/g,'');
  const emoji = document.getElementById('new-act-emoji').value.trim() || '📋';
  const label = document.getElementById('new-act-label').value.trim();
  const color = document.getElementById('new-act-color').value;
  if (!key || !label) { toast('Chiave e nome obbligatori','error'); return; }
  const current = getActivityTypesMap();
  if (current[key]) { toast('Chiave già esistente','error'); return; }
  if (!S.activityTypes) S.activityTypes = { ...ACTIVITY_TYPES_DEFAULT };
  else if (Object.keys(S.activityTypes).length === 0) S.activityTypes = { ...ACTIVITY_TYPES_DEFAULT };
  S.activityTypes[key] = { label, emoji, color, cls: 'act-'+key };
  saveState(); sbSyncConfig('activityTypes', S.activityTypes);
  buildAdminConfigTab('activities');
  toast('Tipo attività "'+label+'" aggiunto ✅', 'success');
}

function deleteActivityType(key) {
  if (!confirm('Eliminare il tipo "'+key+'"? Le sessioni già create non verranno modificate.')) return;
  if (!S.activityTypes) S.activityTypes = { ...ACTIVITY_TYPES_DEFAULT };
  delete S.activityTypes[key];
  saveState(); sbSyncConfig('activityTypes', S.activityTypes);
  buildAdminConfigTab('activities');
  toast('Tipo eliminato', 'success');
}

function resetActivityTypes() {
  if (!confirm('Ripristinare i tipi di attività predefiniti?')) return;
  S.activityTypes = null;
  saveState(); sbSyncConfig('activityTypes', null);
  buildAdminConfigTab('activities');
  toast('Tipi ripristinati ai default');
}

// ── Performance Params CRUD ───────────────────────────────
function savePerfParams() {
  const current = getPerfParams().map(normPerfParam);
  const updated = current.map(({key}) => {
    const label = document.getElementById('perf-label-'+key)?.value.trim() || key;
    return { key, label };
  });
  S.perfParams = updated;
  saveState(); sbSyncConfig('perfParams', updated);
  buildAdminConfigTab('activities');
  toast('Parametri performance salvati ✅', 'success');
}

function addPerfParam() {
  const key   = document.getElementById('new-perf-key').value.trim().toLowerCase().replace(/\s/g,'_');
  const label = document.getElementById('new-perf-label').value.trim();
  if (!key || !label) { toast('Chiave e etichetta obbligatorie','error'); return; }
  const current = getPerfParams().map(normPerfParam);
  if (current.some(p => p.key === key)) { toast('Parametro già esistente','error'); return; }
  if (!S.perfParams) S.perfParams = PERF_PARAMS_DEFAULT.map(k => ({ key:k, label:PERF_LABELS_DEFAULT[k]||k }));
  S.perfParams.push({ key, label });
  saveState(); sbSyncConfig('perfParams', S.perfParams);
  buildAdminConfigTab('activities');
  toast('Parametro "'+label+'" aggiunto ✅', 'success');
}

function deletePerfParam(key) {
  if (!confirm('Eliminare il parametro "'+key+'"? I dati già registrati non verranno modificati.')) return;
  const current = getPerfParams().map(normPerfParam);
  S.perfParams = current.filter(p => p.key !== key);
  saveState(); sbSyncConfig('perfParams', S.perfParams);
  buildAdminConfigTab('activities');
  toast('Parametro eliminato');
}

function resetPerfParams() {
  if (!confirm('Ripristinare i parametri performance predefiniti?')) return;
  S.perfParams = null;
  saveState(); sbSyncConfig('perfParams', null);
  buildAdminConfigTab('activities');
  toast('Parametri ripristinati ai default');
}

    const matchCnt  = (S.matches||[]).filter(m => m.date >= start && m.date <= end).length;
    const statusBadge = s.active

        Atleti, categorie, squadre e staff sono <strong>riutilizzabili tra stagioni</strong>:

      </div>
      <div class="table-wrap">
        <table>

              <th title="Assegnazioni in user_category_seasons">Staff</th>

        </table>

      <div class="form-row">

            oninput="const e=document.getElementById('cfg-seas-end');if(e)e.value=+this.value+1">
        </div>
        <div class="form-field">
          <label>Anno Fine <span style="font-weight:400;color:#64748B">(la stagione finisce il 31 luglio)</span></label>
          <input id="cfg-seas-end" type="number" value="${nextEnd}" min="2000" max="2100">

        1 ago ${nextStart} → 31 lug ${nextEnd}.

      <button class="btn btn-accent" onclick="addSeasonFromConfig()">+ Crea Stagione</button>
    </div>`;
}

function addSeasonFromConfig() {
  const start = parseInt(document.getElementById('cfg-seas-start').value);
  const end   = parseInt(document.getElementById('cfg-seas-end').value);
  if (!start || !end || end !== start + 1) {
    toast('L\'anno fine deve essere esattamente anno inizio + 1 (es. 2026 → 2027)', 'error'); return;
  }
  const name = `${start}/${end}`;
  if ((S.seasons||[]).some(s => s.name===name)) { toast('Stagione già esistente','error'); return; }
  if (!S.seasons) S.seasons = [];
  const newSeas = {
    id: uid(), name, startYear: start, endYear: end, active: false,
    startDate: `${start}-08-01`, endDate: `${end}-07-31`
  };
  S.seasons.push(newSeas);
  saveState(); sbSync('seasons', newSeas); rebuildSeasonSelector(); buildAdminConfigTab('seasons');
  toast(`Stagione ${name} creata (1 ago ${start} → 31 lug ${end}) ✅`, 'success');
}

// ─────────────────────────────────────────────────────────────
// FIX 7: cloneSeason — copia assegnazioni staff UCS in altra stagione
// ─────────────────────────────────────────────────────────────
function cloneSeason(sourceId) {
  const src = S.seasons.find(s=>s.id===sourceId);
  if (!src) return;
  const targets = S.seasons.filter(s=>s.id!==sourceId).sort((a,b)=>b.startYear-a.startYear);
  if (!targets.length) {
    toast('Crea prima una stagione di destinazione','warning'); return;
  }
  const opts = targets.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  openModal(`
    <div class="modal-header"><h3>📋 Clona struttura stagione</h3></div>
    <p style="margin-bottom:14px;color:#64748B;font-size:.88rem">
      Copia le assegnazioni staff dalla stagione <strong>${esc(src.name)}</strong>
      in un'altra stagione.<br>
      <em>Gli atleti non vengono copiati — le iscrizioni si gestiscono individualmente.</em>
    </p>
    <div class="form-field">
      <label>Stagione di destinazione</label>
      <select id="clone-target">${opts}</select>
    </div>
    <div style="margin-top:8px;font-size:.82rem;color:#64748B">
      ⚠️ Le assegnazioni già presenti nella stagione di destinazione non saranno duplicate.
    </div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-accent" onclick="executeCloneSeason('${sourceId}')">📋 Clona Staff</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
    </div>`);
}

function executeCloneSeason(sourceId) {
  const targetId = document.getElementById('clone-target')?.value;
  if (!targetId) return;
  const srcUCS = (S.userCategorySeasons||[]).filter(u=>u.seasonId===sourceId);
  if (!srcUCS.length) { toast('Nessuna assegnazione staff da clonare','warning'); closeModal(); return; }
  let added = 0;
  srcUCS.forEach(u => {
    const dup = (S.userCategorySeasons||[]).find(x =>
      x.userId===u.userId && x.categoryId===u.categoryId && x.seasonId===targetId
    );
    if (!dup) {
      const entry = { ...u, id: uid(), seasonId: targetId };
      S.userCategorySeasons.push(entry);
      sbSync('user_category_seasons', entry);
      added++;
    }
  });
  saveState();
  closeModal();
  const targetName = S.seasons.find(s=>s.id===targetId)?.name || targetId;
  toast(`${added} assegnazioni staff clonate nella stagione ${targetName} ✅`, 'success');
  buildAdminConfigTab('seasons');
}

function exportReportExcel() {
  if (typeof XLSX === 'undefined') { toast('Libreria Excel non disponibile','error'); return; }
  const wb = XLSX.utils.book_new();
  const activeSeas = getActiveSeason();

  // Foglio 1: Riepilogo Categorie
  const catData = [['Categoria','Sport','Squadra','Società','Atleti','Sessioni','% Presenze','Allenamenti','Partite']];
  S.categories.forEach(cat => {
    const st = getCategoryStats(cat.id);
    catData.push([
      cat.name,
      S.sports.find(s=>s.id===cat.sportId)?.name||'—',
      S.teams.find(t=>t.id===cat.teamId)?.name||'—',
      S.societies.find(s=>s.id===cat.societyId)?.name||'—',
      st.athletes, st.sessions, st.presenceRate+'%',
      st.byType?.A||0, st.byType?.P||0
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(catData), 'Categorie');

  // Foglio 2: Classifica Atleti
  const athData = [['#','Cognome','Nome','Categoria','% Presenze','Tecnica','Fisico','Tattica','Mentale','Overall']];
  S.athletes.map(a => {
    const cat = S.categories.find(c=>c.id===a.categoryId);
    const pr = getAthletePresenceRate(a.id, a.categoryId);
    const perf = getAthleteAvgPerf(a.id);
    return {a, cat, pr, perf};
  }).sort((x,y)=>y.pr-x.pr).forEach(({a,cat,pr,perf},i) => {
    athData.push([i+1, a.lastName, a.firstName, cat?.name||'—',
      pr+'%', perf.tecnica?.toFixed(1)||0, perf.fisico?.toFixed(1)||0,
      perf.tattica?.toFixed(1)||0, perf.mentale?.toFixed(1)||0, perf.overall?.toFixed(1)||0]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(athData), 'Classifica Atleti');

  // Foglio 3: Partite
  const matchData = [['Data','Categoria','Squadra','Avversario','Casa/Trasferta','Risultato','Gol Fatti','Gol Subiti','Note']];
  S.matches.sort((a,b)=>a.date.localeCompare(b.date)).forEach(m => {
    const cat = S.categories.find(c=>c.id===m.categoryId);
    const team = S.teams.find(t=>t.id===m.teamId)||S.teams.find(t=>t.id===cat?.teamId);
    matchData.push([fmtDate(m.date), cat?.name||'—', team?.name||'—', m.opponent||'—',
      m.homeAway==='home'?'Casa':'Trasferta', m.result||'TBD',
      m.scoredGoals||0, m.concededGoals||0, m.notes||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(matchData), 'Partite');

  // Foglio 4: Presenze per Sessione
  const presData = [['Data','Tipo','Categoria','Atleta','Stato']];
  S.sessions.sort((a,b)=>a.date.localeCompare(b.date)).forEach(sess => {
    const cat = S.categories.find(c=>c.id===sess.categoryId);
    const atts = S.attendances.filter(a=>a.sessionId===sess.id);
    atts.forEach(att => {
      const ath = S.athletes.find(a=>a.id===att.athleteId);
      if (!ath) return;
      presData.push([fmtDate(sess.date), sess.type||'—', cat?.name||'—',
        (ath.lastName+' '+ath.firstName).trim(),
        {P:'Presente',A:'Assente',G:'Giustificato'}[att.status]||att.status]);
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(presData), 'Presenze');

  const fname = 'sporttrack_report_' + (activeSeas?.name?.replace('/','_')||new Date().getFullYear()) + '.xlsx';
  XLSX.writeFile(wb, fname);
  toast('Report Excel esportato ✅','success');
}

function filterAthletes() {
  const q          = (document.getElementById('ath-search')?.value||'').toLowerCase();
  const sort       = document.getElementById('ath-sort')?.value||'name';
  const teamFilter = document.getElementById('ath-team-filter')?.value||'';
  const seas       = getActiveSeason();
  let athletes = getCategoryAthletesForSeason(selectedCategoryId, seas?.id)
    .filter(a => (a.firstName+' '+a.lastName+' '+(a.role||'')+' '+(a.nickname||'')).toLowerCase().includes(q));
  if (teamFilter) athletes = athletes.filter(a => (a.teamId||'')===teamFilter);
  if (sort==='number') athletes.sort((a,b)=>(a.number||0)-(b.number||0));
  else if (sort==='team') athletes.sort((a,b)=>(S.teams.find(t=>t.id===a.teamId)?.name||'').localeCompare(S.teams.find(t=>t.id===b.teamId)?.name||''));
  else if (sort==='pres') athletes.sort((a,b)=>getAthletePresenceRate(b.id,selectedCategoryId)-getAthletePresenceRate(a.id,selectedCategoryId));
  else athletes.sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||''));
  renderAthleteTable(athletes);
}

function buildParentSelector(athleteId, selectedIds) {
  const parents = S.users.filter(u => u.role === 'genitore');
  const sel = selectedIds || [];
  // ND = nessun genitore collegato
  const isND = !sel.length || sel[0] === '_ND';

  let html = '<div id="parent-checkboxes" style="display:flex;flex-direction:column;gap:6px">';
  // Voce ND
  html += '<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;cursor:pointer;border:1.5px solid '+(isND?'var(--accent)':'var(--mist-3)')+';background:'+(isND?'var(--accent-l)':'var(--white)')+'" id="parent-opt-ND">'
    + '<input type="checkbox" value="_ND" id="parent-cb-ND" '+(isND?'checked':'')+' onchange="handleParentCB(this)">'
    + '<span style="font-size:.88rem;font-weight:600;color:'+(isND?'var(--accent)':'var(--ink)')+'">ND — Nessun genitore collegato</span>'
    + '</label>';
  if (!parents.length) {
    html += '<div style="font-size:.78rem;color:#64748B;padding:4px 6px">Nessun utente con ruolo Genitore registrato.</div>';
  } else {
    parents.forEach(p => {
      const checked = !isND && sel.includes(p.id);
      html += '<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;cursor:pointer;border:1.5px solid '+(checked?'var(--accent)':'var(--mist-3)')+';background:'+(checked?'var(--accent-l)':'var(--white)')+'" id="parent-opt-'+p.id+'">'
        + '<input type="checkbox" value="'+p.id+'" id="parent-cb-'+p.id+'" '+(checked?'checked':'')+' onchange="handleParentCB(this)">'
        + '<span style="font-size:.88rem">' + esc(p.name) + ' <span style="color:#64748B;font-size:.8rem">(' + esc(p.username) + ')</span></span>'
        + '</label>';
    });
  }
  html += '</div>';
  return html;
}

function handleParentCB(cb) {
  const isND = cb.value === '_ND';
  // Se si seleziona ND, deseleziona tutti gli altri
  if (isND && cb.checked) {
    document.querySelectorAll('#parent-checkboxes input[type=checkbox]').forEach(el => {
      if (el.value !== '_ND') { el.checked = false; _updateParentOptStyle(el); }
    });
  }
  // Se si seleziona un genitore, deseleziona ND
  if (!isND && cb.checked) {
    const ndCb = document.getElementById('parent-cb-ND');
    if (ndCb) { ndCb.checked = false; _updateParentOptStyle(ndCb); }
  }
  _updateParentOptStyle(cb);
}

function _updateParentOptStyle(cb) {
  const label = document.getElementById('parent-opt-' + cb.value);
  if (!label) return;
  if (cb.checked) {
    label.style.borderColor = 'var(--accent)';
    label.style.background = 'var(--accent-l)';
    label.querySelector('span').style.color = 'var(--accent)';
  } else {
    label.style.borderColor = 'var(--mist-3)';
    label.style.background = 'var(--white)';
    label.querySelector('span').style.color = 'var(--ink)';
  }
}

async function addAthleteSeasonEntry(athleteId) {
  const seasonId = document.getElementById('as-new-season')?.value;
  const catId    = document.getElementById('as-new-cat')?.value;
  const teamId   = document.getElementById('as-new-team')?.value || '';
  const shirt    = document.getElementById('as-new-shirt')?.value || '';
  if (!seasonId || !catId) { toast('Seleziona stagione e categoria','error'); return; }
  // Controlla duplicati
  const dup = (S.athleteSeasons||[]).find(as =>
    as.athleteId===athleteId && as.seasonId===seasonId && as.categoryId===catId
  );
  if (dup) { toast('Iscrizione già presente per questa stagione/categoria','warning'); return; }

  const entry = {
    id: uid(), athleteId, seasonId, categoryId: catId,
    teamId: teamId||null, shirtNumber: shirt||null, role: '', notes: '',
    joinDate: new Date().toISOString().slice(0,10)
  };
  if (!S.athleteSeasons) S.athleteSeasons = [];
  S.athleteSeasons.push(entry);
  saveState();
  // Verifica che l'atleta esista nel DB prima di inserire la FK
  const athExists = S.athletes.find(a=>a.id===athleteId);
  if (!athExists) { toast('Atleta non trovato','error'); return; }
  // Attende che l'atleta sia nel DB (può essere appena creato)
  await sbSync('athletes', athExists);
  await sbSync('athlete_seasons', entry);
  toast('Iscrizione aggiunta ✅','success');
  // Refresh panel (sia nel modal che nella pagina profilo)
  const panel = document.getElementById('ath-seasons-panel');
  if (panel) panel.innerHTML = buildAthleteSeasonsList(athleteId);
  // Refresh anche nella pagina profilo se aperta
  const profEl = document.getElementById('view-athlete-profile');
  if (profEl && currentView === 'athlete-profile') viewBuilders['athlete-profile'](profEl);
}

function removeAthleteSeasonEntry(asId) {
  if (!confirm('Rimuovere questa iscrizione stagionale?')) return;
  const as = (S.athleteSeasons||[]).find(x=>x.id===asId);
  const athleteId = as?.athleteId;
  S.athleteSeasons = (S.athleteSeasons||[]).filter(x=>x.id!==asId);
  saveState();
  sbSync('athlete_seasons', asId, true);
  toast('Iscrizione rimossa','success');
  const panel = document.getElementById('ath-seasons-panel');
  if (panel && athleteId) panel.innerHTML = buildAthleteSeasonsList(athleteId);
}

async function saveAthlete(id) {
  const firstName = document.getElementById('ath-fname').value.trim();
  const lastName  = document.getElementById('ath-lname').value.trim();
  if (!firstName || !lastName) { toast('Nome e cognome obbligatori','error'); return; }

  const parentCBs = document.querySelectorAll('#parent-checkboxes input[type=checkbox]:checked');
  const parentIds = Array.from(parentCBs).map(cb=>cb.value).filter(v=>v!=='_ND');

  // Dati anagrafici puri — immutabili nel tempo, indipendenti dalla stagione
  const data = {
    firstName, lastName,
    nickname:  document.getElementById('ath-nick')?.value.trim() || '',
    dob:       document.getElementById('ath-dob').value || null,
    notes:     document.getElementById('ath-notes')?.value.trim() || '',
    parentIds,
  };

  const isNew = !id;
  if (id) {
    const existing = S.athletes.find(x=>x.id===id);
    if (!existing) { toast('Atleta non trovato','error'); return; }
    Object.assign(existing, data);
    toast('Atleta aggiornato ✅','success');
  } else {
    S.athletes.push({ id: uid(), ...data });
    toast('Atleta aggiunto ✅ — usa "Assoc." per aggiungere le iscrizioni stagionali','success');
  }
  const savedAth = id ? S.athletes.find(x=>x.id===id) : S.athletes[S.athletes.length-1];
  saveState();
  sbSync('athletes', savedAth);

  closeModal();

  // Dopo la creazione, apri subito la modale associazioni
  if (isNew) {
    setTimeout(() => openAthleteSeasonModal(savedAth.id), 150);
    return;
  }

  if (currentView === 'admin-athletes') {
    viewBuilders['admin-athletes'](document.getElementById('view-admin-athletes'));
  } else {
    showView('athletes');
  }
}
