function confirmDeleteAthleteSeason(id, seasId) {
  closeModal();
  const asId = (S.athleteSeasons||[]).find(as=>as.athleteId===id && as.seasonId===seasId)?.id;
  if (asId) {
    S.athleteSeasons = S.athleteSeasons.filter(x=>x.id!==asId);
    sbSync('athlete_seasons', asId, true);
  }
  // Rimuovi presenze delle sessioni di quella stagione
  const seas = S.seasons.find(s=>s.id===seasId);
  if (seas) {
    const { start, end } = getSeasonDates(seas); // 1 ago → 31 lug
    const seasSessIds = S.sessions.filter(s=>s.categoryId && s.date>=start && s.date<=end).map(s=>s.id);
    S.attendances = S.attendances.filter(a=>!(a.athleteId===id && seasSessIds.includes(a.sessionId)));
  }
  saveState();
  const view = currentView === 'athlete-profile' ? 'athletes' : currentView;
  if (currentView === 'athlete-profile') showView('athletes');
  else buildAdminConfigTab('users');
  toast('Stagione rimossa dall\'atleta ✅','success');
}

function confirmDeleteAthleteAll(id) {
  closeModal();
  S.athletes    = S.athletes.filter(x=>x.id!==id);
  S.attendances = S.attendances.filter(x=>x.athleteId!==id);
  S.athleteSeasons = (S.athleteSeasons||[]).filter(x=>x.athleteId!==id);
  saveState();
  sbSync('athletes', id, true);
  sbSyncDeleteWhere('attendances','athlete_id',id);
  sbSyncDeleteWhere('athlete_seasons','athlete_id',id);
  showView('athletes'); toast('Atleta eliminato','success');
}

function renderSessionsList() {

function refreshNewSessionTeams(catId) {
  const wrapper = document.getElementById('ns-team-wrapper');
  if (!wrapper) return;
  const catTeams = getCategoryTeams(catId);
  wrapper.innerHTML = '<label>Squadra (opzionale)</label>' +

function createSession() {
  if (currentUser?.role === 'presidente') { toast('Accesso in sola lettura','error'); return; }
  const date   = document.getElementById('sess-date').value;
  const type   = document.getElementById('sess-type').value;
  const notes  = document.getElementById('sess-notes').value.trim();
  const catId  = document.getElementById('ns-cat')?.value || selectedCategoryId || '';
  const teamId = document.getElementById('ns-team')?.value || '';
  if (!date) { toast('Data obbligatoria','error'); return; }
  if (!catId) { toast('Seleziona una categoria','error'); return; }
  if (!canEditSessions(catId)) { toast('Non hai i permessi','error'); return; }
  const sess = { id: uid(), categoryId: catId, date, type, notes, createdBy: currentUser.id, societyId: currentUser.societyId || null };
  if (teamId) sess.teamId = teamId;
  S.sessions.push(sess);
  // Sync filter state
  if (!window._sessState) window._sessState = {};
  window._sessState.catId = catId;
  window._sessState.type  = type;
  if (catId !== selectedCategoryId) { selectedCategoryId = catId; buildSidebarNav(); }
  saveState(); sbSync('sessions', sess); closeModal();
  toast('Sessione creata ✅','success');
  openSessionEdit(sess.id);
}
function deleteSession(id) {
  if (!confirm('Eliminare questa sessione e tutte le presenze?')) return;
  S.sessions = S.sessions.filter(x=>x.id!==id);
  S.attendances = S.attendances.filter(x=>x.sessionId!==id);
  saveState();
  sbSync('sessions', id, true);
  sbSyncDeleteWhere('attendances','session_id',id);
  sbSyncDeleteWhere('performances','session_id',id);
  renderSessionsList(); toast('Sessione eliminata');
}

// Clean click handler using data attributes — avoids nested template literal issues
function attClick(btn) {
  if (btn.disabled) return;
  const sessId = btn.dataset.sessid;
  const athId  = btn.dataset.athid;
  const st     = btn.dataset.st;
  setAttStatus(sessId, athId, st);
}

function setAttStatus(sessId, athleteId, status) {
  let att = S.attendances.find(a => a.sessionId===sessId && a.athleteId===athleteId);
  if (!att) {
    att = { id: uid(), sessionId: sessId, athleteId, status, perf: { tecnica:0, fisico:0, tattica:0, mentale:0, velocita:0 }, notes: '' };
    S.attendances.push(att);
  } else {
    att.status = status;
  }
  saveState(); sbSync('attendances', att);
  // update UI
  ['P','A','G'].forEach(s => {
    const btn = document.getElementById(`btn-${s}-${athleteId}`);
    if (btn) { btn.className = `att-cell ${s===status?`att-${s}`:'att-empty'}`; }
  });
  const perfSec = document.getElementById(`perf-section-${athleteId}`);
  if (perfSec) perfSec.style.display = status==='P' ? 'block' : 'none';
}
function setStarPerf(star) {
  const v = parseInt(star.dataset.v);
  const p = star.dataset.param;
  const aid = star.dataset.aid;
  const sessId = star.dataset.sessid;
  let att = S.attendances.find(a => a.sessionId===sessId && a.athleteId===aid);
  if (!att) return;
  if (!att.perf) att.perf = {};
  att.perf[p] = v;
  // Salva anche in performances table su Supabase
  const perfObj = { id: att.id, sessionId: att.sessionId, athleteId: att.athleteId, params: att.perf, notes: att.notes||'' };
  saveState(); sbSync('performances', perfObj);
  const stars = document.querySelectorAll(`#stars-${aid}-${p} .star`);
  stars.forEach((s,i) => s.classList.toggle('on', i<v));
}
function setAttNote(sessId, athleteId, val) {
  const att = S.attendances.find(a => a.sessionId===sessId && a.athleteId===athleteId);
  if (att) { att.notes = val; saveState(); sbSync('attendances', att); }
}
function markAll(sessId, status) {
  const athletes = getCategoryAthletes(selectedCategoryId);
  athletes.forEach(ath => setAttStatus(sessId, ath.id, status));
  toast(`Tutti segnati: ${STATUS_LABELS[status]}`, 'success');
}

function buildAthDashTable(athStats, filter) {
  let data = athStats;
  if (filter==='best') data = athStats.filter(x=>x.pr>=70);
  if (filter==='risk') data = athStats.filter(x=>x.pr<55);
  const _multiT = getCategoryTeams(selectedCategoryId).length > 1;
  const _noTeamFilter = !window._dashTeam;
  return `<table>
    <thead><tr><th>Atleta</th><th>Ruolo</th>${_multiT && _noTeamFilter ? '<th>Squadra</th>' : ''}<th>Presenze %</th>${getPerfParams().map(normPerfParam).map(({label})=>`<th>${esc(label)}</th>`).join('')}<th>Overall</th><th>Azione</th></tr></thead>
    <tbody>${data.map(({a,pr,perf})=>{
      const stars = v => v>0?`<span style="color:var(--gold)">${'★'.repeat(Math.round(v))}</span><span style="color:var(--mist-3)">${'★'.repeat(5-Math.round(v))}</span>`:'<span class="text-muted">—</span>';
      const teamName = a.teamId ? S.teams.find(t=>t.id===a.teamId)?.name||'—' : '—';
      return `<tr>
        <td style="cursor:pointer" onclick="openAthleteProfile('${a.id}')">
          <div style="display:flex;align-items:center;gap:8px">${athleteAvatar(a,28)}<span class="fw-600">${esc(a.lastName)} ${esc(a.firstName)}</span></div>
        </td>
        <td class="text-sm">${esc(a.role||'—')}</td>
        ${_multiT && _noTeamFilter ? `<td><span class="badge badge-gray" style="font-size:.72rem">${esc(teamName)}</span></td>` : ''}
        <td>${ratingBadge(pr)} <span class="fw-700">${pr}%</span></td>
        ${getPerfParams().map(normPerfParam).map(({key})=>`<td>${stars(perf[key]||0)}</td>`).join('')}
        <td>${stars(perf.overall)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="openAthleteProfile('${a.id}')">Profilo</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}
function showAthletesDashTab(filter) {
  const _seas = window._dashSeas || getActiveSeason()?.id;
  const _team = window._dashTeam || undefined;
  const athletes = getCategoryAthletesForSeason(selectedCategoryId, _seas, _team);
  const athStats = athletes.map(a => {
    const pr = getAthletePresenceRate(a.id, selectedCategoryId);
    const perf = getAthleteAvgPerf(a.id);
    return { a, pr, perf };
  }).sort((x,y)=>y.pr-x.pr);
  const c = document.getElementById('ath-dash-table');
  if (c) c.innerHTML = buildAthDashTable(athStats, filter);
}

function openAthleteProfile(id) {
  window._athProfileId = id;
  showView('athlete-profile');
}
viewBuilders['athlete-profile'] = (el) => {
  const id  = window._athProfileId;

  if (!ath) { el.innerHTML = '<div class="empty-state"><p>Atleta non trovato</p></div>'; return; }

  const perf  = getAthleteAvgPerf(id);

  // Stagione correntemente visualizzata nel profilo (default: attiva)

    window._athProfSeas   = S.activeSeason || getActiveSeason()?.id || '';
    window._athProfLastId = id;

  const activeSeasAS = allAS.find(as=>as.seasonId===profSeasId);

  const seasAtts = atts.filter(a=>seasSessions.some(s=>s.id===a.sessionId));

  const ass   = seasAtts.filter(a=>a.status==='A').length;
  const giust = seasAtts.filter(a=>a.status==='G').length;

    const tp = pct(typeAtts.filter(a=>a.status==='P').length, typeSess.length);
    return { key:k, act:v, sessions: typeSess.length, presRate: tp };
  });

  // Statistiche partite stagione corrente
  const matchMs = getCategoryMatchStats(seasCatId, seasTeamId||undefined, profSeasId);

  // Storia sessioni per stagione selezionata
  const history = seasSessions.map(s => ({
    s, att: atts.find(a=>a.sessionId===s.id)

  // Selettore stagione
  const seasSelector = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">'
    + '<span style="font-size:.8rem;font-weight:700;color:#64748B">📅 Stagione:</span>'
    + '<select style="padding:5px 12px;border:1.5px solid #CBD5E0;border-radius:8px;font-size:.85rem;font-weight:600;background:#F8FAFC" onchange="window._athProfSeas=this.value;S.activeSeason=this.value;rebuildSeasonSelector();viewBuilders[&quot;athlete-profile&quot;](document.getElementById(&quot;view-athlete-profile&quot;))">'

function buildSocDashContent(socId) {
  const c = document.getElementById('soc-content');
  if (!c) return;
  const soc = S.societies.find(s=>s.id===socId);

  const teams = S.teams.filter(t=>t.societyId===socId);

  // Filtro stagione

  const socSeas = socSeasId ? S.seasons.find(s=>s.id===socSeasId) : null;
  const { start: socStart, end: socEnd } = socSeas ? getSeasonDates(socSeas) : { start: null, end: null };
  const allAths = S.athletes.filter(a=>cats.some(c=>c.id===a.categoryId));
  const allSess = S.sessions.filter(s=>cats.some(c=>c.id===s.categoryId) && (!socSeas || (s.date>=socStart && s.date<=socEnd)));
  const allAtts = S.attendances.filter(a=>allSess.some(s=>s.id===a.sessionId));
  const presAtts = allAtts.filter(a=>a.status==='P').length;

      const catIds = cats.map(c=>c.id);

        <div class="stat-card green"><div class="accent-bar"></div><div class="label">Punti Totali</div><div class="value">${ms.pts}</div><div class="sub">${ms.w}V ${ms.d}P ${ms.l}S</div></div>

        <div class="stat-card red"><div class="accent-bar"></div><div class="label">Gol Subiti</div><div class="value">${ms.gs}</div><div class="sub">diff. ${gdSign}${ms.gd}</div></div>
      </div>`;

    <div class="grid-2">

//  BACKUP & RESTORE
// ══════════════════════════════════════════════════════════════════
function exportBackupJSON() {
  const data = JSON.stringify(S, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `backup_sporttrack_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ Backup esportato con successo', 'success');
}

function importBackupJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      // Basic validation
      if (!parsed.users || !parsed.athletes === undefined) {
        toast('❌ File non valido: struttura non riconosciuta', 'error');
        return;
      }
      if (!confirm('⚠️ Vuoi sovrascrivere tutti i dati attuali con il backup? L\'operazione non è reversibile.')) {
        input.value = '';
        return;
      }
      S = parsed;
      saveState();
      toast('✅ Backup ripristinato con successo! Ricaricamento...', 'success');
      setTimeout(() => location.reload(), 1500);
    } catch(err) {
      toast('❌ Errore nella lettura del file JSON', 'error');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

//  EXCEL EXPORT ENGINE (pure JS, no dependency)
//  Generates real .xlsx files using Open XML format
// ══════════════════════════════════════════════════════════════════

// Minimal XLSX writer — produces valid .xlsx without external libraries
const XLSXWriter = {
  // Escape XML special chars
  xmlEsc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  },

  // Convert column index (0-based) to letter(s)
  colLetter(n) {
    let s = '';
    n++;
    while (n > 0) { s = String.fromCharCode(65 + (n-1)%26) + s; n = Math.floor((n-1)/26); }
    return s;
  },

  // Cell reference
  ref(row, col) { return this.colLetter(col) + row; },

  // Build shared strings table
  buildSST(sheets) {
    const strs = new Map();
    let idx = 0;
    sheets.forEach(sh => sh.rows.forEach(row => row.forEach(cell => {
      if (cell.t === 's' && !strs.has(cell.v)) strs.set(cell.v, idx++);
    })));
    return strs;
  },

  // Cell XML
  cellXML(ref, cell, sst) {
    if (cell.v === null || cell.v === undefined || cell.v === '') return '';
    const s = cell.s || 0;
    if (cell.t === 's') {
      const si = sst.get(cell.v);
      return `<c r="${ref}" t="s" s="${s}"><v>${si}</v></c>`;
    }
    if (cell.t === 'p') { // percent
      const num = typeof cell.v === 'number' ? cell.v : parseFloat(cell.v)||0;
      return `<c r="${ref}" s="${s}"><v>${num/100}</v></c>`;
    }
    // number
    const num = typeof cell.v === 'number' ? cell.v : parseFloat(cell.v)||0;
    return `<c r="${ref}" s="${s}"><v>${num}</v></c>`;
  },

  // Build worksheet XML
  buildWorksheet(sheet, sst) {
    const rows = sheet.rows;
    let xml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">`;

    // Column widths
    if (sheet.colWidths) {
      xml += '<cols>';
      sheet.colWidths.forEach((w,i) => {
        if (w) xml += `<col min="${i+1}" max="${i+1}" width="${w}" customWidth="1"/>`;
      });
      xml += '</cols>';
    }

    xml += '<sheetData>';
    rows.forEach((row, ri) => {
      const rn = ri + 1;
      const ht = sheet.rowHeights?.[ri] || '';
      xml += `<row r="${rn}"${ht ? ` ht="${ht}" customHeight="1"` : ''}>`;
      row.forEach((cell, ci) => {
        const ref = this.ref(rn, ci);
        xml += this.cellXML(ref, cell, sst);
      });
      xml += '</row>';
    });
    xml += '</sheetData></worksheet>';
    return xml;
  },

  // Styles XML — define fills, fonts, borders, xfs
  buildStyles() {
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  <fonts>
    <font><sz val="10"/><name val="Calibri"/></font>
    <font><b/><sz val="10"/><name val="Calibri"/></font>
    <font><b/><sz val="11"/><name val="Calibri"/><color rgb="FFFFFFFF"/></font>
    <font><sz val="10"/><name val="Calibri"/><color rgb="FF1A56DB"/></font>
    <font><sz val="10"/><name val="Calibri"/><color rgb="FF059669"/></font>
    <font><sz val="10"/><name val="Calibri"/><color rgb="FFDC2626"/></font>
    <font><b/><sz val="10"/><name val="Calibri"/><color rgb="FF1A56DB"/></font>
    <font><b/><sz val="12"/><name val="Calibri"/><color rgb="FFFFFFFF"/></font>
  </fonts>
  <fills>
    <fill><patternFill patternType="none"/></fill>
    <fill><patternFill patternType="gray125"/></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FF1A3A5C"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFD6E4F0"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFEAF2FF"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFD1FAE5"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFFEE2E2"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFFFF3CD"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FFE2E8F0"/></patternFill></fill>
    <fill><patternFill patternType="solid"><fgColor rgb="FF2C3E50"/></patternFill></fill>
  </fills>
  <borders><border><left/><right/><top/><bottom/><diagonal/></border>
    <border><left style="thin"><color auto="1"/></left><right style="thin"><color auto="1"/></right><top style="thin"><color auto="1"/></top><bottom style="thin"><color auto="1"/></bottom><diagonal/></border>
  </borders>
  <cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
  <cellXfs>
    <xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0"><alignment wrapText="0"/></xf>
    <xf numFmtId="0" fontId="1" fillId="2" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="2" fillId="2" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="1" fillId="8" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="0" fillId="4" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="4" fillId="5" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="5" fillId="6" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="0" fillId="7" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="9" fontId="6" fillId="3" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="9" fontId="0" fillId="4" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="1" fillId="9" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
    <xf numFmtId="0" fontId="7" fillId="9" borderId="1" xfId="0"><alignment horizontal="center"/></xf>
  </cellXfs>
</styleSheet>`;
  },

  // Generate ZIP-like .xlsx bytes using a simple approach
  // We'll base64 encode a pre-built minimal xlsx and inject our data
  // Actually we'll write real XML parts and zip them using JSZip-compatible manual approach

  // Simpler: write CSV-like format that Excel can open, but as proper xlsx using
  // the data URI approach with actual XML. We build the full zip manually.

  // Base64 encode string
  b64(str) {
    return btoa(unescape(encodeURIComponent(str)));
  },

  // Create xlsx as a Blob using manual ZIP construction
  // We implement a minimal ZIP writer
  createXLSX(sheets) {
    const sst = this.buildSST(sheets);

    // Build all XML parts
    const parts = {};

    // [Content_Types].xml
    let sheetRels = sheets.map((s,i)=>
      `<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`
    ).join('');
    parts['[Content_Types].xml'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
<Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>
${sheetRels}
</Types>`;

    // _rels/.rels
    parts['_rels/.rels'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`;

    // xl/_rels/workbook.xml.rels
    let wbRels = sheets.map((s,i)=>
      `<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`
    ).join('');
    wbRels += `<Relationship Id="rId${sheets.length+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>`;
    wbRels += `<Relationship Id="rId${sheets.length+2}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>`;
    parts['xl/_rels/workbook.xml.rels'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${wbRels}</Relationships>`;

    // xl/workbook.xml
    const sheetElems = sheets.map((s,i)=>
      `<sheet name="${this.xmlEsc(s.name)}" sheetId="${i+1}" r:id="rId${i+1}"/>`
    ).join('');
    parts['xl/workbook.xml'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<sheets>${sheetElems}</sheets></workbook>`;

    // xl/styles.xml
    parts['xl/styles.xml'] = this.buildStyles();

    // xl/sharedStrings.xml
    const sstArr = Array.from(sst.keys());
    parts['xl/sharedStrings.xml'] = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${sstArr.length}" uniqueCount="${sstArr.length}">
${sstArr.map(s=>`<si><t xml:space="preserve">${this.xmlEsc(s)}</t></si>`).join('')}
</sst>`;

    // xl/worksheets/sheet*.xml
    sheets.forEach((sh, i) => {
      parts[`xl/worksheets/sheet${i+1}.xml`] = this.buildWorksheet(sh, sst);
    });

    // Build ZIP
    return this.buildZip(parts);
  },

  // Minimal ZIP builder (store, no compression — valid xlsx)
  buildZip(parts) {
    const encoder = new TextEncoder();
    const entries = [];
    const centralDir = [];
    let offset = 0;

    for (const [name, content] of Object.entries(parts)) {
      const nameBytes  = encoder.encode(name);
      const dataBytes  = encoder.encode(content);
      const crc        = this.crc32(dataBytes);
      const localHeader = this.localFileHeader(nameBytes, dataBytes.length, crc);
      entries.push(localHeader, dataBytes);
      centralDir.push(this.centralDirEntry(nameBytes, dataBytes.length, crc, offset));
      offset += localHeader.length + dataBytes.length;
    }

    const cdBytes  = this.concat(centralDir);
    const eocd     = this.endOfCentralDir(centralDir.length, cdBytes.length, offset);
    return new Blob([this.concat(entries), cdBytes, eocd], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  },

  concat(arrays) {
    const total = arrays.reduce((s,a)=>s+a.length,0);
    const out = new Uint8Array(total);
    let off = 0;
    arrays.forEach(a => { out.set(a, off); off += a.length; });
    return out;
  },

  le16(n) { return new Uint8Array([n&0xff,(n>>8)&0xff]); },
  le32(n) { return new Uint8Array([n&0xff,(n>>8)&0xff,(n>>16)&0xff,(n>>24)&0xff]); },

  localFileHeader(name, size, crc) {
    return this.concat([
      new Uint8Array([0x50,0x4b,0x03,0x04]), // sig
      this.le16(20),   // version needed
      this.le16(0),    // flags
      this.le16(0),    // compression (store)
      this.le16(0),    // mod time
      this.le16(0),    // mod date
      this.le32(crc),
      this.le32(size), // compressed
      this.le32(size), // uncompressed
      this.le16(name.length),
      this.le16(0),    // extra
      name
    ]);
  },

  centralDirEntry(name, size, crc, offset) {
    return this.concat([
      new Uint8Array([0x50,0x4b,0x01,0x02]),
      this.le16(20), this.le16(20), this.le16(0), this.le16(0),
      this.le16(0), this.le16(0),
      this.le32(crc), this.le32(size), this.le32(size),
      this.le16(name.length), this.le16(0), this.le16(0),
      this.le16(0), this.le16(0), this.le32(0),
      this.le32(offset), name
    ]);
  },

  endOfCentralDir(count, cdSize, cdOffset) {
    return this.concat([
      new Uint8Array([0x50,0x4b,0x05,0x06]),
      this.le16(0), this.le16(0),
      this.le16(count), this.le16(count),
      this.le32(cdSize), this.le32(cdOffset),
      this.le16(0)
    ]);
  },

  crc32(bytes) {
    let c = 0xFFFFFFFF;
    for (let i = 0; i < bytes.length; i++) {
      c ^= bytes[i];
      for (let j = 0; j < 8; j++) c = (c&1) ? (0xEDB88320 ^ (c>>>1)) : (c>>>1);
    }
    return (c ^ 0xFFFFFFFF) >>> 0;
  },

  // Download blob
  download(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  }
};

// Style constants for cells
const XS = {
  TITLE:    { t:'s', s:11 },  // white bold on dark, large
  HDR:      { t:'s', s:1  },  // bold white on navy
  HDR_DARK: { t:'s', s:10 },  // bold on dark section
  SUB_HDR:  { t:'s', s:3  },  // bold on gray
  NORMAL:   { t:'s', s:0  },
  ALT:      { t:'s', s:4  },  // light blue bg
  GREEN:    { t:'s', s:5  },
  RED:      { t:'s', s:6  },
  GOLD:     { t:'s', s:7  },
  PCT:      { t:'p', s:8  },  // percent, blue
  PCT_N:    { t:'p', s:9  },
};

function makeCell(v, style) { return { v: String(v ?? ''), ...style }; }
function numCell(v, s=0)    { return { v: Number(v)||0, t:'n', s }; }
function pctCell(v, s=8)    { return { v: Number(v)||0, t:'p', s }; }
function emptyRow(n)        { return Array(n).fill({ v:'', t:'s', s:0 }); }

// ── Export: Presenze ────────────────────────────────────────
function exportPresenze() {
  const catSel = document.getElementById('exp-cat-1').value;
  const catList = catSel === 'all'
    ? S.categories.filter(c => currentUser.role==='admin' || getAccessibleCategoryIds().includes(c.id))
    : S.categories.filter(c=>c.id===catSel);

  const sheets = catList.map(cat => {
    const athletes = getCategoryAthletes(cat.id).sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||''));
    const sessions = getCategorySessions(cat.id);
    const team = S.teams.find(t=>t.id===cat.teamId);
    const sport = S.sports.find(s=>s.id===cat.sportId);

    const colWidths = [5, 22, 12, 12, ...sessions.map(()=>5), 8, 8, 8, 9, 9, 9];
    const rows = [];

    // Title row
    rows.push([makeCell(`REGISTRO PRESENZE — ${cat.name} (${sport?.name||''} · ${team?.name||''})`, XS.HDR_DARK),
      ...Array(sessions.length+9).fill({v:'',t:'s',s:10})]);

    // Date row
    rows.push([makeCell('#',XS.HDR), makeCell('Atleta',XS.HDR), makeCell('Ruolo',XS.HDR), makeCell('N.',XS.HDR),
      ...sessions.map(s=>makeCell(fmtDate(s.date), XS.HDR)),
      makeCell('P',XS.HDR), makeCell('A',XS.HDR), makeCell('G',XS.HDR),
      makeCell('% Tot.',XS.HDR), makeCell('% All.',XS.HDR), makeCell('% Part.',XS.HDR)
    ]);

    // Type row
    rows.push([makeCell('',XS.SUB_HDR), makeCell('Tipo →',XS.SUB_HDR), makeCell('',XS.SUB_HDR), makeCell('',XS.SUB_HDR),
      ...sessions.map(s=>makeCell((getActivityTypesMap()[s.type]?.label||s.type), XS.SUB_HDR)),
      ...Array(6).fill({v:'',t:'s',s:3})
    ]);

    athletes.forEach((ath, i) => {
      const atts = getAthleteAttendances(ath.id);
      const pres = atts.filter(a=>sessions.some(s=>s.id===a.sessionId)&&a.status==='P').length;
      const ass  = atts.filter(a=>sessions.some(s=>s.id===a.sessionId)&&a.status==='A').length;
      const giust= atts.filter(a=>sessions.some(s=>s.id===a.sessionId)&&a.status==='G').length;
      const tot  = sessions.length;
      const prRate = tot ? pres/tot : 0;
      const aRate  = sessions.filter(s=>s.type==='A').length ? atts.filter(a=>sessions.find(s=>s.id===a.sessionId&&s.type==='A')&&a.status==='P').length / sessions.filter(s=>s.type==='A').length : 0;
      const pRate  = sessions.filter(s=>s.type==='P').length ? atts.filter(a=>sessions.find(s=>s.id===a.sessionId&&s.type==='P')&&a.status==='P').length / sessions.filter(s=>s.type==='P').length : 0;

      const altS = i%2===0 ? XS.ALT : XS.NORMAL;
      rows.push([
        makeCell(ath.number||'', altS),
        makeCell(`${ath.lastName} ${ath.firstName}`, altS),
        makeCell(ath.role||'', altS),
        makeCell(ath.number||'', altS),
        ...sessions.map(s => {
          const att = atts.find(a=>a.sessionId===s.id);
          const st = att?.status||'';
          const cellS = st==='P' ? XS.GREEN : st==='A' ? XS.RED : st==='G' ? XS.GOLD : altS;
          return makeCell(st||'—', cellS);
        }),
        numCell(pres), numCell(ass), numCell(giust),
        pctCell(prRate*100), pctCell(aRate*100), pctCell(pRate*100)
      ]);
    });

    return { name: cat.name.slice(0,31), rows, colWidths };
  });

  const blob = XLSXWriter.createXLSX(sheets);
  XLSXWriter.download(blob, `Presenze_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('File scaricato!', 'success');
}

// ── Export: Performance ────────────────────────────────────
function exportPerformance() {
  const catSel = document.getElementById('exp-cat-2').value;
  const catList = catSel === 'all'
    ? S.categories.filter(c => currentUser.role==='admin' || getAccessibleCategoryIds().includes(c.id))
    : S.categories.filter(c=>c.id===catSel);

  const sheets = catList.map(cat => {
    const athletes = getCategoryAthletes(cat.id).sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||''));
    const sessions = getCategorySessions(cat.id);
    const colWidths = [5, 22, 10, ...sessions.map(()=>6), 8, 8, 8, 8, 8, 9];
    const rows = [];

    rows.push([makeCell(`PERFORMANCE — ${cat.name}`, XS.HDR_DARK), ...Array(sessions.length+9).fill({v:'',t:'s',s:10})]);

    PERF_PARAMS.forEach(param => {
      rows.push([
        makeCell(`▶ ${PERF_LABELS[param].toUpperCase()}`, XS.HDR),
        makeCell('Atleta', XS.HDR),
        makeCell('Ruolo', XS.HDR),
        ...sessions.map(s=>makeCell(fmtDate(s.date), XS.HDR)),
        makeCell('Media', XS.HDR),
        ...Array(5).fill({v:'',t:'s',s:1})
      ]);

      athletes.forEach((ath, i) => {
        const atts = getAthleteAttendances(ath.id);
        const altS = i%2===0 ? XS.ALT : XS.NORMAL;
        const vals = sessions.map(s => {
          const att = atts.find(a=>a.sessionId===s.id);
          return att?.status==='P' ? (att.perf?.[param]||0) : null;
        });
        const nonNull = vals.filter(v=>v!==null&&v>0);
        const avgVal = nonNull.length ? avg(nonNull) : 0;
        rows.push([
          makeCell(ath.number||'', altS),
          makeCell(`${ath.lastName} ${ath.firstName}`, altS),
          makeCell(ath.role||'', altS),
          ...vals.map(v => v !== null ? numCell(v||0) : makeCell('—', altS)),
          numCell(Math.round(avgVal*10)/10),
          ...Array(5).fill({v:'',t:'s',s:0})
        ]);
      });
      rows.push(emptyRow(sessions.length+9));
    });

    return { name: cat.name.slice(0,31), rows, colWidths };
  });

  const blob = XLSXWriter.createXLSX(sheets);
  XLSXWriter.download(blob, `Performance_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('File scaricato!', 'success');
}

  const _glIsAdmin = currentUser.role === 'admin';
  // Sheet 1: Atleti
  const athRows = [[makeCell('ATLETI',XS.HDR_DARK),...Array(12).fill({v:'',t:'s',s:10})],
    [makeCell('Cognome',XS.HDR),makeCell('Nome',XS.HDR),makeCell('Ruolo',XS.HDR),
     makeCell('Categoria',XS.HDR),makeCell('Squadra',XS.HDR),makeCell('Società',XS.HDR),
     makeCell('Sport',XS.HDR),makeCell('% Pres.',XS.HDR),makeCell('Overall',XS.HDR)]];
  S.athletes.filter(a=>_glIsAdmin||_glAccIds.includes(a.categoryId)).sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||'')).forEach((ath,i)=>{
    const cat=S.categories.find(c=>c.id===ath.categoryId);
    const team=S.teams.find(t=>t.id===cat?.teamId);
    const soc=S.societies.find(s=>s.id===cat?.societyId);
    const sport=S.sports.find(s=>s.id===cat?.sportId);
    const pr=getAthletePresenceRate(ath.id,ath.categoryId);
    const perf=getAthleteAvgPerf(ath.id);
    const altS=i%2===0?XS.ALT:XS.NORMAL;
    athRows.push([makeCell(ath.lastName||'',altS),makeCell(ath.firstName||'',altS),makeCell(ath.role||'',altS),
      makeCell(cat?.name||'',altS),makeCell(team?.name||'',altS),makeCell(soc?.name||'',altS),makeCell(sport?.name||'',altS),
      pctCell(pr),numCell(Math.round((perf.overall||0)*10)/10)]);
  });
  sheets.push({name:'Atleti',rows:athRows,colWidths:[18,15,14,16,16,16,12,10,9]});

  // Sheet 2: Presenze globali
  const presRows = [[makeCell('PRESENZE GLOBALI',XS.HDR_DARK),...Array(8).fill({v:'',t:'s',s:10})],
    [makeCell('Data',XS.HDR),makeCell('Tipo',XS.HDR),makeCell('Categoria',XS.HDR),
     makeCell('Atleta',XS.HDR),makeCell('Stato',XS.HDR),
     makeCell('Tecnica',XS.HDR),makeCell('Fisico',XS.HDR),makeCell('Tattica',XS.HDR),
     makeCell('Mentale',XS.HDR),makeCell('Comunicaz.',XS.HDR),makeCell('Note',XS.HDR)]];
  let presIdx=0;
  S.sessions.forEach(sess=>{
    const cat=S.categories.find(c=>c.id===sess.categoryId);
    const atts=getSessionAttendances(sess.id);
    atts.forEach(att=>{
      const ath=S.athletes.find(a=>a.id===att.athleteId);
      const altS=presIdx%2===0?XS.ALT:XS.NORMAL;
      presRows.push([makeCell(fmtDate(sess.date),altS),makeCell((getActivityTypesMap()[sess.type]?.label||''),altS),
        makeCell(cat?.name||'',altS),makeCell(`${ath?.lastName||''} ${ath?.firstName||''}`,altS),
        makeCell(STATUS_LABELS[att.status]||'',att.status==='P'?XS.GREEN:att.status==='A'?XS.RED:XS.GOLD),
        numCell(att.perf?.tecnica||0),numCell(att.perf?.fisico||0),numCell(att.perf?.tattica||0),
        numCell(att.perf?.mentale||0),numCell(att.perf?.comunicazione||0),makeCell(att.notes||'',altS)]);
      presIdx++;
    });
  });
  sheets.push({name:'Presenze Globali',rows:presRows,colWidths:[12,16,16,22,12,9,9,9,9,11,25]});

  // Sheet 3: Categorie
  const catRows=[[makeCell('CATEGORIE',XS.HDR_DARK),...Array(8).fill({v:'',t:'s',s:10})],
    [makeCell('Categoria',XS.HDR),makeCell('Squadra',XS.HDR),makeCell('Società',XS.HDR),makeCell('Sport',XS.HDR),
     makeCell('Atleti',XS.HDR),makeCell('Sessioni',XS.HDR),makeCell('% Presenze',XS.HDR)]];
  S.categories.filter(c=>_glIsAdmin||_glAccIds.includes(c.id)).forEach((cat,i)=>{
    const st=getCategoryStats(cat.id);
    const altS=i%2===0?XS.ALT:XS.NORMAL;
    catRows.push([makeCell(cat.name,altS),makeCell(S.teams.find(t=>t.id===cat.teamId)?.name||'',altS),
      makeCell(S.societies.find(s=>s.id===cat.societyId)?.name||'',altS),makeCell(S.sports.find(s=>s.id===cat.sportId)?.name||'',altS),
      numCell(st.athletes),numCell(st.sessions),pctCell(st.presenceRate)]);
  });
  sheets.push({name:'Categorie',rows:catRows,colWidths:[18,18,18,14,9,9,11]});

  const blob = XLSXWriter.createXLSX(sheets);
  XLSXWriter.download(blob,`ReportGlobale_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Report globale scaricato!','success');
}

const MATCH_COLORS = [
  '#1A3A5C','#0D4F2E','#4A1A5C','#7A1A1A','#1A4A5C',
  '#2D1A5C','#5C3A1A','#1A5C3A','#3A3A3A','#1A1A5C',
  '#5C1A3A','#1A5C5C','#0F2A0F','#2A0F2A','#0F1A2A'
];

const RESULT_LABELS = { W:'Vittoria', D:'Pareggio', L:'Sconfitta', TBD:'Da giocare' };
const HOMEAWAY_LABELS = { home:'Casa 🏠', away:'Trasferta ✈️', neutral:'Campo Neutro ⚽' };

function getCategoryMatches(catId) {
  return (S.matches||[]).filter(m=>m.categoryId===catId).sort((a,b)=>b.date.localeCompare(a.date));
}
function getMatchConvocati(matchId) {
  return (S.convocati||[]).filter(c=>c.matchId===matchId);
}

// ── MATCHES VIEW ─────────────────────────────────────────────
viewBuilders['matches'] = (el) => {
  // Persistent filter state
  if (!window._matchState) window._matchState = {};
  const ms = window._matchState;
  const activeSeas = getActiveSeason();
  if (!ms.catId && selectedCategoryId) ms.catId = selectedCategoryId;
  if (!ms.seasId) ms.seasId = activeSeas?.id || '';

  const allSeasons = (S.seasons||[]);
  const isAdmin = currentUser.role === 'admin';
  const accessibleCatIds = getAccessibleCategoryIds();
  const availCats = isAdmin ? S.categories : S.categories.filter(c=>accessibleCatIds.includes(c.id));
  const curCat  = S.categories.find(c=>c.id===ms.catId) || S.categories.find(c=>c.id===selectedCategoryId);
  const curSeas = allSeasons.find(s=>s.id===ms.seasId) || activeSeas;
  const catTeams= curCat ? getCategoryTeams(curCat.id) : [];
  const canMgr  = curCat ? canEditSessions(curCat.id) : false;

  const allMatches = curCat ? getCategoryMatchesForSeason(curCat.id, ms.seasId) : [];
  const matches = ms.teamId
    ? allMatches.filter(m => !m.teamId || m.teamId === ms.teamId)
    : allMatches;

  setTopbar('Partite & Convocati', curCat?.name||'');

  const stats = { W:0, D:0, L:0, TBD:0 };
  matches.forEach(m => stats[m.result||'TBD']++);
  const played = stats.W + stats.D + stats.L;

  // Sync selectedCategoryId
  if (ms.catId && ms.catId !== selectedCategoryId) {
    selectedCategoryId = ms.catId;
    buildSidebarNav();
  }

  el.innerHTML = `
    <!-- ── FILTRI PARTITE ─────────────────────────────────── -->
    <div style="background:#FFFFFF;border:1px solid #E2E8F0;border-radius:var(--radius-lg);padding:12px 18px;margin-bottom:18px;display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.06);box-shadow:none">
      <span style="font-size:.78rem;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">🔍 Filtri</span>

      <div class="form-field" style="margin:0;min-width:130px;flex:1">
        <label style="font-size:.73rem">Stagione</label>
        <select onchange="window._matchState.seasId=this.value;viewBuilders['matches'](document.getElementById('view-matches'))">
          ${allSeasons.slice().reverse().map(s=>`<option value="${s.id}" ${s.id===ms.seasId?'selected':''}>${esc(s.name)}${s.active?' ★':''}</option>`).join('')}
        </select>
      </div>

      <div class="form-field" style="margin:0;min-width:130px;flex:1">
        <label style="font-size:.73rem">Categoria</label>
        <select onchange="window._matchState.catId=this.value;window._matchState.teamId='';viewBuilders['matches'](document.getElementById('view-matches'))">
          ${availCats.map(c=>`<option value="${c.id}" ${c.id===ms.catId?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
      </div>

      ${catTeams.length > 1 ? `
      <div class="form-field" style="margin:0;min-width:110px;flex:1">
        <label style="font-size:.73rem">Squadra</label>
        <select onchange="window._matchState.teamId=this.value;viewBuilders['matches'](document.getElementById('view-matches'))">
          <option value="">Tutte</option>
          ${catTeams.map(t=>`<option value="${t.id}" ${t.id===ms.teamId?'selected':''}>${esc(t.name)}</option>`).join('')}
        </select>
      </div>` : ''}

      ${canMgr ? `<button class="btn btn-accent" style="margin-bottom:1px" onclick="openMatchModal()">+ Nuova Partita</button>` : ''}
    </div>

    <!-- Header info -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <h2 style="font-size:1.2rem;font-weight:800;margin:0">⚽ Partite & Convocati</h2>
      <span class="badge badge-blue">🏷️ ${esc(curCat?.name||'—')}</span>
      ${ms.teamId ? `<span class="badge badge-gray">👕 ${esc(S.teams.find(t=>t.id===ms.teamId)?.name||'')}</span>` : ''}
      <span class="season-badge">⚽ ${esc(curSeas?.name||'')}</span>
      <span class="text-muted text-sm" style="margin-left:auto">${matches.length} partite</span>
    </div>

    ${played > 0 ? `
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card blue"><div class="accent-bar"></div><div class="label">Punti</div><div class="value">${stats.W*3 + stats.D}</div><div class="sub">${played} partite giocate</div></div>
      <div class="stat-card green"><div class="accent-bar"></div><div class="label">Vittorie</div><div class="value">${stats.W}</div><div class="sub">${played ? Math.round(stats.W/played*100) : 0}%</div></div>
      <div class="stat-card gold"><div class="accent-bar"></div><div class="label">Pareggi</div><div class="value">${stats.D}</div></div>
      <div class="stat-card red"><div class="accent-bar"></div><div class="label">Sconfitte</div><div class="value">${stats.L}</div></div>
      <div class="stat-card green"><div class="accent-bar"></div><div class="label">Gol Fatti</div><div class="value">${matches.reduce((s,m)=>s+(m.scoredGoals||0),0)}</div><div class="sub">media ${played ? (matches.reduce((s,m)=>s+(m.scoredGoals||0),0)/played).toFixed(1) : 0}/partita</div></div>
      <div class="stat-card red"><div class="accent-bar"></div><div class="label">Gol Subiti</div><div class="value">${matches.reduce((s,m)=>s+(m.concededGoals||0),0)}</div><div class="sub">diff. ${matches.reduce((s,m)=>s+(m.scoredGoals||0)-(m.concededGoals||0),0) >= 0 ? '+' : ''}${matches.reduce((s,m)=>s+(m.scoredGoals||0)-(m.concededGoals||0),0)}</div></div>
      ${stats.TBD > 0 ? `<div class="stat-card teal"><div class="accent-bar"></div><div class="label">Da giocare</div><div class="value">${stats.TBD}</div></div>` : ''}
    </div>` : ''}

    <div id="matches-list">
      ${matches.length === 0
        ? `<div class="empty-state"><div class="icon">⚽</div><h3>Nessuna partita registrata</h3>
           <p>Aggiungi la prima partita per questa categoria.</p>
           ${canMgr ? `<button class="btn btn-accent" onclick="openMatchModal()">+ Nuova Partita</button>` : ''}</div>`
        : matches.map(m => buildMatchCard(m, canMgr)).join('')}
    </div>
  `;
};

function buildMatchCard(m, canMgr) {
  const bg = m.bgColor || '#1A3A5C';
  const convs = getMatchConvocati(m.id);
  const convCount = convs.filter(c=>c.status==='convocato').length;
  const riserveCount = convs.filter(c=>c.status==='riserva').length;
  const resultCls = 'match-result-' + (m.result||'TBD');
  const scoreText = m.result && m.result !== 'TBD'
    ? `${m.scoredGoals||0} — ${m.concededGoals||0}`
    : 'Da giocare';
  const resultLabel = RESULT_LABELS[m.result||'TBD']||'';

  return `
  <div class="match-card ${resultCls}" id="match-${m.id}">
    <div class="match-header" style="background:${esc(bg)}">
      <div>
        <div style="font-size:.75rem;opacity:.7;text-transform:uppercase;letter-spacing:.08em">${HOMEAWAY_LABELS[m.homeAway]||''}</div>
        <div style="font-size:1.3rem;font-weight:800;margin:4px 0">vs ${esc(m.opponent)}</div>
        <div style="font-size:.82rem;opacity:.75">📅 ${fmtDate(m.date)} ${m.time?'· 🕐 '+m.time:''}</div>
        ${m.meetTime ? `<div style="font-size:.78rem;opacity:.7;margin-top:4px">🤝 Ritrovo: ${esc(m.meetTime)} · 📍 ${esc(m.meetPlace||'')}</div>` : ''}
      </div>
      <div style="text-align:right">
        <div class="match-score">${scoreText}</div>
        <div style="font-size:.82rem;opacity:.75;margin-top:4px">${resultLabel}</div>
      </div>
    </div>
    <div class="match-body">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span class="badge badge-blue">👥 ${convCount} convocati</span>
        ${riserveCount > 0 ? `<span class="badge badge-gold">🔄 ${riserveCount} riserve</span>` : ''}
        ${m.notes ? `<span class="text-muted text-sm truncate" style="flex:1">📝 ${esc(m.notes)}</span>` : ''}
        <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-accent btn-sm" onclick="openConvocatiView('${m.id}')">👥 Convocati</button>
          ${m.sessionId ? `<button class="btn btn-ghost btn-sm" onclick="openSessionEdit('${m.sessionId}')">📋 Presenze</button>` : ''}
          ${canMgr ? `<button class="btn btn-ghost btn-sm" onclick="openMatchModal('${m.id}')">✏️ Modifica</button>` : ''}
          ${canMgr ? `<button class="btn btn-ghost btn-sm" onclick="exportMatchImage('${m.id}')">🖼️ Esporta</button>` : ''}
          ${canMgr ? `<button class="btn btn-danger btn-sm" onclick="deleteMatch('${m.id}')">🗑️</button>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

// ── MATCH MODAL (crea/modifica) ──────────────────────────────

  // Pre-fill from filter state or existing match
  const ms = window._matchState || {};
  const preCatId  = m?.categoryId || ms.catId || selectedCategoryId || '';
  const preTeamId = m?.teamId     || ms.teamId || '';
  const preCat    = S.categories.find(c=>c.id===preCatId);
  const catTeams  = preCat ? getCategoryTeams(preCatId) : [];

  const isAdmin = currentUser.role === 'admin';
  const accessibleCatIds = getAccessibleCategoryIds();
  const availCats = isAdmin ? S.categories : S.categories.filter(c=>accessibleCatIds.includes(c.id));

  const colorSwatches = MATCH_COLORS.map(c =>
    `<div class="color-swatch ${c===curColor?'selected':''}" style="background:${c}"
      data-color="${c}" onclick="selectMatchColor(this,'${c}')"></div>`

  openModal(`
    <div class="modal-header">
      <h3>${m?'Modifica Partita':'Nuova Partita'}</h3>

            <option value="">— Seleziona —</option>
            ${availCats.map(c=>`<option value="${c.id}" ${c.id===preCatId?'selected':''}>${esc(c.name)}</option>`).join('')}

        </div>
        <div class="form-field" style="margin:0" id="m-team-wrapper">
          <label style="font-size:.78rem">Squadra</label>
          <select id="m-team">
            <option value="">— Tutta la categoria —</option>
            ${catTeams.map(t=>`<option value="${t.id}" ${t.id===preTeamId?'selected':''}>${esc(t.name)}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>

      <div class="form-field"><label>Avversario</label><input id="m-opp" value="${esc(m?.opponent||'')}" placeholder="Nome squadra avversaria"></div>

    <div class="form-row">

    <div class="form-row">

      <div class="form-field">

      ⚽ Tabellino Marcatori
    </div>
    <div id="scorers-list" style="margin-bottom:8px">

    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
      <div class="form-field" style="flex:1;min-width:140px;margin:0">
        <label style="font-size:.75rem">Atleta</label>
        <select id="scorer-athlete" style="font-size:.85rem">
          <option value="">— Seleziona —</option>
          ${getCategoryAthletes(m?.categoryId||'').sort((a,b)=>(a.number||99)-(b.number||99)).map(a =>
            `<option value="${a.id}">#${a.number||'—'} ${esc(a.lastName)} ${esc(a.firstName)}</option>`
          ).join('')}
        </select>
      </div>
      <div class="form-field" style="width:70px;margin:0">
        <label style="font-size:.75rem">Gol</label>
        <input id="scorer-goals" type="number" value="1" min="1" max="20" style="font-size:.9rem;text-align:center">
      </div>
      <button class="btn btn-accent btn-sm" onclick="addScorer('${id}')" style="margin-bottom:2px">+ Aggiungi</button>
    </div>` : '<div style="font-size:.8rem;color:#64748B;margin:8px 0">Salva prima la partita per aggiungere i marcatori.</div>'}

    <hr style="margin:14px 0">
    <div class="form-field">
      <label>🎨 Colore Sfondo Convocati</label>
      <input type="hidden" id="m-color" value="${curColor}">
      <div class="color-picker-strip">${colorSwatches}</div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
        <span class="text-muted text-sm">Personalizzato:</span>
        <input type="color" id="m-color-custom" value="${curColor}"
          oninput="document.getElementById('m-color').value=this.value;document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'))"
          style="width:40px;height:32px;border:none;border-radius:6px;cursor:pointer">
      </div>
    </div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-accent btn-lg" onclick="saveMatch('${id||''}')">💾 Salva Partita</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
    </div>`, 'modal-xl');
}

function selectMatchColor(el, color) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  const inp = document.getElementById('m-color');
  if (inp) inp.value = color;
  const custom = document.getElementById('m-color-custom');
  if (custom) custom.value = color;

async function saveMatch(id) {
  // Previeni doppio click
  const saveBtn = document.querySelector('.modal .btn-accent');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Salvataggio...'; }
  const restoreBtn = () => { if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 Salva Partita'; } };

  const opponent  = document.getElementById('m-opp').value.trim();
  const homeAway  = document.getElementById('m-ha').value;
  const date      = document.getElementById('m-date').value;
  const time      = document.getElementById('m-time').value;
  const meetTime  = document.getElementById('m-meet').value;
  const meetPlace = document.getElementById('m-place').value.trim();
  const result    = document.getElementById('m-res').value;
  const gf        = parseInt(document.getElementById('m-gf').value)||0;
  const gs        = parseInt(document.getElementById('m-gs').value)||0;
  const notes     = document.getElementById('m-notes').value.trim();
  const bgColor   = document.getElementById('m-color').value || '#1A3A5C';
  // Read category and team from modal (new fields)
  const modalCatId  = document.getElementById('m-cat')?.value  || '';
  const modalTeamId = document.getElementById('m-team')?.value || '';

  if (!opponent || !date) { toast('Avversario e data obbligatori','error'); restoreBtn(); return; }
  if (!S.matches) S.matches = [];

  if (id) {
    const existing = S.matches.find(x=>x.id===id);
    if (!existing) { toast('Partita non trovata','error'); return; }
    Object.assign(existing, { opponent, homeAway, date, time, meetTime, meetPlace,
      result, scoredGoals:gf, concededGoals:gs, notes, bgColor });
    // Update category/team if changed via modal
    if (modalCatId) existing.categoryId = modalCatId;
    if (modalTeamId !== undefined) existing.teamId = modalTeamId || undefined;
    // Sync linked session
    if (existing.sessionId) {
      const linkedSess = S.sessions.find(s => s.id === existing.sessionId);
      if (linkedSess) {
        linkedSess.date = date;
        linkedSess.notes = 'Partita vs ' + opponent + (notes ? ' — ' + notes : '');
        if (modalCatId) linkedSess.categoryId = modalCatId;
      }
    }
    const mSaved = S.matches.find(x=>x.id===id);
    saveState();
    if(mSaved.sessionId){ const ls=S.sessions.find(s=>s.id===mSaved.sessionId); if(ls) await sbSync('sessions',ls); }
    await sbSync('matches', mSaved); closeModal();
    toast('Partita aggiornata ✅','success');
    if (currentView === 'convocati') {
      viewBuilders['convocati'](document.getElementById('view-convocati'));
    } else {
      showView('matches');
    }
  } else {
    const catId  = modalCatId  || selectedCategoryId;
    const teamId = modalTeamId || '';
    if (!catId) { toast('Seleziona una categoria','error'); restoreBtn(); return; }
    const mid    = uid();
    const sessId = uid();
    // Controlla che non esista già una partita/sessione in corso di salvataggio
    if (S.matches.find(x=>x.id===mid)) { restoreBtn(); return; }
    // Ricava teamId dalla categoria se non selezionato manualmente
    const cat = S.categories.find(c=>c.id===catId);
    const resolvedTeamId = teamId || cat?.teamId || null;
    const sessNotes = 'Partita vs ' + opponent + (notes ? ' — ' + notes : '');
    S.sessions.push({ id: sessId, categoryId: catId, date, type: 'P',
      notes: sessNotes, createdBy: currentUser.id, matchId: mid });
    S.matches.push({ id: mid, opponent, homeAway, date, time, meetTime, meetPlace,
      result, scoredGoals:gf, concededGoals:gs, notes, bgColor,
      categoryId: catId, teamId: resolvedTeamId||undefined, createdBy: currentUser.id,
      sessionId: sessId, linkedSessionId: sessId });
    // Sync filter state
    if (!window._matchState) window._matchState = {};
    window._matchState.catId  = catId;
    window._matchState.teamId = teamId;
    if (catId !== selectedCategoryId) { selectedCategoryId = catId; buildSidebarNav(); }
    const newM = S.matches[S.matches.length-1];
    const newSess = S.sessions[S.sessions.length-1];
    // Allinea linkedSessionId con sessionId per la vista convocati
    newM.linkedSessionId = sessId;
    saveState();
    // Salva sessione PRIMA della partita (FK constraint)
    await sbSync('sessions', newSess);
    await sbSync('matches', newM);
    restoreBtn();
    closeModal();
    toast('Partita aggiunta ✅ — Sessione creata automaticamente','success');
    showView('matches');
  }
}

// ── Helper: ricava la sessione collegata a una partita ──────────
// Cerca prima nei campi locali, poi in S.sessions per match_id
function getMatchSession(matchId) {
  const m = S.matches.find(x=>x.id===matchId);
  if (!m) return null;
  // Prova sessionId/linkedSessionId (impostati dal frontend)
  const localSessId = m.sessionId || m.linkedSessionId;
  if (localSessId) {
    const s = S.sessions.find(x=>x.id===localSessId);
    if (s) return s;
  }
  // Fallback: cerca per match_id nella tabella sessions
  const byMatchId = S.sessions.find(s=>s.matchId===matchId);
  if (byMatchId) {
    // Aggiorna i campi locali per le volte successive
    m.sessionId = byMatchId.id;
    m.linkedSessionId = byMatchId.id;
    return byMatchId;
  }
  return null;
}

function deleteMatch(id) {
  if (!confirm('Eliminare questa partita, i convocati e la sessione collegata?')) return;
  const m = S.matches.find(x=>x.id===id);
  // Usa sia sessionId che linkedSessionId (due nomi usati storicamente)
  const sessId = m?.sessionId || m?.linkedSessionId || null;
  if (sessId) {
    S.attendances = (S.attendances||[]).filter(x => x.sessionId !== sessId);
    S.sessions    = (S.sessions||[]).filter(x => x.id !== sessId);
  }
  S.matches    = (S.matches||[]).filter(x=>x.id!==id);
  S.convocati  = (S.convocati||[]).filter(x=>x.matchId!==id);
  S.scorers    = (S.scorers||[]).filter(x=>x.matchId!==id);
  saveState();
  sbSync('matches', id, true);
  sbSyncDeleteWhere('convocati','match_id',id);
  sbSyncDeleteWhere('scorers','match_id',id);
  if(sessId){ sbSync('sessions', sessId, true); sbSyncDeleteWhere('attendances','session_id',sessId); }
  showView('matches'); toast('Partita e sessione eliminate ✅');
}

// Create a linked session for an existing match that doesn't have one
function createLinkedSession(matchId) {
  const m = S.matches.find(x=>x.id===matchId);
  // Blocca se la sessione esiste già
  if (!m || getMatchSession(matchId)) {
    toast('Sessione già collegata a questa partita','warning');
    return;
  }
  const sessId = uid();
  const newSess = { id: sessId, categoryId: m.categoryId, date: m.date, type: 'P',
    notes: 'Partita vs ' + m.opponent, createdBy: currentUser.id, matchId };
  S.sessions.push(newSess);
  // Imposta entrambi i riferimenti per compatibilità
  m.sessionId = sessId;
  m.linkedSessionId = sessId;
  saveState();
  sbSync('sessions', newSess);
  sbSync('matches', m);
  toast('Sessione creata e collegata ✅','success');
  viewBuilders['convocati'](document.getElementById('view-convocati'));
}

// Auto-mark all convocati as Present in the linked session
function markAllConvocatiPresent(matchId) {
  const m = S.matches.find(x=>x.id===matchId);
  const markSess = getMatchSession(matchId);
  if (!markSess) return;
  m.linkedSessionId = markSess.id;
  const convocati = (S.convocati||[]).filter(c=>c.matchId===matchId && c.status==='convocato').map(c=>c.athleteId);
  convocati.forEach(aid => setAttStatus(markSess.id, aid, 'P'));
  toast('Convocati segnati come Presenti','success');
  viewBuilders['convocati'](document.getElementById('view-convocati'));
}

function setCvStatus(matchId, athleteId, status) {
  if (!S.convocati) S.convocati = [];
  let cv = S.convocati.find(c=>c.matchId===matchId && c.athleteId===athleteId);
  if (!cv) {
    cv = { id: uid(), matchId, athleteId, status, notes: '' };
    S.convocati.push(cv);
  } else {
    cv.status = status;
  }
  saveState(); sbSync('convocati', cv);
  // Refresh the view
  viewBuilders['convocati'](document.getElementById('view-convocati'));
}

function setCvNote(matchId, athleteId, val) {
  if (!S.convocati) S.convocati = [];
  const cv = S.convocati.find(c=>c.matchId===matchId && c.athleteId===athleteId);
  if (cv) { cv.notes = val; saveState(); sbSync('convocati', cv); }
}

function convocaTutti(matchId) {
  const m = S.matches.find(x=>x.id===matchId);
  if (!m) return;
  getCategoryAthletes(m.categoryId).forEach(a => {
    if (!S.convocati) S.convocati = [];
    let cv = S.convocati.find(c=>c.matchId===matchId && c.athleteId===a.id);
    if (!cv) S.convocati.push({ id: uid(), matchId, athleteId: a.id, status: 'convocato', notes: '' });
    else cv.status = 'convocato';
  });
  const allCvs = (S.convocati||[]).filter(cv=>cv.matchId===matchId);
  saveState(); sbSync('convocati', allCvs);
  viewBuilders['convocati'](document.getElementById('view-convocati'));
  toast('Tutti gli atleti convocati', 'success');
}

function resetConvocati(matchId) {
  if (!confirm('Azzerare tutti i convocati?')) return;
  S.convocati = (S.convocati||[]).filter(c=>c.matchId!==matchId);
  saveState(); sbSyncDeleteWhere('convocati','match_id',matchId);
  viewBuilders['convocati'](document.getElementById('view-convocati'));
  toast('Convocati azzerati');
}

  // Aggiorna il selettore admin-overview (nuovo)
  const adminSel = document.getElementById('admin-season-select');
  if (adminSel && S.seasons) {
    adminSel.innerHTML = S.seasons.slice().sort((a,b)=>b.startYear-a.startYear).map(s =>
      `<option value="${s.id}" ${s.id === S.activeSeason ? 'selected' : ''}>${esc(s.name)}${s.active ? ' ★' : ''}</option>`
    ).join('');
  }
  // Mantieni compatibilità con altri selettori stagione
  const sel = document.getElementById('season-select');
  if (sel && S.seasons) {
    sel.innerHTML = S.seasons.slice().sort((a,b)=>b.startYear-a.startYear).map(s =>
      `<option value="${s.id}" ${s.id === S.activeSeason ? 'selected' : ''}>${esc(s.name)}${s.active ? ' ★' : ''}</option>`
    ).join('');
  }
}

// Get athletes in a category for a given season
function getCategoryAthletesForSeason(catId, seasonId, teamId) {
  if (!seasonId) return getCategoryAthletes(catId, teamId);

  // Cerca iscrizioni stagionali per questa categoria + stagione
  let enrollments = (S.athleteSeasons||[]).filter(as => as.categoryId===catId && as.seasonId===seasonId);
  if (teamId) enrollments = enrollments.filter(as => (as.teamId||'') === teamId);

  // Se esistono iscrizioni stagionali → usa SOLO quelle (nessun fallback)
  if (enrollments.length > 0) {
    const enrolledIds = enrollments.map(as => as.athleteId);
    let athletes = S.athletes.filter(a => enrolledIds.includes(a.id));
    if (teamId) athletes = athletes.filter(a => (a.teamId||'') === teamId);
    return athletes.map(a => {
      const as = enrollments.find(x => x.athleteId===a.id);
      return { ...a, role: as?.role||a.role, number: as?.shirtNumber||a.number,
               teamId: as?.teamId||a.teamId, _asId: as?.id };
    });
  }

  // Nessuna iscrizione stagionale: controlla se la stagione selezionata è quella attiva
  // o l'unica disponibile — in quel caso usa fallback con atleti diretti
  const activeSeasId = getActiveSeason()?.id;
  const hasAnySeason = (S.athleteSeasons||[]).some(as => as.categoryId===catId);

  if (!hasAnySeason || seasonId === activeSeasId) {
    // Nessun dato stagionale ancora: fallback agli atleti diretti
    return getCategoryAthletes(catId, teamId);
  }

  // La stagione ha athlete_seasons in altre categorie ma non questa → 0 atleti
  // (oppure stagione futura senza iscrizioni)
  return [];
}

// Get sessions for a category in a given season
function getCategorySessionsForSeason(catId, seasonId) {
  if (!seasonId) return getCategorySessions(catId);
  const season = S.seasons.find(s => s.id === seasonId);
  if (!season) return getCategorySessions(catId);
  const { start: startDate, end: endDate } = getSeasonDates(season);
  return getCategorySessions(catId).filter(s => s.date >= startDate && s.date <= endDate);
}

// Get matches for category in season
function getCategoryMatchesForSeason(catId, seasonId) {
  if (!seasonId) return getCategoryMatches(catId);
  const season = S.seasons.find(s => s.id === seasonId);
  if (!season) return getCategoryMatches(catId);
  const { start: startDate, end: endDate } = getSeasonDates(season);
  return getCategoryMatches(catId).filter(m => m.date >= startDate && m.date <= endDate);
}

// Get stats for a category in a given season
function getCategoryStatsForSeason(catId, seasonId, teamId) {
  const athletes = getCategoryAthletesForSeason(catId, seasonId, teamId);
  const sessions  = getCategorySessionsForSeason(catId, seasonId); // sessions are CATEGORY-level
  const athIds    = athletes.map(a=>a.id);
  // Filter attendances: sessions in this category/season AND athletes in this team (if filtered)
  const allAtts = S.attendances.filter(a =>
    sessions.some(s => s.id === a.sessionId) &&
    (teamId ? athIds.includes(a.athleteId) : true)
  );
  const present = allAtts.filter(a => a.status === 'P').length;
  // Total slots = athletes × sessions (same sessions for all teams in category)
  const total = athletes.length * sessions.length;
  const byType = {};
  getActivityTypes().forEach(([k]) => { byType[k] = sessions.filter(s => s.type === k).length; });
  return { athletes: athletes.length, sessions: sessions.length,
    presenceRate: total > 0 ? pct(present, total) : 0, byType, present, total };
}

function addNewSeason() {
  const start = parseInt(document.getElementById('new-season-start').value);
  const end   = parseInt(document.getElementById('new-season-end').value);
  if (!start || !end || end <= start) { toast('Anno inizio e fine non validi','error'); return; }
  const name = `${start}/${end}`;
  if ((S.seasons||[]).some(s => s.name === name)) { toast('Stagione già esistente','error'); return; }
  if (!S.seasons) S.seasons = [];
  const newS = { id: uid(), name, startYear: start, endYear: end, active: false };
  S.seasons.push(newS);
  saveState(); sbSync('seasons', newS); rebuildSeasonSelector();
  const elSeas = document.getElementById('seasons-list-area');
  if (elSeas) elSeas.innerHTML = buildSeasonsListHtml(S.seasons.slice().reverse());
  else buildAdminConfigTab('seasons');
  const ns = document.getElementById('new-season-start');
  const ne = document.getElementById('new-season-end');
  if (ns) ns.value = '';
  if (ne) ne.value = '';
  toast('Stagione ' + name + ' aggiunta', 'success');
}

function setSeasonActive(id) {
  S.seasons.forEach(s => s.active = s.id === id);
  // Propaga a tutti i filtri UI (dashboard, sessioni, partite, configurazione)
  setActiveSeason(id);
  // Salva ogni stagione nel DB (il flag active cambia su tutte)
  S.seasons.forEach(s => sbSync('seasons', s));
  buildAdminConfigTab('seasons');
  toast('Stagione attiva aggiornata ✅','success');
}

function deleteSeason(id) {
  if (!confirm('Eliminare questa stagione?')) return;
  S.seasons = S.seasons.filter(s => s.id !== id);
  saveState(); sbSync('seasons', id, true); rebuildSeasonSelector();
  const el = document.getElementById('seasons-list-area');
  if (el) el.innerHTML = buildSeasonsListHtml(S.seasons.slice().reverse());
  else buildAdminConfigTab('seasons');
  toast('Stagione eliminata');
}

/** Costruisce le <option> categoria filtrate per società+stagione */
function buildAsCatOpts(socId, seasId) {
  const isAdmin = currentUser?.role === 'admin';
  // Categorie accessibili in base a UCS
  const accessibleCatIds = isAdmin
    ? S.categories.map(c=>c.id)
    : [...new Set((S.userCategorySeasons||[])
        .filter(u => u.userId===currentUser.id && (!seasId || u.seasonId===seasId))
        .map(u=>u.categoryId))];
  // Filtra per società se specificata
  let cats = S.categories.filter(c => accessibleCatIds.includes(c.id));
  if (socId) cats = cats.filter(c => c.societyId === socId);
  return cats.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
}

function onAsSocChange(athleteId) {
  const socId  = document.getElementById('as-soc')?.value || '';
  const seasId = document.getElementById('as-season')?.value || '';
  const catSel = document.getElementById('as-cat');
  if (catSel) {
    catSel.innerHTML = '<option value="">— seleziona —</option>' + buildAsCatOpts(socId, seasId);
  }
  const teamSel = document.getElementById('as-team');
  if (teamSel) teamSel.innerHTML = '<option value="">— nessuna squadra —</option>';
}

function onAsSeasonChange(athleteId) {
  onAsSocChange(athleteId); // stessa logica
}

function onAsCatChange(athleteId) {
  const catId   = document.getElementById('as-cat')?.value || '';
  const teamSel = document.getElementById('as-team');
  if (!teamSel) return;
  const isAdmin = currentUser?.role === 'admin';
  // Squadre: admin vede tutte quelle della categoria; altri solo quelle dove hanno UCS
  let teams = getCategoryTeams(catId);
  if (!isAdmin && teams.length) {
    const ucsTeamIds = new Set(
      (S.userCategorySeasons||[])
        .filter(u => u.userId===currentUser.id && u.categoryId===catId)
        .map(u => u.teamId).filter(Boolean)
    );
    // Se admin ha UCS senza teamId specifico → mostra tutte le squadre della categoria
    if (ucsTeamIds.size > 0) {
      teams = teams.filter(t => ucsTeamIds.has(t.id));
    }
  }
  teamSel.innerHTML = '<option value="">— nessuna squadra —</option>'
    + teams.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('');
}

/** Elimina una singola riga athlete_seasons */
function deleteAthleteSeasonEntry(asId, athleteId) {
  if (!confirm('Rimuovere questa iscrizione stagionale?')) return;
  const entry = (S.athleteSeasons||[]).find(x=>x.id===asId);
  if (!entry) { toast('Iscrizione non trovata','error'); return; }
  S.athleteSeasons = S.athleteSeasons.filter(x=>x.id!==asId);
  sbSync('athlete_seasons', asId, true);
  saveState();
  toast('Iscrizione rimossa ✅','success');
  renderAthleteSeasonModal(athleteId);
}


function saveAthleteSeasonEnroll(athleteId) {
  const seasonId   = document.getElementById('as-season')?.value;
  const categoryId = document.getElementById('as-cat')?.value;
  const teamId     = document.getElementById('as-team')?.value || null;
  const num        = parseInt(document.getElementById('as-num')?.value)||null;
  const role       = document.getElementById('as-role')?.value.trim() || '';

  if (!seasonId) { toast('Seleziona una stagione','error'); return; }
  if (!categoryId) { toast('Seleziona una categoria','error'); return; }

  if (!S.athleteSeasons) S.athleteSeasons = [];

  // Controlla duplicato (stesso atleta + stagione + categoria)
  const dup = S.athleteSeasons.find(as =>
    as.athleteId===athleteId && as.seasonId===seasonId && as.categoryId===categoryId
  );
  if (dup) {
    // Aggiorna l'esistente
    Object.assign(dup, { teamId: teamId||dup.teamId, role: role||dup.role, shirtNumber: num||dup.shirtNumber });
    sbSync('athlete_seasons', dup);
    saveState();
    toast('Iscrizione aggiornata ✅','success');
    renderAthleteSeasonModal(athleteId);
    return;
  }

  const entry = {
    id: uid(), athleteId, seasonId, categoryId,
    teamId: teamId || null,
    shirtNumber: num,
    role,
    joinDate: new Date().toISOString().slice(0,10),
    notes: ''
  };
  S.athleteSeasons.push(entry);
  sbSync('athlete_seasons', entry);
  saveState();
  toast('Iscrizione aggiunta ✅','success');
  renderAthleteSeasonModal(athleteId);
}

async function saveNewPassword() {
  const cur  = document.getElementById('pw-current').value;
  const nw   = document.getElementById('pw-new').value;
  const conf = document.getElementById('pw-confirm').value;

  if (!cur || !nw || !conf) { toast('Compila tutti i campi','error'); return; }

  // Verifica password attuale (locale)
  const u = S.users.find(x => x.id === currentUser.id);
  if (u && u.password && u.password !== cur) {
    toast('❌ Password attuale non corretta','error'); return;
  }

  // Valida nuova password
  const pwErr = pwErrorMsg(nw);
  if (pwErr) { toast(pwErr,'error'); return; }
  if (nw !== conf) { toast('❌ Le password non coincidono','error'); return; }
  if (nw === cur)  { toast('La nuova password deve essere diversa da quella attuale','error'); return; }

  const btn = document.querySelector('.modal .btn-accent');
  if (btn) { btn.disabled = true; btn.textContent = 'Aggiornamento...'; }

  try {
    if (DB_MODE === 'supabase') {
      // Verifica anche in Supabase Auth re-autenticando
      const email = currentUser.email || (currentUser.username + '@sporttrackpro.it');
      const { error: reAuthErr } = await sb.auth.signInWithPassword({ email, password: cur });
      if (reAuthErr) {
        toast('❌ Password attuale non corretta su Supabase Auth','error');
        return;
      }
      await DB.changePassword(nw);
    }
    // Aggiorna stato locale
    if (u) { u.password = nw; currentUser.password = nw; }
    saveState();
    closeModal();
    toast('✅ Password aggiornata con successo','success');
  } catch(e) {
    toast('❌ Errore aggiornamento: ' + (e.message || e),'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔐 Aggiorna Password'; }
  }
}

// Alias per compatibilità
function exportMatchImage(matchId) { exportConvocatiImage(matchId); }

function exportConvocatiImage(matchId) {
  const m = S.matches.find(x=>x.id===matchId);
  if (!m) return;

  const cat      = S.categories.find(c=>c.id===m.categoryId);
  const cvMap    = {};
  (S.convocati||[]).filter(c=>c.matchId===matchId).forEach(c => cvMap[c.athleteId] = c);

  const convocati = getCategoryAthletes(m.categoryId)
    .filter(a => cvMap[a.id]?.status === 'convocato')
    .sort((a,b) => (a.number||99)-(b.number||99));
  const riserve = getCategoryAthletes(m.categoryId)
    .filter(a => cvMap[a.id]?.status === 'riserva')
    .sort((a,b) => (a.number||99)-(b.number||99));

  // Build HTML for the image using a hidden div + html2canvas approach
  // Since we can't load external libs, we'll use Canvas API directly
  const bg = m.bgColor || '#1A3A5C';

  // Calculate canvas height dynamically
  const athPerRow = 3;
  const athRowH   = 56;
  const athRows   = Math.ceil(convocati.length / athPerRow);
  const riserveRows = Math.ceil(riserve.length / athPerRow);
  const headerH   = 188;
  const sectionH  = 40;
  const footerH   = 50;
  const padding   = 24;
  const canvasW   = 800;
  let   canvasH   = headerH + sectionH + athRows * athRowH + padding;
  if (riserve.length > 0) canvasH += sectionH + riserveRows * athRowH + padding;
  canvasH += footerH + padding;

  const canvas = document.createElement('canvas');
  canvas.width  = canvasW;
  canvas.height = Math.max(canvasH, 400);
  const ctx = canvas.getContext('2d');

  // ── Background gradient ───────────────────────────────────
  const grad = ctx.createLinearGradient(0, 0, canvasW, canvasH);
  grad.addColorStop(0, bg);
  grad.addColorStop(1, darkenColor(bg, 0.4));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvasW, canvasH);

  // ── Subtle pattern overlay ────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x=0; x<canvasW; x+=40) {
    for (let y=0; y<canvasH; y+=40) {
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ── Header area ───────────────────────────────────────────
  const p = padding;

  // ── HEADER: SOCIETÀ (large) vs AVVERSARIO (smaller) ────────

  // Resolve society
  const socObj = S.societies.find(s => s.id === cat?.societyId);
  const socName = socObj?.name || cat?.name || '';
  const oppName = m.opponent || '';

  // Measure available width
  const availW = canvasW - p * 2;

  // ── RIGA PRINCIPALE: Società vs Avversario ───────────────
  // We place everything on ONE line, sizing dynamically:
  // Society name: large bold
  // " vs ": medium, muted
  // Opponent: medium

  // Start with big font for society, shrink until it fits ~55% of width
  let socFont = 42;
  ctx.font = `bold ${socFont}px Arial, sans-serif`;
  const maxSocW = availW * 0.54;
  let socFit = socName;
  while (ctx.measureText(socFit).width > maxSocW && socFit.length > 3) {
    socFit = socFit.slice(0, -1);
  }
  if (socFit !== socName) socFit += '…';

  // Draw society name
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${socFont}px Arial, sans-serif`;
  const socW = ctx.measureText(socFit).width;
  ctx.fillText(socFit, p, p + 64);

  // Draw " vs " separator
  ctx.font = 'bold 18px Arial, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  const vsStr = '  vs  ';
  const vsW = ctx.measureText(vsStr).width;
  ctx.fillText(vsStr, p + socW, p + 56);

  // Draw opponent — fit remaining space
  const oppX   = p + socW + vsW;
  const oppMaxW = canvasW - p - oppX;
  ctx.font = 'bold 26px Arial, sans-serif';
  let oppFit = oppName;
  while (ctx.measureText(oppFit).width > oppMaxW && oppFit.length > 3) {
    oppFit = oppFit.slice(0, -1);
  }
  if (oppFit !== oppName) oppFit += '…';
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  ctx.fillText(oppFit, oppX, p + 58);

  // Match info line
  ctx.fillStyle = 'rgba(255,255,255,0.68)';
  ctx.font = '14px Arial, sans-serif';
  const infoLine = [
    '📅 ' + fmtDate(m.date),
    m.time ? '🕐 ' + m.time : '',
    HOMEAWAY_LABELS[m.homeAway] || '',
  ].filter(Boolean).join('   ·   ');
  ctx.fillText(infoLine, p, p + 90);

  // Ritrovo info
  if (m.meetTime || m.meetPlace) {
    ctx.fillStyle = 'rgba(255,255,255,0.58)';
    ctx.font = '13px Arial, sans-serif';
    const rLine = [
      m.meetTime ? '🤝 ' + m.meetTime : '',
      m.meetPlace ? '📍 ' + m.meetPlace : ''
    ].filter(Boolean).join('   ·   ');
    ctx.fillText(rLine, p, p + 110);
  }

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(p, p + 126);
  ctx.lineTo(canvasW - p, p + 126);
  ctx.stroke();

  // Count badges
  const badgeData = [
    { label: 'Convocati', value: convocati.length, color: 'rgba(5,150,105,0.8)' },
    { label: 'Riserve',   value: riserve.length,   color: 'rgba(217,119,6,0.8)' },
  ];
  let bx = p;
  badgeData.forEach(b => {
    ctx.fillStyle = b.color;
    roundRect(ctx, bx, p+136, 110, 32, 8, true, false);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(b.value + ' ' + b.label, bx+55, p+157);
    ctx.textAlign = 'left';
    bx += 122;
  });

  // ── Convocati section ─────────────────────────────────────
  let y = headerH + p;
  drawSectionHeader(ctx, p, y, canvasW - p*2, '✅  CONVOCATI', '#22c55e');
  y += sectionH;

  convocati.forEach((ath, i) => {
    const col = i % athPerRow;
    const row = Math.floor(i / athPerRow);
    const ax  = p + col * ((canvasW - p*2) / athPerRow);
    const ay  = y + row * athRowH;
    drawAthleteCard(ctx, ax, ay, (canvasW - p*2) / athPerRow - 8, athRowH - 8, ath, cvMap[ath.id], 'convocato');
  });
  y += athRows * athRowH + padding;

  // ── Riserve section ───────────────────────────────────────
  if (riserve.length > 0) {
    drawSectionHeader(ctx, p, y, canvasW - p*2, '🔄  RISERVE', '#f59e0b');
    y += sectionH;
    riserve.forEach((ath, i) => {
      const col = i % athPerRow;
      const row = Math.floor(i / athPerRow);
      const ax  = p + col * ((canvasW - p*2) / athPerRow);
      const ay  = y + row * athRowH;
      drawAthleteCard(ctx, ax, ay, (canvasW - p*2) / athPerRow - 8, athRowH - 8, ath, cvMap[ath.id], 'riserva');
    });
    y += riserveRows * athRowH + padding;
  }

  // ── Footer ────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.moveTo(p, canvasH - footerH - 10);
  ctx.lineTo(canvasW - p, canvasH - footerH - 10);
  ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('SportTrack Pro · ' + new Date().toLocaleDateString('it-IT'), canvasW/2, canvasH - footerH + 20);
  ctx.textAlign = 'left';

  // ── Download ──────────────────────────────────────────────
  const link = document.createElement('a');
  link.download = 'Convocati_vs_' + m.opponent.replace(/[^a-zA-Z0-9]/g,'_') + '_' + m.date + '.png';
  link.href = canvas.toDataURL('image/png', 0.95);
  link.click();
  toast('Immagine esportata ✅','success');
}

// Canvas helpers
function darkenColor(hex, amount) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, (num>>16) - Math.round(255*amount));
  const g = Math.max(0, ((num>>8)&0xFF) - Math.round(255*amount));
  const b = Math.max(0, (num&0xFF) - Math.round(255*amount));
  return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function drawSectionHeader(ctx, x, y, w, label, color) {
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(ctx, x, y, w, 32, 6, true, false);
  // Left accent bar
  ctx.fillStyle = color;
  roundRect(ctx, x, y, 4, 32, 2, true, false);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 15px Arial';
  ctx.fillText(label, x+14, y+21);
}

function drawAthleteCard(ctx, x, y, w, h, ath, cv, status) {
  // Card background
  const cardBg = status === 'convocato' ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.07)';
  ctx.fillStyle = cardBg;
  roundRect(ctx, x, y, w, h, 6, true, false);

  // Number circle
  const numColor = status === 'convocato' ? '#22c55e' : '#f59e0b';
  ctx.fillStyle = numColor;
  ctx.beginPath();
  ctx.arc(x+20, y+h/2, 14, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(ath.number||'?', x+20, y+h/2+4);
  ctx.textAlign = 'left';

  // Name
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 14px Arial';
  const fullName = ath.lastName + ' ' + ath.firstName;
  ctx.fillText(fullName.length > 20 ? fullName.slice(0,19)+'…' : fullName, x+40, y+h/2-3);

  // Nickname + role
  const sub = [ath.nickname ? '"'+ath.nickname+'"' : '', ath.role||''].filter(Boolean).join(' · ');
  if (sub) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '11px Arial';
    ctx.fillText(sub.length > 25 ? sub.slice(0,24)+'…' : sub, x+40, y+h/2+14);
  }

  // Note from cv
  if (cv?.notes) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = 'italic 10px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(cv.notes.slice(0,18), x+w-6, y+h/2+14);
    ctx.textAlign = 'left';
  }
}
