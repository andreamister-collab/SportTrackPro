<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SportTrack Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <h1 class="logo">SPORTTRACK</h1>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn-primary" id="btn-login">ACCEDI</button>
        </div>
    </div>

    <div id="app" style="display:none;">
        <header>
            <div class="brand">SPORTTRACK <span id="season-label"></span></div>
            <nav id="main-nav"></nav>
        </header>
        <main id="content-area"></main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
