<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sport Manager</title>
<style>
:root{
  --accent:#0d6efd;--accent-l:#cfe2ff;--gold:#ffc107;--green:#198754;--red:#dc3545;--purple:#6f42c1;--teal:#20c997;
  --white:#fff;--mist:#f8f9fa;--mist-2:#e9ecef;--mist-3:#dee2e6;--ink-3:#6c757d;
  --radius-lg:12px;--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow:0 4px 12px rgba(0,0,0,.1);
  --font-head:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}
body{margin:0;font-family:var(--font-head);background:var(--mist);color:#212529}
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--white); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--mist-2); box-shadow: var(--shadow-sm); position: relative; overflow: hidden; transition: box-shadow.2s, transform.2s; }
.stat-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.stat-card.label { font-size:.78rem; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing:.05em; margin-bottom: 8px; }
.stat-card.value { font-size: 2rem; font-weight: 800; font-family: var(--font-head); line-height: 1; margin-bottom: 4px; }
.stat-card.sub { font-size:.78rem; color: var(--ink-3); }
.stat-card.accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
.stat-card.blue.accent-bar { background: var(--accent); }
.stat-card.blue.value { color: var(--accent); }
.stat-card.gold.accent-bar { background: var(--gold); }
.stat-card.gold.value { color: var(--gold); }
.stat-card.green.accent-bar { background: var(--green); }
.stat-card.green.value { color: var(--green); }
.stat-card.red.accent-bar { background: var(--red); }
.stat-card.red.value { color: var(--red); }
.stat-card.purple.accent-bar { background: var(--purple); }
.stat-card.purple.value { color: var(--purple); }
.stat-card.teal.accent-bar { background: var(--teal); }
.stat-card.teal.value { color: var(--teal); }
.page-header{padding:20px;background:var(--white);border-bottom:1px solid var(--mist-2);margin-bottom:20px}
.header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--mist-3);background:var(--white);cursor:pointer;font-weight:600}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-ghost{background:transparent}
.btn-lg{padding:10px 20px;font-size:1rem}
.season-badge{background:var(--accent-l);color:var(--accent);padding:4px 10px;border-radius:99px;font-size:.8rem;font-weight:700}
</style>
</head>
<body>

<nav id="bottom-nav">
  <button class="bn-item" id="bn-home" onclick="bottomNavGo('home')"><span class="bn-icon">🏠</span><span class="bn-label">Home</span></button>
  <button class="bn-item" id="bn-athletes" onclick="bottomNavGo('athletes')"><span class="bn-icon">👥</span><span class="bn-label">Atleti</span></button>
  <button class="bn-item" id="bn-sessions" onclick="bottomNavGo('sessions')"><span class="bn-icon">📅</span><span class="bn-label">Sessioni</span></button>
  <button class="bn-item" id="bn-matches" onclick="bottomNavGo('matches')"><span class="bn-icon">⚽</span><span class="bn-label">Partite</span></button>
  <button class="bn-item" id="bn-menu" onclick="toggleMobileMenu()"><span class="bn-icon">☰</span><span class="bn-label">Menu</span></button>
</nav>

<div id="main-content">
  <div id="top-bar">
    <span class="topbar-title" id="topbar-title">Dashboard</span>
    <span class="topbar-breadcrumb" id="topbar-bc"></span>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>
  <div id="content-area">

    <!-- Admin Overview -->
    <div class="view" id="view-admin-overview"><!-- dynamic --></div>
    <!-- Admin Config -->
    <div class="view" id="view-admin-config"><!-- dynamic --></div>
    <!-- Admin Reports -->
    <div class="view" id="view-admin-reports"><!-- dynamic --></div>
    <!-- Category Home -->
    <div class="view" id="view-category-home"><!-- dynamic --></div>
    <!-- Athlete Roster -->
    <div class="view" id="view-athletes"><!-- dynamic --></div>
    <!-- Session Entry -->
    <div class="view" id="view-session-entry"><!-- dynamic --></div>
    <!-- Sessions List -->
    <div class="view" id="view-sessions"><!-- dynamic --></div>
    <!-- Category Dashboard -->
    <div class="view" id="view-cat-dashboard"><!-- dynamic --></div>
    <!-- Athlete Profile -->
    <div class="view" id="view-athlete-profile"><!-- dynamic --></div>
    <!-- Admin: società dashboard -->
    <div class="view" id="view-admin-society"><!-- dynamic --></div>
    <!-- Partite & Convocati -->
    <div class="view" id="view-matches"><!-- dynamic --></div>
    <div class="view" id="view-match-detail"><!-- dynamic --></div>

  </div>
</div>

<script>
/* Dati di esempio (nel tuo progetto sono popolati altrove) */
const S = {
  athletes:[{id:'a1',categoryId:'cat1',teamId:'t2'},{id:'a2',categoryId:'cat1',teamId:'t2'}],
  categories:[{id:'cat1',name:'Under 14',teamId:'t2',teamIds:['t2'],societyId:'soc1',sportId:'s1'}],
  societies:[{id:'soc1',name:'ASD Olimpia',sportId:'s1',city:'Milano',email:'info@olimpia.it'}],
  sessions:[{id:'s1',categoryId:'cat1',date:'2025-10-01',type:'training'}],
  attendances:[{sessionId:'s1',athleteId:'a1',status:'P'},{sessionId:'s1',athleteId:'a2',status:'A'}],
  users:[{id:'u1',name:'Admin',role:'admin'},{id:'u2',name:'Mario',role:'coach'}],
  seasons:[{id:'seas1',name:'2025/26',start:'2025-07-01',end:'2026-06-30',active:true}],
  sports:[{id:'s1',name:'Calcio',icon:'⚽'}],
  teamCategorySeasons:[]
};
const currentUser = {name:'Admin'};
const activeSeas = S.seasons.find(s=>s.active);

function esc(s){return (s||'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function pct(a,b){return b?Math.round((a/b)*100):0}
function getCategorySessions(catId){return S.sessions.filter(s=>s.categoryId===catId)}
function getCategoryAthletesForSeason(catId, seasonId, teamId){
  return S.athletes.filter(a=>a.categoryId===catId && (teamId? a.teamId===teamId:true));
}
function getCategorySessionsForSeason(catId, seasonId){
  if(!seasonId) return getCategorySessions(catId);
  const season=S.seasons.find(s=>s.id===seasonId);
  if(!season) return getCategorySessions(catId);
  const start=season.start,end=season.end;
  return getCategorySessions(catId).filter(s=>s.date>=start && s.date<=end);
}
function getCategoryStatsForSeason(catId, seasonId, teamId){
  const athletes = getCategoryAthletesForSeason(catId, seasonId, teamId);
  const sessions = getCategorySessionsForSeason(catId, seasonId);
  const allAtts = S.attendances.filter(a => sessions.some(s => s.id === a.sessionId) && (teamId? athletes.some(ta=>ta.id===a.athleteId) : true));
  const present = allAtts.filter(a => a.status === 'P').length;
  const total = athletes.length * sessions.length;
  const byType = {};
  getActivityTypes().forEach(([k]) => { byType[k] = sessions.filter(s => s.type === k).length; });
  return { athletes: athletes.length, sessions: sessions.length, presenceRate: total > 0? pct(present, total) : 0, byType, present, total };
}
function getActivityTypes(){ return [['training','Allenamento','green'],['match','Partita','red']]; }

/* ── [1] ADMIN OVERVIEW ──────────────────────────────────────── */
viewBuilders['admin-overview'] = (el) => {
  if (!['admin','responsabile'].includes(currentUser.role)) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🔒</div><h3>Accesso riservato</h3><p>Questa vista è riservata agli amministratori.</p></div>';
    return;
  }

  // ← CALCOLI AGGIUNTI QUI (non toccano il layout)
  const totalAthletes = S.athletes.length || 0;
  const totalCategories = S.categories.length || 0;
  const totalSocieties = S.societies.length || 0;
  const totalSessions = S.sessions.length || 0;
  const presentAtts = S.attendances.filter(a=>a.status==='P').length || 0;
  const totalAtts = S.attendances.length || 0;
  const globalPct = totalAtts? Math.round((presentAtts/totalAtts)*100) : 0;

  el.innerHTML = `
    <div class="page-header">
      <div class="header-row">
        <div>
          <h2>Benvenuto, ${esc(currentUser.name)} 👋</h2>
          <p>Panoramica globale · <span class="season-badge">${activeSeas? '⚽ Stagione: ' + esc(activeSeas.name) : 'Tutte le stagioni'}</span> · ${new Date().toLocaleDateString('it-IT',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
        </div>
        <button class="btn btn-accent btn-lg" onclick="showAdminConfig('category')">+ Nuova Categoria</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card blue"><div class="accent-bar"></div><div class="label">Atleti Totali</div><div class="value">${totalAthletes}</div><div class="sub">in ${totalCategories} categorie</div></div>
      <div class="stat-card green"><div class="accent-bar"></div><div class="label">Sessioni Registrate</div><div class="value">${totalSessions}</div><div class="sub">tutte le categorie</div></div>
      <div class="stat-card gold"><div class="accent-bar"></div><div class="label">% Presenze Global</div><div class="value">${globalPct}%</div><div class="sub">${presentAtts}/${totalAtts} totali</div></div>
      <div class="stat-card teal"><div class="accent-bar"></div><div class="label">Società</div><div class="value">${totalSocieties}</div><div class="sub">${S.sports.length} sport</div></div>
      <div class="stat-card purple"><div class="accent-bar"></div><div class="label">Categorie</div><div class="value">${totalCategories}</div><div class="sub">attive</div></div>
      <div class="stat-card blue"><div class="accent-bar"></div><div class="label">Staff Totale</div><div class="value">${S.users.filter(u=>u.role!=='admin').length}</div><div class="sub">utenti registrati</div></div>
    </div>
  `;
};

/* ── [7] CATEGORY DASHBOARD ──────────────────────────────────── */
viewBuilders['cat-dashboard'] = (el) => {
  if (!selectedCategoryId) { el.innerHTML = '<div class="empty-state"><p>Seleziona una categoria</p></div>'; return; }
  if (!canAccessCategory(selectedCategoryId)) { el.innerHTML = '<div class="empty-state"><div class="icon">🔒</div><h3>Accesso non consentito</h3><p>Non hai i permessi per visualizzare questa categoria.</p></div>'; return; }
  buildCategoryDashboardView(el, selectedCategoryId);
};

function buildCategoryDashboardView(el, catId) {
  const cat = S.categories.find(c=>c.id===catId);
  if (!cat) { el.innerHTML = '<div class="empty-state"><p>Categoria non trovata</p></div>'; return; }

  const allSeasons = (S.seasons||[]);
  const activeSeas = getActiveSeason();
  if (S.activeSeason && window._dashSeas!== S.activeSeason) window._dashSeas = S.activeSeason;
  const filterSeasId= window._dashSeas || activeSeas?.id;
  const filterTeamId= window._dashTeam || '';
  const filterSeas = allSeasons.find(s=>s.id===filterSeasId) || activeSeas;
  const catTeams = S.teams.filter(t=>cat.teamIds?.includes(t.id));
  const athletes = getCategoryAthletesForSeason(catId, filterSeasId, filterTeamId);
  const sessions = getCategorySessionsForSeason(catId, filterSeasId);
  const filterTeam = filterTeamId? S.teams.find(t=>t.id===filterTeamId) : null;
  const seasBadge = filterSeas? `(${esc(filterSeas.name)})` : '';
  const multiTeam = (cat.teamIds?.length||1) > 1;

  const actData = getActivityTypes().map(([key,label,color])=>{
    const sess = sessions.filter(s=>s.type===key);
    const pres = S.attendances.filter(a=>sess.some(s=>s.id===a.sessionId) && a.status==='P').length;
    const tot = athletes.length * sess.length;
    return {act:{key,label,color}, sessions:sess.length, presRate: tot?pct(pres,tot):0};
  });

  // ← CALCOLO AGGIUNTO QUI (non tocca il layout)
  const st = getCategoryStatsForSeason(catId, filterSeasId, filterTeamId);

  el.innerHTML = `
    <div class="page-header">
      <div class="header-row">
        <div>
          <h2>📊 ${filterTeam? esc(filterTeam.name) : esc(cat.name)} ${seasBadge}</h2>
          <p>${filterTeam? `<span class="badge badge-gray" style="font-size:.78rem">🏷️ ${esc(cat.name)}</span> › <b>${esc(filterTeam.name)}</b>` : (multiTeam? `🏷️ ${esc(cat.name)} — tutte le squadre` : `🏷️ ${esc(cat.name)}`)} · ${athletes.length} atleti · ${sessions.length} sessioni</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="showView('sessions')">Sessioni</button>
          <button class="btn btn-accent" onclick="openNewSessionModal()">+ Sessione</button>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card blue"><div class="accent-bar"></div><div class="label">Atleti</div><div class="value">${athletes.length || 0}</div></div>
      <div class="stat-card green"><div class="accent-bar"></div><div class="label">Sessioni</div><div class="value">${sessions.length || 0}</div></div>
      <div class="stat-card gold"><div class="accent-bar"></div><div class="label">% Presenze</div><div class="value">${st.presenceRate || 0}%</div></div>
      ${actData.map(d=>`<div class="stat-card ${d.act.color}"><div class="accent-bar"></div><div class="label">${d.act.label}</div><div class="value">${d.presRate || 0}%</div><div class="sub">${d.sessions} sessioni</div></div>`).join('')}
    </div>
  `;
}

/* Stub per il resto dell'app */
function showAdminConfig(tab){ showView('admin-config'); }
function showView(v){ document.querySelectorAll('.view').forEach(el=>el.style.display='none'); const target=document.getElementById('view-'+v); if(target) target.style.display='block'; }
function openNewSessionModal(){ alert('Apri modal sessione'); }
function bottomNavGo(){}
function toggleMobileMenu(){}
function canAccessCategory(){ return true; }
function getActiveSeason(){ return S.seasons.find(s=>s.active); }
function saveState(){}
function toast(){}

/* Avvio demo */
renderAdminOverview(document.getElementById('view-admin-overview'));
function renderAdminOverview(el){ viewBuilders['admin-overview'](el); }
</script>
</body>
</html>
