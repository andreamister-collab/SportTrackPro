<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportTrack Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════════════════
   RESET & VARIABILI
═══════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F1F5F9;
  --card:#FFFFFF;
  --border:#E2E8F0;
  --text:#0F172A;
  --muted:#64748B;
  --accent:#2563EB;
  --accent-l:#EFF6FF;
  --accent-d:#1D4ED8;
  --green:#10B981;--green-l:#ECFDF5;
  --gold:#F59E0B;--gold-l:#FFFBEB;
  --red:#EF4444;--red-l:#FEF2F2;
  --teal:#0891B2;--teal-l:#ECFEFF;
  --purple:#7C3AED;--purple-l:#F5F3FF;
  --sidebar:#0F172A;
  --sidebar-hover:#1E293B;
  --radius:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
#app{display:flex;min-height:100vh}
#app.auth-mode{display:block}

/* SIDEBAR */
#sidebar{
  width:240px;flex-shrink:0;background:var(--sidebar);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;height:100vh;
  overflow-y:auto;z-index:100;
  transition:transform .25s ease;
}
#sidebar.hidden{display:none}
.sb-logo{
  padding:20px 16px 16px;
  font-size:18px;font-weight:800;color:#F1F5F9;
  border-bottom:1px solid #1E293B;
  display:flex;align-items:center;gap:10px;
}
.sb-logo em{color:var(--accent);font-style:normal}
.sb-logo .logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:var(--accent);display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;
}
.sb-section{
  padding:16px 16px 6px;
  font-size:10px;font-weight:700;color:#475569;
  text-transform:uppercase;letter-spacing:.08em;
}
.sb-btn{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:10px 16px;
  background:none;border:none;color:#94A3B8;
  font-size:14px;text-align:left;cursor:pointer;
  border-radius:0;transition:all .15s;
}
.sb-btn:hover{background:var(--sidebar-hover);color:#F1F5F9}
.sb-btn.active{background:var(--accent);color:#fff;font-weight:600}
.sb-btn .sb-icon{width:18px;text-align:center;flex-shrink:0}
.sb-footer{
  margin-top:auto;padding:12px 16px;
  border-top:1px solid #1E293B;
}
.sb-user{display:flex;align-items:center;gap:10px}
.sb-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-size:13px;color:#F1F5F9;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:11px;color:#64748B}

/* MAIN */
#main{
  margin-left:240px;flex:1;
  display:flex;flex-direction:column;min-height:100vh;
}
#main.full-width{margin-left:0}

/* TOPBAR */
#topbar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:0 24px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  box-shadow:var(--shadow);
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:16px;font-weight:700}
.topbar-sub{font-size:13px;color:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:10px}

/* STAGIONE PILL */
.season-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--accent-l);border:1.5px solid var(--accent);
  border-radius:8px;padding:5px 10px;
}
.season-pill label{font-size:11px;font-weight:700;color:var(--accent)}
.season-pill select{
  border:none;background:transparent;color:var(--accent);
  font-weight:700;font-size:13px;cursor:pointer;outline:none;
}

/* CONTENT */
#content{padding:24px;flex:1}

/* ═══════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════ */
#auth-screen{
  min-height:100vh;background:var(--sidebar);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.auth-card{
  background:var(--card);border-radius:16px;padding:40px;
  width:100%;max-width:420px;box-shadow:var(--shadow-md);
}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .logo-big{
  width:56px;height:56px;border-radius:14px;
  background:var(--accent);color:#fff;
  font-size:28px;display:flex;align-items:center;
  justify-content:center;margin:0 auto 12px;
}
.auth-logo h1{font-size:24px;font-weight:800}
.auth-logo h1 em{color:var(--accent);font-style:normal}
.auth-logo p{color:var(--muted);font-size:14px;margin-top:4px}
.auth-err{
  background:var(--red-l);border:1px solid var(--red);
  color:var(--red);border-radius:8px;padding:10px 14px;
  font-size:13px;margin-bottom:16px;display:none;
}

/* ═══════════════════════════════════════════════
   FORM ELEMENTS
═══════════════════════════════════════════════ */
.form-field{margin-bottom:14px}
.form-field label{
  display:block;font-size:12px;font-weight:700;
  color:var(--muted);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:6px;
}
.form-field input,
.form-field select,
.form-field textarea{
  width:100%;padding:10px 12px;
  border:1.5px solid var(--border);border-radius:var(--radius);
  font-size:14px;color:var(--text);background:var(--card);
  outline:none;transition:border-color .2s;
  font-family:inherit;
}
.form-field input:focus,
.form-field select:focus,
.form-field textarea:focus{border-color:var(--accent)}
.form-field textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ═══════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════ */
.btn{
  padding:9px 18px;border-radius:var(--radius);border:none;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:all .15s;display:inline-flex;align-items:center;gap:6px;
  text-decoration:none;
}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--accent-d)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover:not(:disabled){opacity:.9}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover:not(:disabled){opacity:.9}
.btn-ghost{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:12px 24px;font-size:15px}
.btn-block{width:100%;justify-content:center}
.btn-icon{padding:8px;width:34px;height:34px;justify-content:center}

/* ═══════════════════════════════════════════════
   CARDS & LAYOUT
═══════════════════════════════════════════════ */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);
}
.card-title{
  font-size:15px;font-weight:700;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.card-title .icon{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.page-header{margin-bottom:20px}
.page-header h2{font-size:22px;font-weight:800}
.page-header p{color:var(--muted);font-size:14px;margin-top:2px}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.kpi{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--kpi-color,var(--accent));
}
.kpi-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.kpi-value{font-size:28px;font-weight:800;color:var(--kpi-color,var(--accent));margin:4px 0}
.kpi-sub{font-size:12px;color:var(--muted)}

/* ═══════════════════════════════════════════════
   TABLE
═══════════════════════════════════════════════ */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:10px 14px;font-size:14px;border-top:1px solid var(--border)}
tr:hover td{background:#F8FAFC}
.fw-700{font-weight:700}
.text-muted{color:var(--muted)}
.text-sm{font-size:13px}
.text-right{text-align:right}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}

/* ═══════════════════════════════════════════════
   BADGES
═══════════════════════════════════════════════ */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:99px;
  font-size:11px;font-weight:700;white-space:nowrap;
}
.badge-blue{background:var(--accent-l);color:var(--accent)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-gold{background:var(--gold-l);color:#92400E}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-purple{background:var(--purple-l);color:var(--purple)}
.badge-teal{background:var(--teal-l);color:var(--teal)}
.badge-gray{background:#F1F5F9;color:var(--muted)}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:1000;
  align-items:center;justify-content:center;padding:20px;
}
#modal-overlay.open{display:flex}
.modal{
  background:var(--card);border-radius:16px;
  width:100%;max-width:560px;max-height:90vh;
  overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal.modal-lg{max-width:800px}
.modal-header{
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--card);z-index:1;
}
.modal-header h3{font-size:18px;font-weight:700}
.modal-body{padding:24px}
.modal-close{
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:20px;padding:4px;
  border-radius:6px;transition:color .15s;
}
.modal-close:hover{color:var(--text)}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
#toast-container{
  position:fixed;bottom:20px;right:20px;
  display:flex;flex-direction:column;gap:8px;z-index:9999;
}
.toast{
  background:var(--text);color:#fff;
  padding:12px 16px;border-radius:10px;
  font-size:14px;font-weight:500;
  box-shadow:var(--shadow-md);
  animation:slideIn .2s ease;
  display:flex;align-items:center;gap:8px;
  max-width:320px;
}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.warning{background:var(--gold)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}

/* ═══════════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════════ */
.empty{
  text-align:center;padding:48px 20px;color:var(--muted);
}
.empty .e-icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty p{font-size:14px}

/* ═══════════════════════════════════════════════
   FILTER BAR
═══════════════════════════════════════════════ */
.filter-bar{
  display:flex;gap:10px;flex-wrap:wrap;
  margin-bottom:16px;align-items:center;
}
.filter-bar input,
.filter-bar select{
  padding:8px 12px;border:1.5px solid var(--border);
  border-radius:var(--radius);font-size:14px;
  background:var(--card);outline:none;
  transition:border-color .2s;
}
.filter-bar input:focus,
.filter-bar select:focus{border-color:var(--accent)}
.filter-bar input{min-width:200px;flex:1}

/* ═══════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════ */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab-btn{
  padding:10px 16px;border:none;background:none;
  font-size:14px;font-weight:600;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-2px;white-space:nowrap;transition:all .15s;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ═══════════════════════════════════════════════
   AVATAR
═══════════════════════════════════════════════ */
.avatar{
  border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:700;color:#fff;
  flex-shrink:0;
}

/* ═══════════════════════════════════════════════
   ATTENDANCE GRID
═══════════════════════════════════════════════ */
.att-cell{
  width:36px;height:36px;border-radius:8px;border:2px solid var(--border);
  cursor:pointer;font-size:13px;font-weight:700;
  transition:all .15s;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.att-P{background:var(--green-l);border-color:var(--green);color:var(--green)}
.att-A{background:var(--red-l);border-color:var(--red);color:var(--red)}
.att-G{background:var(--gold-l);border-color:var(--gold);color:#92400E}
.att-I{background:var(--purple-l);border-color:var(--purple);color:var(--purple)}

/* ═══════════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════════ */
.view{display:none}
.view.active{display:block}

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.mobile-open{transform:none}
  #main{margin-left:0}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  #content{padding:16px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}

/* ═══════════════════════════════════════════════
   LOADING
═══════════════════════════════════════════════ */
#loading{
  position:fixed;inset:0;background:var(--sidebar);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;color:#fff;
}
#loading .spin{
  width:40px;height:40px;border:3px solid #334155;
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;margin-bottom:16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════════ */
.progress{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;transition:width .3s;background:var(--accent)}
.progress-bar.green{background:var(--green)}
.progress-bar.red{background:var(--red)}
.progress-bar.gold{background:var(--gold)}

/* ═══════════════════════════════════════════════
   MISC
═══════════════════════════════════════════════ */
hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.highlight{background:var(--accent-l);border:1px solid var(--accent);border-radius:8px;padding:12px 16px;font-size:14px}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spin"></div>
  <div style="font-size:14px;color:#94A3B8">Caricamento...</div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- MODAL -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-big">⚽</div>
      <h1>Sport<em>Track</em></h1>
      <p>Gestione Società Sportive</p>
    </div>
    <div class="auth-err" id="auth-err"></div>
    <div class="form-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="mario.rossi@email.it" autocomplete="email">
    </div>
    <div class="form-field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-block btn-lg" onclick="doLogin()" id="login-btn">
      Accedi
    </button>
    <div style="text-align:center;margin-top:14px">
      <button class="btn btn-ghost btn-sm" onclick="showForgotPassword()">
        Password dimenticata?
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-logo">
      <div class="logo-icon">⚽</div>
      Sport<em>Track</em>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">?</div>
        <div class="sb-user-info">
          <div class="sb-user-name" id="sb-name">—</div>
          <div class="sb-user-role" id="sb-role">—</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm btn-block" style="margin-top:8px;color:#94A3B8;border-color:#334155" onclick="doLogout()">
        ↩ Esci
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- TOPBAR -->
    <div id="topbar">
      <div class="topbar-left">
        <button id="mobile-menu-btn" class="btn btn-ghost btn-icon" style="display:none" onclick="toggleSidebar()">☰</button>
        <div>
          <div class="topbar-title" id="topbar-title">Dashboard</div>
          <div class="topbar-sub" id="topbar-sub"></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="season-pill" id="season-pill">
          <label>⚽</label>
          <select id="season-select" onchange="onSeasonChange(this.value)">
            <option>—</option>
          </select>
        </div>
      </div>
    </div>

    <!-- CONTENT -->
    <div id="content">
      <div class="view active" id="view-dashboard"></div>
      <div class="view" id="view-athletes"></div>
      <div class="view" id="view-athlete-detail"></div>
      <div class="view" id="view-sessions"></div>
      <div class="view" id="view-session-detail"></div>
      <div class="view" id="view-matches"></div>
      <div class="view" id="view-match-detail"></div>
      <div class="view" id="view-staff"></div>
      <div class="view" id="view-config"></div>
      <div class="view" id="view-societies"></div>
      <div class="view" id="view-seasons"></div>
      <div class="view" id="view-reports"></div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//  SUPABASE

const esc = s => String(s||'').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const fmtDate = d => {
  if(!d) return '—';
  return new Date(d+'T00:00:00').toLocaleDateString('it-IT');
};

const fmtDateTime = d => {
  if(!d) return '—';
  return new Date(d).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
};

const initials = s => (s||'').split(' ').map(p=>p[0]||'').join('').slice(0,2).toUpperCase()||'?';

const avatarColor = s => {
  const colors = ['#2563EB','#10B981','#F59E0B','#EF4444','#7C3AED','#0891B2','#EC4899','#F97316'];
  let h = 0; for(const c of (s||'')) h = ((h<<5)-h)+c.charCodeAt(0);
  return colors[Math.abs(h)%colors.length];
};

const avatar = (name, size=36, rounded=true) => {
  const bg  = avatarColor(name);
  const r   = rounded ? '50%' : '9px';
  const fs  = size < 30 ? 10 : size < 40 ? 12 : 14;
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${bg};font-size:${fs}px;border-radius:${r};flex-shrink:0">${esc(initials(name))}</div>`;
};

const pct = (a, b) => b > 0 ? Math.round((a/b)*100) : 0;

const uid = () => crypto.randomUUID();

// ════════════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════════════
function toast(msg, type='info', duration=3000) {
  const ct = document.getElementById('toast-container');
  if(!ct) return;
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = {success:'✅', error:'❌', warning:'⚠️', info:'ℹ️'};
  t.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${esc(msg)}</span>`;
  ct.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

function buildSeasonSelector() {

  sel.innerHTML = DB.seasons.map(s =>
    `<option value="${s.id}" ${s.id===activeSeason?.id?'selected':''}>${esc(s.name)}${s.is_active?' ★':''}</option>`

async function onSeasonChange(seasonId) {
  activeSeason = DB.seasons.find(s=>s.id===seasonId) || activeSeason;
  await loadSeasonData();

}

async function loadBaseData() {
  const [
    {data: seasons},
    {data: societies},
    {data: sports},
    {data: categories},
    {data: teams},
  ] = await Promise.all([
    sb.from('seasons').select('*').order('start_date', {ascending:false}),
    sb.from('societies').select('*').order('name'),
    sb.from('sports').select('*').order('name'),
    sb.from('categories').select('*').order('name'),
    sb.from('teams').select('*').order('name'),
  ]);
  DB.seasons    = seasons    || [];
  DB.societies  = societies  || [];
  DB.sports     = sports     || [];
  DB.categories = categories || [];
  DB.teams      = teams      || [];

  // Imposta stagione attiva
  if(!activeSeason) {
    activeSeason = DB.seasons.find(s=>s.is_active) || DB.seasons[0] || null;
  }
}

async function loadSeasonData() {
  if(!activeSeason) return;
  const sid = activeSeason.id;
  const [
    {data: athleteSeasons},
    {data: userSeasons},
    {data: teamSeasons},
    {data: sessions},
    {data: matches},
  ] = await Promise.all([
    sb.from('athlete_seasons').select(`*, athlete:athletes(*)`).eq('season_id', sid),
    sb.from('user_team_seasons').select(`*, profile:profiles(*)`).eq('season_id', sid),
    sb.from('team_seasons').select('*').eq('season_id', sid),
    sb.from('sessions').select('*').eq('season_id', sid).order('session_date', {ascending:false}),
    sb.from('matches').select('*').eq('season_id', sid).order('match_date', {ascending:false}),
  ]);
  DB.athleteSeasons = athleteSeasons || [];
  DB.userSeasons    = userSeasons    || [];
  DB.teamSeasons    = teamSeasons    || [];
  DB.sessions       = sessions       || [];
  DB.matches        = matches        || [];
}

async function loadCurrentUserRole() {
  if(!currentUser || !activeSeason) { currentRole = null; return; }
  const {data} = await sb
    .from('user_team_seasons')
    .select('role')
    .eq('user_id', currentUser.id)
    .order('season_id', {ascending:false})
    .limit(1)
    .single();
  currentRole = data?.role || 'allenatore';
}

function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-'+viewId);
  if(!el) return;
  el.classList.add('active');
  currentView = viewId;
  // Chiudi sidebar mobile
  document.getElementById('sidebar').classList.remove('mobile-open');
  renderView(viewId);
}

function renderCurrentView() { renderView(currentView); }

function renderView(viewId) {
  const el = document.getElementById('view-'+viewId);
  if(!el) return;
  switch(viewId) {
    case 'dashboard':      renderDashboard(el);     break;
    case 'athletes':       renderAthletes(el);      break;
    case 'sessions':       renderSessions(el);      break;
    case 'matches':        renderMatches(el);       break;
    case 'staff':          renderStaff(el);         break;
    case 'config':         renderConfig(el);        break;
    case 'societies':      renderSocieties(el);     break;
    case 'seasons':        renderSeasons(el);       break;
    case 'reports':        renderReports(el);       break;
  }
}

function buildSidebarNav() {
  const nav = document.getElementById('sidebar-nav');
  if(!nav) return;

  const btn = (icon, label, view) => `
    <button class="sb-btn ${currentView===view?'active':''}" onclick="showView('${view}')">
      <span class="sb-icon">${icon}</span> ${label}
    </button>`;

  const section = (label) => `<div class="sb-section">${label}</div>`;

  let html = '';

  // Dashboard sempre visibile
  html += section('Principale');
  html += btn('📊', 'Dashboard', 'dashboard');

  // Operativo
  if(!['genitore'].includes(currentRole)) {
    html += section('Squadra');
    html += btn('👥', 'Atleti', 'athletes');
    html += btn('🏃', 'Sessioni', 'sessions');
    html += btn('⚽', 'Partite', 'matches');
  }

  // Staff
  if(canManage()) {
    html += section('Gestione');
    html += btn('🎽', 'Staff', 'staff');
    if(isAdmin()) {
      html += btn('🏛️', 'Società', 'societies');
    }
    html += btn('📆', 'Stagioni', 'seasons');
    html += btn('⚙️', 'Configurazione', 'config');
  }

  // Report
  html += section('Analisi');
  html += btn('📈', 'Report', 'reports');

  nav.innerHTML = html;
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('auth-err');
  err.style.display = 'none';
  if(!email || !pass) { showAuthErr('Inserisci email e password'); return; }
  btn.disabled = true;
  btn.textContent = 'Accesso in corso...';
  try {
    const {data, error} = await sb.auth.signInWithPassword({email, password:pass});
    if(error) throw error;
    await initApp(data.user);
  } catch(e) {
    showAuthErr(e.message === 'Invalid login credentials'
      ? 'Email o password non corretti'
      : e.message);
    btn.disabled = false;
    btn.textContent = 'Accedi';
  }
}

function showAuthErr(msg) {
  const err = document.getElementById('auth-err');
  err.textContent = msg;
  err.style.display = 'block';
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null; currentProfile = null; currentRole = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
}

async function showForgotPassword() {
  const email = prompt('Inserisci la tua email per ricevere il link di reset:');
  if(!email) return;
  const {error} = await sb.auth.resetPasswordForEmail(email);
  if(error) toast('Errore: '+error.message, 'error');
  else toast('Email di reset inviata! Controlla la casella.', 'success', 5000);
}

//  INIT APP
// ════════════════════════════════════════════════════════════════
async function initApp(user) {
  currentUser = user;

  // Carica profilo
  const {data: profile} = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = profile;

  // Carica dati base
  await loadBaseData();
  await loadCurrentUserRole();
  await loadSeasonData();

  // Sidebar user
  const name = profile ? `${profile.name} ${profile.surname}`.trim() || user.email : user.email;
  document.getElementById('sb-avatar').textContent = initials(name);
  document.getElementById('sb-avatar').style.background = avatarColor(name);
  document.getElementById('sb-name').textContent = name;
  document.getElementById('sb-role').textContent = ROLES[currentRole]?.label || currentRole || '—';

  // Stagione selector
  buildSeasonSelector();
  buildSidebarNav();

  // Mostra app
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  showView('dashboard');
}

function filterAthletes(q='', catId='', teamId='') {
  q = q.toLowerCase();
  const all = DB.athleteSeasons.map(as => ({...as.athlete, ...as, _as:as}));
  const filtered = all.filter(a => {
    const name = `${a.name||''} ${a.surname||''}`.toLowerCase();
    if(q && !name.includes(q)) return false;
    if(catId && a.category_id !== catId) return false;
    if(teamId && a.team_id !== teamId) return false;
    return true;
  });
  document.getElementById('athletes-table').innerHTML = buildAthletesTable(filtered);
}

function buildAthletesTable(athletes) {
  if(!athletes.length) return '<div class="empty"><div class="e-icon">👥</div><h3>Nessun atleta trovato</h3><p>Aggiungi il primo atleta alla stagione.</p></div>';

  const cat  = id => DB.categories.find(c=>c.id===id)?.name||'—';
  const team = id => DB.teams.find(t=>t.id===id)?.name||'—';

  return `<div class="card" style="padding:0">
    <div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>Atleta</th><th>Data Nascita</th>
        <th>Categoria</th><th>Squadra</th><th>Ruolo</th><th>Stato</th><th>Azioni</th>
      </tr></thead>
      <tbody>${athletes.map(a => `<tr>
        <td class="fw-700" style="color:var(--muted);width:40px">${a.jersey_number||'—'}</td>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            ${avatar(`${a.name} ${a.surname}`, 32)}
            <div>
              <div class="fw-700">${esc(a.surname)} ${esc(a.name)}</div>
            </div>
          </div>
        </td>
        <td class="text-muted">${fmtDate(a.born_date)}</td>
        <td><span class="badge badge-blue">${esc(cat(a.category_id))}</span></td>
        <td>${esc(team(a.team_id))}</td>
        <td class="text-muted">${esc(a.role||'—')}</td>
        <td>${athleteStatusBadge(a.status)}</td>
        <td>
          <div style="display:flex;gap:4px">
            <button class="btn btn-ghost btn-sm btn-icon" onclick="openAthleteDetail('${a.athlete_id||a.id}')" title="Profilo">👤</button>
            ${canEdit() ? `<button class="btn btn-ghost btn-sm btn-icon" onclick="openAthleteModal('${a.athlete_id||a.id}')" title="Modifica">✏️</button>` : ''}
          </div>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>`;
}

function athleteStatusBadge(s) {
  const map = {active:'badge-green',inactive:'badge-gray',injured:'badge-red',suspended:'badge-gold'};
  const lbl = {active:'Attivo',inactive:'Inattivo',injured:'Infortunato',suspended:'Sospeso'};
  return `<span class="badge ${map[s]||'badge-gray'}">${lbl[s]||s||'—'}</span>`;
}

function switchAthleteTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-anagrafica').style.display = tab==='anagrafica'?'block':'none';
  document.getElementById('tab-stagione').style.display   = tab==='stagione'  ?'block':'none';
}

async function saveAthlete(athleteId='') {
  const name    = document.getElementById('ath-name')?.value.trim();
  const surname = document.getElementById('ath-surname')?.value.trim();
  if(!name||!surname){toast('Nome e cognome obbligatori','error');return;}

  const athData = {
    name, surname,
    born_date:  document.getElementById('ath-dob')?.value    || null,
    phone:      document.getElementById('ath-phone')?.value  || '',
    email:      document.getElementById('ath-email')?.value  || '',
    tax_code:   document.getElementById('ath-cf')?.value     || '',
    notes:      document.getElementById('ath-notes')?.value  || '',
  };

  let savedId = athleteId;
  if(athleteId) {
    const {error} = await sb.from('athletes').update(athData).eq('id',athleteId);
    if(error){toast('Errore: '+error.message,'error');return;}
  } else {
    const {data, error} = await sb.from('athletes').insert(athData).select().single();
    if(error){toast('Errore: '+error.message,'error');return;}
    savedId = data.id;
  }

  // Salva dati stagionali
  const catId   = document.getElementById('ath-cat')?.value;
  const socId   = document.getElementById('ath-soc')?.value;
  if(catId && socId && activeSeason) {
    const asData = {
      athlete_id:    savedId,
      season_id:     activeSeason.id,
      society_id:    socId,
      category_id:   catId,
      team_id:       document.getElementById('ath-team')?.value    || null,
      jersey_number: parseInt(document.getElementById('ath-jersey')?.value)||null,
      role:          document.getElementById('ath-role')?.value    || '',
      status:        document.getElementById('ath-status')?.value  || 'active',
      join_date:     document.getElementById('ath-join')?.value    || null,
      notes:         document.getElementById('ath-season-notes')?.value || '',
    };
    const {error} = await sb.from('athlete_seasons')
      .upsert(asData, {onConflict:'athlete_id,season_id,category_id'});
    if(error){toast('Errore stagione: '+error.message,'error');return;}
  }

  closeModal();
  toast(athleteId ? 'Atleta aggiornato ✅' : 'Atleta aggiunto ✅', 'success');
  await loadSeasonData();
  renderAthletes(document.getElementById('view-athletes'));
}

const SESSION_TYPES = {
  training:   {label:'Allenamento', badge:'badge-blue',  icon:'🏃'},
  match:      {label:'Partita',     badge:'badge-red',   icon:'⚽'},
  friendly:   {label:'Amichevole',  badge:'badge-gold',  icon:'🤝'},
  individual: {label:'Individuale', badge:'badge-teal',  icon:'👤'},
  other:      {label:'Altro',       badge:'badge-gray',  icon:'📋'},
};

function sessionTypeBadge(type) {
  const t = SESSION_TYPES[type] || SESSION_TYPES.other;
  return `<span class="badge ${t.badge}">${t.icon} ${t.label}</span>`;
}

function renderSessions(el) {
  if(!el) el = document.getElementById('view-sessions');
  setTopbar('Sessioni', activeSeason?.name);

  el.innerHTML = `
    <div class="page-header">
      <div class="ph-row">
        <div>
          <h2>Sessioni di Allenamento</h2>
          <p>${DB.sessions.length} sessioni · Stagione ${esc(activeSeason?.name||'—')}</p>
        </div>
        ${canEdit() ? `<button class="btn btn-primary" onclick="openSessionModal()">+ Nuova Sessione</button>` : ''}
      </div>
    </div>

    <div class="filter-bar">
      <select onchange="renderSessionsList(this.value)" id="sess-type-filter">
        <option value="">Tutti i tipi</option>
        ${Object.entries(SESSION_TYPES).map(([k,v])=>`<option value="${k}">${v.icon} ${v.label}</option>`).join('')}
      </select>
    </div>

    <div id="sessions-list">
      ${buildSessionsList(DB.sessions)}
    </div>
  `;
}

function renderSessionsList(typeFilter='') {
  const filtered = typeFilter
    ? DB.sessions.filter(s=>s.session_type===typeFilter)
    : DB.sessions;
  document.getElementById('sessions-list').innerHTML = buildSessionsList(filtered);
}

function buildSessionsList(sessions) {
  if(!sessions.length) return '<div class="empty"><div class="e-icon">🏃</div><h3>Nessuna sessione</h3><p>Crea la prima sessione di allenamento.</p></div>';

  return `<div class="card" style="padding:0">
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Data</th><th>Tipo</th><th>Titolo</th><th>Categoria</th><th>Presenze</th><th>Azioni</th>
      </tr></thead>
      <tbody>${sessions.map(s => {
        const cat  = DB.categories.find(c=>c.id===s.category_id)?.name||'—';
        const atts = DB.athleteSeasons.filter(as=>as.category_id===s.category_id).length;
        return `<tr>
          <td class="fw-700">${fmtDate(s.session_date)}</td>
          <td>${sessionTypeBadge(s.session_type)}</td>
          <td>${esc(s.title||'—')}</td>
          <td><span class="badge badge-blue">${esc(cat)}</span></td>
          <td class="text-muted">— / ${atts}</td>
          <td>
            <div style="display:flex;gap:4px">
              <button class="btn btn-ghost btn-sm" onclick="openSessionDetail('${s.id}')">📋 Presenze</button>
              ${canEdit() ? `<button class="btn btn-ghost btn-sm btn-icon" onclick="openSessionModal('${s.id}')">✏️</button>` : ''}
              ${canEdit() ? `<button class="btn btn-danger btn-sm btn-icon" onclick="deleteSession('${s.id}')">🗑️</button>` : ''}
            </div>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
}

  const teamOpts= DB.teams.map(t=>`<option value="${t.id}" ${s?.team_id===t.id?'selected':''}>${esc(t.name)}</option>`).join('');
  const socOpts = DB.societies.map(x=>`<option value="${x.id}" ${s?.society_id===x.id?'selected':''}>${esc(x.name)}</option>`).join('');

  openModal(title, `
    <div class="form-row">
      <div class="form-field"><label>Data *</label>
        <input id="sess-date" type="date" value="${s?.session_date||new Date().toISOString().slice(0,10)}"></div>
      <div class="form-field"><label>Tipo</label>
        <select id="sess-type">
          ${Object.entries(SESSION_TYPES).map(([k,v])=>`<option value="${k}" ${(s?.session_type||'training')===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
        </select></div>
    </div>
    <div class="form-field"><label>Titolo</label>
      <input id="sess-title" value="${esc(s?.title||'')}" placeholder="Es. Allenamento tecnico"></div>
    <div class="form-row">
      <div class="form-field"><label>Categoria *</label>
        <select id="sess-cat"><option value="">—</option>${catOpts}</select></div>
      <div class="form-field"><label>Squadra</label>
        <select id="sess-team"><option value="">Tutta la categoria</option>${teamOpts}</select></div>
    </div>
    <div class="form-field"><label>Società *</label>
      <select id="sess-soc"><option value="">—</option>${socOpts}</select></div>
    <div class="form-field"><label>Note</label>
      <textarea id="sess-notes">${esc(s?.notes||'')}</textarea></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveSession('${sessionId||''}')">💾 Salva</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
    </div>
  `);
}

async function saveSession(sessionId='') {
  const date  = document.getElementById('sess-date')?.value;
  const catId = document.getElementById('sess-cat')?.value;
  const socId = document.getElementById('sess-soc')?.value;
  if(!date){toast('Data obbligatoria','error');return;}
  if(!catId){toast('Seleziona una categoria','error');return;}
  if(!socId){toast('Seleziona una società','error');return;}
  if(!activeSeason){toast('Nessuna stagione attiva','error');return;}

  const data = {
    season_id:    activeSeason.id,
    society_id:   socId,
    category_id:  catId,
    team_id:      document.getElementById('sess-team')?.value || null,
    session_date: date,
    session_type: document.getElementById('sess-type')?.value || 'training',
    title:        document.getElementById('sess-title')?.value || '',
    notes:        document.getElementById('sess-notes')?.value || '',
    created_by:   currentUser.id,
  };

  if(sessionId) {
    const {error} = await sb.from('sessions').update(data).eq('id',sessionId);
    if(error){toast('Errore: '+error.message,'error');return;}
  } else {
    const {error} = await sb.from('sessions').insert(data);
    if(error){toast('Errore: '+error.message,'error');return;}
  }

  closeModal();
  toast(sessionId ? 'Sessione aggiornata ✅' : 'Sessione creata ✅','success');
  await loadSeasonData();
  renderSessions(document.getElementById('view-sessions'));
}

async function deleteSession(sessionId) {
  if(!confirm('Eliminare questa sessione e tutte le presenze collegate?')) return;
  const {error} = await sb.from('sessions').delete().eq('id',sessionId);
  if(error){toast('Errore: '+error.message,'error');return;}
  toast('Sessione eliminata','success');
  await loadSeasonData();
  renderSessions(document.getElementById('view-sessions'));
}

              <td><input style="border:none;background:transparent;font-size:13px;width:100px" value="${esc(att.notes||'')}"

async function setAttendance(sessionId, athleteId, status) {
  // Aggiorna UI subito
  ['P','A','G','I'].forEach(s => {
    const cell = document.getElementById(`att-${sessionId}-${athleteId}-${s}`);
    if(!cell) return;
    cell.className = `att-cell att-${status===s?s:''}`;
    cell.textContent = status===s ? s : '';
  });

  // Salva nel DB
  const {error} = await sb.from('attendances')
    .upsert({session_id:sessionId, athlete_id:athleteId, status},
            {onConflict:'session_id,athlete_id'});
  if(error) toast('Errore salvataggio: '+error.message, 'error');
}

async function saveAttNote(sessionId, athleteId, notes) {
  await sb.from('attendances')
    .upsert({session_id:sessionId, athlete_id:athleteId, notes},
            {onConflict:'session_id,athlete_id'});
}

async function setAllAttendance(sessionId, status) {
  const sess = DB.sessions.find(s=>s.id===sessionId);
  if(!sess) return;
  const athletes = DB.athleteSeasons.filter(as=>as.category_id===sess.category_id);
  await Promise.all(athletes.map(as =>
    setAttendance(sessionId, as.athlete_id, status)
  ));
}

function matchResultBadge(m) {
  if(!m.result) return '<span class="badge badge-gray">—</span>';
  const map = {W:{cls:'badge-green',l:'Vittoria'},D:{cls:'badge-gold',l:'Pareggio'},L:{cls:'badge-red',l:'Sconfitta'}};
  const r = map[m.result];
  return `<span class="badge ${r.cls}">${m.goals_for}-${m.goals_against} ${r.l}</span>`;
}

  const L = played.filter(m=>m.result==='L').length;
  const pts = W*3 + D;

  el.innerHTML = `
    <div class="page-header">
      <div class="ph-row">
        <div>

        <div class="kpi-sub">media ${(played.reduce((s,m)=>s+m.goals_for,0)/played.length).toFixed(1)}/partita</div>
      </div>
      <div class="kpi" style="--kpi-color:var(--red)">

async function saveMatch(matchId='') {
  const date = document.getElementById('m-date')?.value;
  const opp  = document.getElementById('m-opp')?.value.trim();
  if(!date||!opp){toast('Data e avversario obbligatori','error');return;}
  if(!activeSeason){toast('Nessuna stagione attiva','error');return;}

  const data = {
    season_id:     activeSeason.id,
    society_id:    document.getElementById('m-soc')?.value   || null,
    category_id:   document.getElementById('m-cat')?.value   || null,
    match_date:    date,
    match_time:    document.getElementById('m-time')?.value  || null,
    opponent:      opp,
    home_away:     document.getElementById('m-ha')?.value    || 'home',
    result:        document.getElementById('m-result')?.value || null,
    goals_for:     parseInt(document.getElementById('m-gf')?.value)||0,
    goals_against: parseInt(document.getElementById('m-ga')?.value)||0,
    meet_place:    document.getElementById('m-place')?.value || '',
    notes:         document.getElementById('m-notes')?.value || '',
    created_by:    currentUser.id,
  };

  if(matchId) {
    const {error} = await sb.from('matches').update(data).eq('id',matchId);
    if(error){toast('Errore: '+error.message,'error');return;}
  } else {
    const {error} = await sb.from('matches').insert(data);
    if(error){toast('Errore: '+error.message,'error');return;}
  }

  closeModal();
  toast(matchId?'Partita aggiornata ✅':'Partita aggiunta ✅','success');
  await loadSeasonData();
  renderMatches(document.getElementById('view-matches'));
}

async function deleteMatch(matchId) {
  if(!confirm('Eliminare questa partita?')) return;
  const {error} = await sb.from('matches').delete().eq('id',matchId);
  if(error){toast('Errore: '+error.message,'error');return;}
  toast('Partita eliminata','success');
  await loadSeasonData();
  renderMatches(document.getElementById('view-matches'));
}

async function saveStaff() {

  const role   = document.getElementById('staff-role')?.value;
  const socId  = document.getElementById('staff-soc')?.value;
  if(!email||!role||!socId){toast('Email, ruolo e società obbligatori','error');return;}

  // Trova l'utente per email

  const {error} = await sb.from('user_team_seasons').insert({

async function saveSeason(seasonId='') {
  const name  = document.getElementById('s-name')?.value.trim();
  const start = document.getElementById('s-start')?.value;
  const end   = document.getElementById('s-end')?.value;
  if(!name||!start||!end){toast('Tutti i campi sono obbligatori','error');return;}
  if(end<=start){toast('La data fine deve essere dopo quella di inizio','error');return;}

  const data = {name, start_date:start, end_date:end};
  if(seasonId) {
    const {error} = await sb.from('seasons').update(data).eq('id',seasonId);
    if(error){toast('Errore: '+error.message,'error');return;}
  } else {
    const {error} = await sb.from('seasons').insert({...data, is_active:false});
    if(error){toast('Errore: '+error.message,'error');return;}
  }

  closeModal();
  toast(seasonId?'Stagione aggiornata ✅':'Stagione creata ✅','success');
  await loadBaseData();
  buildSeasonSelector();
  renderSeasons(document.getElementById('view-seasons'));
}

async function setSeasonActive(seasonId) {
  if(!confirm('Impostare questa stagione come attiva? La stagione corrente verrà disattivata.')) return;
  await sb.from('seasons').update({is_active:false}).neq('id','00000000-0000-0000-0000-000000000000');
  const {error} = await sb.from('seasons').update({is_active:true}).eq('id',seasonId);
  if(error){toast('Errore: '+error.message,'error');return;}
  await loadBaseData();
  activeSeason = DB.seasons.find(s=>s.id===seasonId);
  buildSeasonSelector();
  await loadSeasonData();
  renderSeasons(document.getElementById('view-seasons'));
  toast('Stagione attivata ✅','success');
}

async function deleteSeason(seasonId) {
  if(!confirm('Eliminare questa stagione? Tutti i dati collegati verranno persi.')) return;
  const {error} = await sb.from('seasons').delete().eq('id',seasonId);
  if(error){toast('Errore: '+error.message,'error');return;}
  await loadBaseData();
  buildSeasonSelector();
  renderSeasons(document.getElementById('view-seasons'));
  toast('Stagione eliminata','success');
}

function openSocietyModal(id=null) {

  openModal(s?'Modifica Società':'Nuova Società', `
    <div class="form-field"><label>Nome *</label>
      <input id="soc-name" value="${esc(s?.name||'')}"></div>
    <div class="form-row">
      <div class="form-field"><label>Sport</label>
        <select id="soc-sport"><option value="">—</option>${sportOpts}</select></div>
      <div class="form-field"><label>Città</label>
        <input id="soc-city" value="${esc(s?.city||'')}"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Email</label>
        <input id="soc-email" type="email" value="${esc(s?.email||'')}"></div>
      <div class="form-field"><label>Telefono</label>
        <input id="soc-phone" value="${esc(s?.phone||'')}"></div>
    </div>

  `);

async function saveSociety(id='') {
  const name = document.getElementById('soc-name')?.value.trim();
  if(!name){toast('Nome obbligatorio','error');return;}
  const data = {
    name,
    sport_id:    document.getElementById('soc-sport')?.value  ||null,
    city:        document.getElementById('soc-city')?.value   ||'',
    email:       document.getElementById('soc-email')?.value  ||'',
    phone:       document.getElementById('soc-phone')?.value  ||'',
    fiscal_code: document.getElementById('soc-cf')?.value     ||'',
    address:     document.getElementById('soc-addr')?.value   ||'',
  };
  if(id){await sb.from('societies').update(data).eq('id',id);}
  else  {await sb.from('societies').insert(data);}
  closeModal();
  toast('Salvato ✅','success');
  await loadBaseData();
  renderConfigSocieties();
}

// ════════════════════════════════════════════════════════════════
//  REPORT
// ════════════════════════════════════════════════════════════════
function renderReports(el) {
  if(!el) el = document.getElementById('view-reports');
  setTopbar('Report', activeSeason?.name);

  const athletes  = DB.athleteSeasons;
  const sessions  = DB.sessions;
  const matches   = DB.matches.filter(m=>m.result);
  const W = matches.filter(m=>m.result==='W').length;
  const D = matches.filter(m=>m.result==='D').length;
  const L = matches.filter(m=>m.result==='L').length;
  const gf = matches.reduce((s,m)=>s+m.goals_for,0);
  const ga = matches.reduce((s,m)=>s+m.goals_against,0);

  el.innerHTML = `
    <div class="page-header">
      <h2>Report Stagionale</h2>
      <p>Stagione ${esc(activeSeason?.name||'—')}</p>
    </div>

    <div class="kpi-grid">
      <div class="kpi" style="--kpi-color:var(--accent)"><div class="kpi-label">Atleti Totali</div><div class="kpi-value">${athletes.length}</div></div>
      <div class="kpi" style="--kpi-color:var(--green)"><div class="kpi-label">Sessioni Totali</div><div class="kpi-value">${sessions.length}</div></div>
      <div class="kpi" style="--kpi-color:var(--gold)"><div class="kpi-label">Partite Giocate</div><div class="kpi-value">${matches.length}</div></div>
      <div class="kpi" style="--kpi-color:var(--purple)"><div class="kpi-label">Punti Totali</div><div class="kpi-value">${W*3+D}</div><div class="kpi-sub">${W}V ${D}P ${L}S</div></div>
      <div class="kpi" style="--kpi-color:var(--green)"><div class="kpi-label">Gol Fatti</div><div class="kpi-value">${gf}</div><div class="kpi-sub">media ${matches.length?(gf/matches.length).toFixed(1):0}/partita</div></div>
      <div class="kpi" style="--kpi-color:var(--red)"><div class="kpi-label">Gol Subiti</div><div class="kpi-value">${ga}</div><div class="kpi-sub">diff. ${gf-ga>=0?'+':''}${gf-ga}</div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><div class="icon" style="background:var(--gold-l);color:var(--gold)">⚽</div>Andamento Partite</div>
        ${matches.length === 0
          ? '<div class="text-muted text-sm">Nessuna partita giocata.</div>'
          : `<div style="display:flex;flex-direction:column;gap:8px">
            ${matches.slice(0,8).map(m=>`
              <div style="display:flex;align-items:center;gap:10px">
                <span style="font-size:12px;color:var(--muted);width:80px">${fmtDate(m.match_date)}</span>
                <span style="flex:1;font-weight:600">${esc(m.opponent)}</span>
                ${matchResultBadge(m)}
              </div>`).join('')}
          </div>`
        }
      </div>

      <div class="card">
        <div class="card-title"><div class="icon" style="background:var(--blue-l,var(--accent-l));color:var(--accent)">🏃</div>Sessioni per Tipo</div>
        ${Object.entries(SESSION_TYPES).map(([k,v])=>{
          const cnt = sessions.filter(s=>s.session_type===k).length;
          if(!cnt) return '';
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span class="badge ${v.badge}">${v.icon} ${v.label}</span>
            <div style="flex:1"><div class="progress"><div class="progress-bar" style="width:${pct(cnt,sessions.length)}%"></div></div></div>
            <span class="fw-700" style="width:30px;text-align:right">${cnt}</span>
          </div>`;
        }).join('')}
        ${sessions.length===0?'<div class="text-muted text-sm">Nessuna sessione.</div>':''}
      </div>
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════
//  AVVIO
// ════════════════════════════════════════════════════════════════
async function start() {
  // Verifica sessione esistente
  const {data:{session}} = await sb.auth.getSession();
  if(session?.user) {
    await initApp(session.user);
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
  }
  document.getElementById('loading').style.display = 'none';

  // Ascolta cambi auth
  sb.auth.onAuthStateChange(async (event, session) => {
    if(event === 'SIGNED_IN' && session?.user && !currentUser) {
      await initApp(session.user);
    }
    if(event === 'SIGNED_OUT') {
      currentUser = null;
    }
  });

  // Mobile menu button
  if(window.innerWidth <= 768) {
    document.getElementById('mobile-menu-btn').style.display = 'flex';
  }
}

// Tastiera: Esc chiude modal
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeModal();
});

start();
</script>
