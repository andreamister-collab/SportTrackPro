<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Società Sportiva</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body{font-family:system-ui,Arial;margin:0;background:#f6f8fa;color:#111}
 .container{max-width:1200px;margin:20px auto;padding:0 16px}
 .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
 .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
 .card h3{margin:0;font-size:14px;color:#64748b}
 .card p{margin:8px 0 0;font-size:28px;font-weight:700}
 .filters{display:flex;gap:12px;margin:16px 0}
  select,button,input{padding:8px 12px;border:1px solid #cbd5e1;border-radius:8px}
  button{background:#2563eb;color:#fff;border:none;cursor:pointer}
  button.ghost{background:#e2e8f0;color:#111}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden}
  th,td{padding:10px 12px;border-bottom:1px solid #e2e8f0;text-align:left}
  th{background:#f1f5f9;font-size:13px}
 .modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center}
 .modal.box{background:#fff;padding:20px;border-radius:12px;width:90%;max-width:500px}
</style>
</head>
<body>
<div class="container">
  <div id="auth-section">
    <h2>Accedi</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Entra</button>
    <button class="ghost" onclick="signup()">Registrati</button>
  </div>

  <div id="app" style="display:none">
    <h1>Dashboard Amministratore</h1>

    <section class="cards">
      <div class="card"><h3>ATLETI</h3><p id="c-atleti">0</p></div>
      <div class="card"><h3>SOCIETÀ</h3><p id="c-societa">0</p></div>
      <div class="card"><h3>CATEGORIE</h3><p id="c-categorie">0</p></div>
      <div class="card"><h3>TOTALE SESSIONI</h3><p id="c-sessioni">0</p></div>
      <div class="card"><h3>PARTITE</h3><p id="c-partite">0</p></div>
      <div class="card"><h3>ALLENAMENTI</h3><p id="c-allenamenti">0</p></div>
      <div class="card"><h3>UTENTI TOTALI</h3><p id="c-utenti">0</p></div>
      <div class="card"><h3>RESPONSABILI</h3><p id="c-responsabili">0</p></div>
      <div class="card"><h3>DIRIGENTI</h3><p id="c-dirigenti">0</p></div>
    </section>

    <div class="filters">
      <select id="f-society"><option value="">Tutte le società</option></select>
      <select id="f-team"><option value="">Tutte le squadre</option></select>
      <select id="f-season"></select>
      <button onclick="openModal('societa')">+ Società</button>
      <button onclick="openModal('categoria')">+ Categoria</button>
      <button onclick="openModal('squadra')">+ Squadra</button>
      <button onclick="openModal('atleta')">+ Atleta</button>
      <button onclick="openModal('sessione')">+ Sessione/Partita</button>
      <button onclick="openModal('ruolo')">+ Assegna Ruolo</button>
    </div>

    <table id="tbl">
      <thead>
        <tr><th>CATEGORIA</th><th>SQUADRA</th><th>SOCIETÀ</th><th>ATLETI</th><th>SESSIONI</th><th>RESP.</th><th>ALLENATORI</th><th>DIRIGENTI</th><th>PROF.</th><th>AZIONI</th></tr>
      </thead>
      <tbody></tbody>
      <tfoot><tr><td colspan="3">Totale (<span id="tot-row">0</span>)</td><td id="tot-atleti">0</td><td id="tot-sessioni">0</td><td id="tot-resp">0</td><td id="tot-allenatori">0</td><td id="tot-dirigenti">0</td><td id="tot-prof">0</td><td></td></tr></tfoot>
    </table>
  </div>
</div>

<div class="modal" id="modal"><div class="box" id="modal-body"></div></div>

<script>
const supabase = supabase.createClient('https://YOUR_PROJECT.supabase.co','YOUR_ANON_KEY')
let USER=null, STATE={seasonId:'',societyId:'',teamId:''}

async function login(){
  const {data,error}=await supabase.auth.signInWithPassword({email:email.value,password:password.value})
  if(error) return alert(error.message)
  USER=data.user
  await initApp()
}

async function signup(){
  const {data,error}=await supabase.auth.signUp({email:email.value,password:password.value})
  if(error) return alert(error.message)
  await supabase.from('profiles').insert({id:data.user.id,first_name:'',last_name:''})
  alert('Registrato, ora accedi')
}

async function initApp(){
  document.getElementById('auth-section').style.display='none'
  document.getElementById('app').style.display='block'
  const {data:seasons}=await supabase.from('seasons').select('*').order('start_date',{ascending:false})
  STATE.seasonId=seasons[0]?.id
  populate('f-season',seasons,'id','name')
  const {data:socs}=await supabase.from('societies').select('id,name')
  populate('f-society',socs,'id','name')
  await refresh()
}

function populate(id,data,val,label){
  const sel=document.getElementById(id)
  sel.innerHTML='<option value="">Tutte</option>'+data.map(d=>`<option value="${d[val]}">${d[label]}</option>`).join('')
}

async function refresh(){
  const s=STATE.seasonId
  const {count:atleti}=await supabase.from('athlete_seasons').select('id',{count:'exact',head:true}).eq('season_id',s)
  const {count:societa}=await supabase.from('societies').select('id',{count:'exact',head:true})
  const {count:categorie}=await supabase.from('categories').select('id',{count:'exact',head:true})
  const {count:sessioni}=await supabase.from('sessions').select('id',{count:'exact',head:true}).eq('season_id',s)
  const {count:allenamenti}=await supabase.from('sessions').select('id',{count:'exact',head:true}).eq('season_id',s).eq('type','A')
  const {data:partite}=await supabase.from('matches').select('result').eq('season_id',s)
  const {count:utenti}=await supabase.from('profiles').select('id',{count:'exact',head:true})
  const {count:responsabili}=await supabase.from('user_society_roles').select('id',{count:'exact',head:true}).eq('season_id',s).eq('role_id','responsabile')
  const {count:dirigenti}=await supabase.from('user_society_roles').select('id',{count:'exact',head:true}).eq('season_id',s).eq('role_id','dirigente')

  document.getElementById('c-atleti').textContent=atleti
  document.getElementById('c-societa').textContent=societa
  document.getElementById('c-categorie').textContent=categorie
  document.getElementById('c-sessioni').textContent=sessioni
  document.getElementById('c-allenamenti').textContent=allenamenti
  document.getElementById('c-partite').textContent=partite?.length||0
  document.getElementById('c-utenti').textContent=utenti
  document.getElementById('c-responsabili').textContent=responsabili
  document.getElementById('c-dirigenti').textContent=dirigenti

  let q=supabase.from('v_category_overview').select('*')
  if(STATE.seasonId) q=q.eq('season_id',STATE.seasonId)
  if(STATE.societyId) q=q.eq('society_id',STATE.societyId)
  if(STATE.teamId) q=q.eq('team_id',STATE.teamId)
  const {data}=await q
  const tbody=document.querySelector('#tbl tbody')
  tbody.innerHTML=data.map(r=>`
    <tr>
      <td>${r.categoria}</td><td>${r.squadra||'—'}</td><td>${r.societa}</td>
      <td>${r.atleti}</td><td>${r.sessioni}</td><td>${r.resp}</td><td>${r.allenatori}</td><td>${r.dirigenti}</td><td>${r.prof}</td>
      <td><button onclick="openAtleti('${r.category_id}','${r.team_id}')">Gestisci</button></td>
    </tr>`).join('')
  document.getElementById('tot-row').textContent=data.length
  document.getElementById('tot-atleti').textContent=data.reduce((a,b)=>a+b.atleti,0)
  document.getElementById('tot-sessioni').textContent=data.reduce((a,b)=>a+b.sessioni,0)
  document.getElementById('tot-resp').textContent=data.reduce((a,b)=>a+b.resp,0)
  document.getElementById('tot-allenatori').textContent=data.reduce((a,b)=>a+b.allenatori,0)
  document.getElementById('tot-dirigenti').textContent=data.reduce((a,b)=>a+b.dirigenti,0)
  document.getElementById('tot-prof').textContent=data.reduce((a,b)=>a+b.prof,0)
}

document.getElementById('f-season').onchange=e=>{STATE.seasonId=e.target.value;refresh()}
document.getElementById('f-society').onchange=async e=>{
  STATE.societyId=e.target.value
  STATE.teamId=''
  const {data:teams}=await supabase.from('teams').select('id,name').eq('society_id',STATE.societyId)
  populate('f-team',teams,'id','name')
  refresh()
}
document.getElementById('f-team').onchange=e=>{STATE.teamId=e.target.value;refresh()}

// MODAL
function openModal(type){
  const mb=document.getElementById('modal-body')
  if(type==='societa'){
    mb.innerHTML=`<h3>Nuova Società</h3>
      <input id="soc-name" placeholder="Nome società">
      <select id="soc-sport"></select>
      <button onclick="saveSociety()">Salva</button>
      <button class="ghost" onclick="closeModal()">Annulla</button>`
    supabase.from('sports').select('id,name').then(r=>populate('soc-sport',r.data,'id','name'))
  }
  if(type==='categoria'){
    mb.innerHTML=`<h3>Nuova Categoria</h3>
      <input id="cat-name" placeholder="Nome categoria">
      <select id="cat-soc"></select>
      <select id="cat-sport"></select>
      <button onclick="saveCategory()">Salva</button>
      <button class="ghost" onclick="closeModal()">Annulla</button>`
    supabase.from('societies').select('id,name').then(r=>populate('cat-soc',r.data,'id','name'))
    supabase.from('sports').select('id,name').then(r=>populate('cat-sport',r.data,'id','name'))
  }
  if(type==='squadra'){
    mb.innerHTML=`<h3>Nuova Squadra</h3>
      <input id="team-name" placeholder="Nome squadra">
      <select id="team-soc"></select>
      <select id="team-cat"></select>
      <button onclick="saveTeam()">Salva</button>
      <button class="ghost" onclick="closeModal()">Annulla</button>`
    supabase.from('societies').select('id,name').then(r=>populate('team-soc',r.data,'id','name'))
    supabase.from('categories').select('id,name').then(r=>populate('team-cat',r.data,'id','name'))
  }
  if(type==='atleta'){
    mb.innerHTML=`<h3>Nuovo Atleta</h3>
      <input id="ath-name" placeholder="Nome">
      <input id="ath-last" placeholder="Cognome">
      <input id="ath-dob" type="date">
      <input id="ath-number" type="number" placeholder="Numero maglia">
      <select id="ath-cat"></select>
      <select id="ath-team"></select>
      <button onclick="saveAthlete()">Salva</button>
      <button class="ghost" onclick="closeModal()">Annulla</button>`
    supabase.from('categories').select('id,name').then(r=>populate('ath-cat',r.data,'id','name'))
    supabase.from('teams').select('id,name').then(r=>populate('ath-team',r.data,'id','name'))
  }
  if(type==='sessione'){
    mb.innerHTML=`<h3>Nuova Sessione / Partita</h3>
      <select id="ses-type"><option value="A">Allenamento</option><option value="P">Partita</option></select>
      <input id="ses-date" type="date">
      <select id="ses-cat"></select>
      <input id="ses-opp" placeholder="Avversario (solo partita)">
      <button onclick="saveSession()">Salva</button>
      <button class="ghost" onclick="closeModal()">Annulla</button>`
    supabase.from('categories').select('id,name').then(r=>populate('ses-cat',r.data,'id','name'))
  }
  if(type==='ruolo'){
    mb.innerHTML=`<h3>Assegna Ruolo</h3>
      <select id="role-user"></select>
      <select id="role-type"></select>
      <select id="role-soc"></select>
      <select id="role-cat"></select>
      <select id="role-team"><option value="">Tutta la categoria</option></select>
      <button onclick="saveRole()">Salva</button>
      <button class="ghost" onclick="closeModal()">Annulla</button>`
    supabase.from('profiles').select('id,first_name,last_name').then(r=>populate('role-user',r.data,'id',r=>r.first_name+' '+r.last_name))
    supabase.from('roles').select('id,name').then(r=>populate('role-type',r.data,'id','name'))
    supabase.from('societies').select('id,name').then(r=>populate('role-soc',r.data,'id','name'))
    supabase.from('categories').select('id,name').then(r=>populate('role-cat',r.data,'id','name'))
    supabase.from('teams').select('id,name').then(r=>populate('role-team',r.data,'id','name'))
  }
  document.getElementById('modal').style.display='flex'
}
function closeModal(){document.getElementById('modal').style.display='none'}

// SAVE
async function saveSociety(){
  await supabase.from('societies').insert({name:soc-name.value,sport_id:soc-sport.value})
  closeModal();refresh()
}
async function saveCategory(){
  await supabase.from('categories').insert({name:cat-name.value,society_id:cat-soc.value,sport_id:cat-sport.value})
  closeModal();refresh()
}
async function saveTeam(){
  const {data}=await supabase.from('teams').insert({name:team-name.value,society_id:team-soc.value}).select()
  await supabase.from('team_category_season').insert({team_id:data[0].id,category_id:team-cat.value,season_id:STATE.seasonId})
  closeModal();refresh()
}
async function saveAthlete(){
  const {data}=await supabase.from('athletes').insert({first_name:ath-name.value,last_name:ath-last.value,dob:ath-dob.value,nickname:''}).select()
  await supabase.from('athlete_seasons').insert({athlete_id:data[0].id,category_id:ath-cat.value,team_id:ath-team.value,season_id:STATE.seasonId,shirt_number:+ath-number.value||null})
  closeModal();refresh()
}
async function saveSession(){
  const type=ses-type.value
  const {data}=await supabase.from('sessions').insert({type, date:ses-date.value, category_id:ses-cat.value, season_id:STATE.seasonId, created_by:USER.id}).select()
  if(type==='P'){
    await supabase.from('matches').insert({category_id:ses-cat.value, date:ses-date.value, opponent:ses-opp.value||'Amichevole', season_id:STATE.seasonId, created_by:USER.id, match_id:data[0].id})
  }
  closeModal();refresh()
}
async function saveRole(){
  await supabase.from('user_society_roles').insert({user_id:role-user.value,role_id:role-type.value,society_id:role-soc.value,season_id:STATE.seasonId})
  if(role-team.value) await supabase.from('role_category_team').insert({user_id:role-user.value,role_id:role-type.value,society_id:role-soc.value,season_id:STATE.seasonId,category_id:role-cat.value,team_id:role-team.value})
  closeModal();refresh()
}
async function openAtleti(catId,teamId){
  const {data}=await supabase.from('athlete_seasons').select('*,athletes(*)').eq('category_id',catId).eq('season_id',STATE.seasonId)
  alert('Atleti: '+data.map(a=>a.athletes.first_name+' '+a.athletes.last_name).join(', '))
}
</script>
</body>
</html>
